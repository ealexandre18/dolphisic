<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DolphiSIC - Gestion du parc matériel radio et cartographie opérationnelle du SDIS 04" />
    <title>DolphiSIC - SDIS 04</title>
    <style>
      button[title="Ajouter un Texte Libre"] {
        display: none !important;
      }
      .dolphisic-cookie-banner {
        position: fixed;
        left: 24px;
        right: 24px;
        bottom: 24px;
        z-index: 2147483000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px 20px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background: rgba(15, 23, 42, 0.96);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        color: #f8fafc;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .dolphisic-cookie-banner strong {
        display: block;
        margin-bottom: 4px;
        font-size: 0.95rem;
      }

      .dolphisic-cookie-banner p {
        margin: 0;
        color: rgba(248, 250, 252, 0.78);
        font-size: 0.84rem;
        line-height: 1.45;
      }

      .dolphisic-cookie-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }

      .dolphisic-cookie-actions button {
        min-width: 104px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        cursor: pointer;
        font-weight: 800;
        font-size: 0.84rem;
        font-family: inherit;
      }

      .dolphisic-cookie-accept {
        background: #e63946;
        color: #ffffff;
      }

      .dolphisic-cookie-refuse {
        background: rgba(255, 255, 255, 0.06);
        color: #f8fafc;
      }

      button[title="Changer le thème"] {
        display: none !important;
      }

      .dolphi-extension-main {
        flex: 1;
        min-width: 0;
        height: 100%;
        overflow-y: auto;
        padding: 24px;
        color: var(--text-main);
      }

      .dolphi-extension-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      .dolphi-extension-header h1 {
        margin: 0 0 4px;
        font-size: 2rem;
        font-weight: 800;
      }

      .dolphi-extension-header p,
      .dolphi-muted {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .dolphi-summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 24px;
      }

      .dolphi-dashboard-tabs {
        display: flex;
        width: min(100%, 520px);
        gap: 4px;
        margin: 0 auto 24px;
        padding: 4px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--card-bg-solid);
      }

      .dolphi-dashboard-tab {
        display: inline-flex;
        flex: 1;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 150px;
        padding: 10px 16px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--text-muted);
        font-family: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
      }

      .dolphi-dashboard-tab svg {
        width: 15px;
        height: 15px;
      }

      .dolphi-dashboard-tab.active {
        background: var(--primary);
        color: #ffffff;
      }

      .dolphi-dashboard-panel[hidden] {
        display: none;
      }

      .dolphi-dashboard-panel-loans .dolphi-summary-grid {
        grid-template-columns: minmax(260px, 420px);
        justify-content: center;
      }

      .dolphi-dashboard-content {
        width: 100%;
        max-width: 1480px;
        margin: 0 auto;
      }

      .dolphi-dashboard-content > .dolphi-extension-header {
        justify-content: center;
        text-align: center;
      }

      .dolphi-dashboard-panel,
      .dolphi-dashboard-content > .dolphi-section {
        width: 100%;
        max-width: 960px;
        margin-right: auto;
        margin-left: auto;
      }

      .dolphi-dashboard-hero {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) minmax(360px, 520px) minmax(240px, 1fr);
        align-items: start;
        gap: 24px;
        margin-bottom: 22px;
      }

      .dolphi-dashboard-title h1 {
        margin: 0;
        font-size: 2rem;
        font-weight: 800;
      }

      .dolphi-dashboard-title p {
        margin: 6px 0 0;
        color: var(--text-muted);
      }

      .dolphi-dashboard-title::after {
        display: block;
        width: 34px;
        height: 3px;
        margin-top: 12px;
        border-radius: 2px;
        background: var(--primary);
        content: '';
      }

      .dolphi-dashboard-updated {
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        gap: 8px;
        color: var(--text-muted);
        font-size: 0.75rem;
        line-height: 1.5;
        text-align: right;
      }

      .dolphi-dashboard-updated svg {
        width: 16px;
        height: 16px;
        margin-top: 1px;
      }

      .dolphi-dashboard-updated > div {
        display: grid;
        gap: 4px;
      }

      .dolphi-dashboard-updated span,
      .dolphi-dashboard-updated strong,
      .dolphi-dashboard-updated small {
        display: block;
      }

      .dolphi-dashboard-updated strong {
        color: var(--text-main);
      }

      .dolphi-dashboard-updated small {
        max-width: 230px;
      }

      .dolphi-dashboard-kpis {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 360px));
        justify-content: center;
        gap: 14px;
        margin-bottom: 18px;
      }

      .dolphi-kpi-card {
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr);
        align-items: center;
        gap: 16px;
        min-width: 0;
        min-height: 112px;
        padding: 18px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--card-bg-solid);
        color: var(--text-main);
        font-family: inherit;
        text-align: left;
      }

      button.dolphi-kpi-card {
        cursor: pointer;
        transition: border-color 180ms ease, background 180ms ease;
      }

      button.dolphi-kpi-card:hover,
      button.dolphi-kpi-card.active {
        border-color: var(--primary);
        background: rgba(230, 57, 70, 0.06);
      }

      .dolphi-kpi-icon {
        display: inline-flex;
        width: 52px;
        height: 52px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
      }

      .dolphi-kpi-icon svg {
        width: 25px;
        height: 25px;
      }

      .dolphi-kpi-danger { background: rgba(244, 63, 94, 0.18); color: #fb7185; }
      .dolphi-kpi-warning { background: rgba(245, 158, 11, 0.18); color: #f59e0b; }
      .dolphi-kpi-info { background: rgba(56, 189, 248, 0.16); color: #38bdf8; }
      .dolphi-kpi-success { background: rgba(16, 185, 129, 0.16); color: #10b981; }

      .dolphi-kpi-copy span,
      .dolphi-kpi-copy small {
        display: block;
      }

      .dolphi-kpi-copy > span {
        color: var(--text-muted);
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .dolphi-kpi-copy strong {
        display: block;
        margin: 4px 0;
        font-size: 1.75rem;
        line-height: 1;
      }

      .dolphi-kpi-copy small {
        overflow: hidden;
        color: var(--text-muted);
        font-size: 0.7rem;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .dolphi-kpi-copy small::before {
        display: inline-block;
        width: 6px;
        height: 6px;
        margin-right: 6px;
        border-radius: 50%;
        background: currentColor;
        content: '';
      }

      .dolphi-dashboard-analytics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-bottom: 18px;
      }

      .dolphi-analytics-panel {
        min-width: 0;
        padding: 18px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--card-bg-solid);
      }

      .dolphi-analytics-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-color);
      }

      .dolphi-analytics-heading h2 {
        margin: 0;
        font-size: 0.9rem;
      }

      .dolphi-type-overview {
        display: grid;
        grid-template-columns: 170px minmax(0, 1fr);
        align-items: center;
        gap: 24px;
      }

      .dolphi-type-donut {
        position: relative;
        width: 132px;
        aspect-ratio: 1;
        margin: 0 auto;
        border-radius: 50%;
        background: conic-gradient(#38bdf8 0 var(--portable-end, 50%), #f59e0b var(--portable-end, 50%) var(--mobile-end, 100%), #fb7185 var(--mobile-end, 100%) 100%);
      }

      .dolphi-type-donut::after {
        position: absolute;
        inset: 24px;
        border-radius: 50%;
        background: var(--card-bg-solid);
        content: '';
      }

      .dolphi-type-legend {
        display: grid;
        gap: 12px;
      }

      .dolphi-type-legend-row {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
      }

      .dolphi-type-legend-swatch {
        width: 10px;
        height: 10px;
        border-radius: 2px;
      }

      .dolphi-type-legend-row strong,
      .dolphi-type-legend-row small {
        display: block;
      }

      .dolphi-type-legend-row small {
        color: var(--text-muted);
        font-size: 0.7rem;
      }

      .dolphi-deadline-bar {
        display: flex;
        width: 100%;
        height: 12px;
        overflow: hidden;
        border-radius: 6px;
        background: var(--secondary);
      }

      .dolphi-deadline-bar span { min-width: 2px; }
      .dolphi-deadline-overdue { background: #f43f5e; }
      .dolphi-deadline-soon { background: #f59e0b; }
      .dolphi-deadline-valid { background: #10b981; }

      .dolphi-deadline-legend {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 22px;
      }

      .dolphi-deadline-stat {
        min-width: 0;
        padding: 0 4px;
      }

      .dolphi-deadline-stat span,
      .dolphi-deadline-stat strong,
      .dolphi-deadline-stat small {
        display: block;
      }

      .dolphi-deadline-stat span {
        color: var(--text-muted);
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .dolphi-deadline-stat strong {
        margin-top: 8px;
        font-size: 1.3rem;
      }

      .dolphi-deadline-stat small {
        margin-top: 4px;
        color: var(--text-muted);
        font-size: 0.7rem;
      }

      .dolphi-dashboard-table-panel {
        overflow: hidden;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--card-bg-solid);
      }

      .dolphi-dashboard-table-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 14px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-color);
      }

      .dolphi-dashboard-table-title,
      .dolphi-dashboard-table-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dolphi-dashboard-table-title h2 {
        margin: 0;
        font-size: 0.9rem;
      }

      .dolphi-dashboard-table-actions .dolphi-device-type-toolbar {
        margin: 0;
      }

      .dolphi-export-button svg {
        width: 16px;
        height: 16px;
      }

      .dolphi-dashboard-table-wrap {
        overflow-x: auto;
      }

      .dolphi-dashboard-table {
        width: 100%;
        min-width: 820px;
        border-collapse: collapse;
      }

      .dolphi-dashboard-table th {
        padding: 11px 16px;
        font-size: 0.68rem;
      }

      .dolphi-dashboard-table td {
        padding: 11px 16px;
        font-size: 0.78rem;
        vertical-align: middle;
      }

      .dolphi-dashboard-device-cell {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dolphi-dashboard-device-cell .dolphi-goto-device {
        width: 28px;
        height: 28px;
      }

      .dolphi-dashboard-affectation {
        max-width: 280px;
        overflow: hidden;
        color: var(--text-muted);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .dolphi-dashboard-delay {
        min-width: 150px;
      }

      .dolphi-dashboard-delay-value {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dolphi-dashboard-delay-value strong {
        min-width: 48px;
        color: #fb7185;
      }

      .dolphi-dashboard-delay-bar {
        width: 100px;
        height: 5px;
        overflow: hidden;
        border-radius: 3px;
        background: var(--secondary);
      }

      .dolphi-dashboard-delay-bar i {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: #f43f5e;
      }

      .dolphi-dashboard-row-actions {
        width: 56px;
        text-align: right;
      }

      .dolphi-dashboard-icon-action {
        display: inline-flex;
        width: 32px;
        height: 32px;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
      }

      .dolphi-dashboard-icon-action:hover {
        border-color: var(--primary);
        color: var(--primary);
      }

      .dolphi-dashboard-icon-action svg,
      .dolphi-hidden-button svg {
        width: 16px;
        height: 16px;
      }

      .dolphi-hidden-button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }

      .dolphi-hidden-count {
        min-width: 20px;
        padding: 2px 6px;
        border-radius: 10px;
        background: var(--secondary);
        font-size: 0.7rem;
        text-align: center;
      }

      .dolphi-hidden-list {
        display: grid;
        gap: 10px;
        max-height: 52vh;
        margin-top: 18px;
        overflow-y: auto;
      }

      .dolphi-hidden-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
      }

      .dolphi-hidden-row strong,
      .dolphi-hidden-row small {
        display: block;
      }

      .dolphi-hidden-row small {
        margin-top: 4px;
        color: var(--text-muted);
      }

      .dolphi-dashboard-delay-upcoming strong { color: #f59e0b; }
      .dolphi-dashboard-delay-upcoming .dolphi-dashboard-delay-bar i { background: #f59e0b; }

      .dolphi-dashboard-empty-row td {
        padding: 28px;
        color: var(--text-muted);
        text-align: center;
      }

      [data-dashboard-panel][hidden] {
        display: none !important;
      }

      .dolphi-summary-card {
        min-width: 0;
        padding: 18px;
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        background: var(--card-bg-solid);
        color: var(--text-main);
        font-family: inherit;
        text-align: left;
      }

      button.dolphi-summary-card {
        cursor: pointer;
        transition: var(--transition);
      }

      button.dolphi-summary-card.active {
        border-color: var(--primary);
        box-shadow: inset 0 0 0 1px var(--primary);
      }

      .dolphi-summary-card span {
        display: block;
        color: var(--text-muted);
        font-size: 0.74rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .dolphi-summary-card strong {
        display: block;
        margin-top: 8px;
        font-size: 1.8rem;
      }

      .dolphi-dashboard-columns,
      .dolphi-settings-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
      }

      .dolphi-section {
        margin-top: 10px;
        padding: 20px 0;
        border-top: 1px solid var(--border-color);
      }

      .dolphi-section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .dolphi-section h2 {
        margin: 0;
        font-size: 1rem;
      }

      .dolphi-operation-list {
        overflow: hidden;
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
      }

      .dolphi-operation-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 62px;
        padding: 13px 15px;
        border-bottom: 1px solid var(--border-color);
      }

      .dolphi-operation-row:last-child {
        border-bottom: 0;
      }

      .dolphi-operation-row > div:first-child {
        min-width: 0;
      }

      .dolphi-operation-main {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .dolphi-goto-device {
        width: 30px;
        height: 30px;
        flex-shrink: 0;
        padding: 0;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: transparent;
        color: var(--primary);
        cursor: pointer;
        font-size: 1rem;
      }

      .dolphi-operation-row strong,
      .dolphi-operation-row small {
        display: block;
      }

      .dolphi-operation-row small {
        overflow-wrap: anywhere;
        margin-top: 3px;
        color: var(--text-muted);
      }

      .dolphi-operation-title-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .dolphi-device-type-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 8px;
        border: 1px solid currentColor;
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .dolphi-device-type-badge svg,
      .dolphi-device-type-filter svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      .dolphi-device-type-mobile {
        background: rgba(251, 146, 60, 0.12);
        color: #fb923c;
      }

      .dolphi-device-type-portable {
        background: rgba(56, 189, 248, 0.12);
        color: #38bdf8;
      }

      .dolphi-device-type-alert {
        background: rgba(244, 63, 94, 0.12);
        color: #fb7185;
      }

      .dolphi-device-type-infra {
        background: rgba(45, 212, 191, 0.12);
        color: #2dd4bf;
      }

      .dolphi-device-type-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .dolphi-device-type-toolbar > span {
        color: var(--text-muted);
        font-size: 0.76rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .dolphi-device-type-filters {
        display: inline-flex;
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--card-bg-solid);
      }

      .dolphi-device-type-filter {
        display: inline-flex;
        min-height: 34px;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 7px 12px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--text-muted);
        font-family: inherit;
        font-size: 0.76rem;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
      }

      .dolphi-device-type-filter:hover,
      .dolphi-device-type-filter.active {
        background: var(--secondary);
        color: #ffffff;
      }

      .dolphi-device-type-filter[data-dashboard-device-type="MOBILE"] {
        color: #fb923c;
      }

      .dolphi-device-type-filter[data-dashboard-device-type="MOBILE"]:hover,
      .dolphi-device-type-filter[data-dashboard-device-type="MOBILE"].active {
        background: rgba(251, 146, 60, 0.16);
        color: #fb923c;
      }

      .dolphi-device-type-filter[data-dashboard-device-type="PORTATIF"] {
        color: #38bdf8;
      }

      .dolphi-device-type-filter[data-dashboard-device-type="PORTATIF"]:hover,
      .dolphi-device-type-filter[data-dashboard-device-type="PORTATIF"].active {
        background: rgba(56, 189, 248, 0.16);
        color: #38bdf8;
      }

      .dolphi-device-type-filter:focus-visible {
        outline: 2px solid var(--primary);
        outline-offset: 2px;
      }

      .dolphi-operation-delay {
        flex-shrink: 0;
        color: var(--primary);
        text-align: right;
      }

      .dolphi-empty {
        padding: 22px;
        color: var(--text-muted);
        text-align: center;
      }

      .dolphi-field {
        display: flex;
        flex-direction: column;
        gap: 7px;
        color: var(--text-muted);
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      (function() {
        const LOG_ENDPOINT = '/api/logs/ui';
        
        function sendLog(event, details) {
          const payload = {
            event: event,
            path: window.location.pathname + window.location.search + window.location.hash,
            details: details,
            timestamp: new Date().toISOString()
          };
          fetch(LOG_ENDPOINT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload),
            keepalive: true
          }).catch(err => {});
        }

        let lastPath = window.location.pathname + window.location.search + window.location.hash;
        
        function checkNavigation() {
          const currentPath = window.location.pathname + window.location.search + window.location.hash;
          if (currentPath !== lastPath) {
            lastPath = currentPath;
            sendLog('NAVIGATION', {});
          }
        }

        const originalPushState = history.pushState;
        history.pushState = function() {
          originalPushState.apply(this, arguments);
          checkNavigation();
        };

        const originalReplaceState = history.replaceState;
        history.replaceState = function() {
          originalReplaceState.apply(this, arguments);
          checkNavigation();
        };

        window.addEventListener('popstate', checkNavigation);

        document.addEventListener('click', function(e) {
          let target = e.target;
          let interactiveEl = null;
          let depth = 0;
          let curr = target;
          
          while (curr && depth < 4) {
            const tag = curr.tagName ? curr.tagName.toUpperCase() : '';
            const role = curr.getAttribute ? curr.getAttribute('role') : '';
            let cursor = '';
            try {
              if (window.getComputedStyle && curr instanceof Element) {
                cursor = window.getComputedStyle(curr).cursor;
              }
            } catch (err) {}
            
            const hasClickAttr = curr.getAttribute && (curr.getAttribute('onclick') || curr.getAttribute('@click') || curr.getAttribute('v-on:click'));
            
            if (
              tag === 'BUTTON' || 
              tag === 'A' || 
              (tag === 'INPUT' && ['submit', 'button', 'checkbox', 'radio', 'image'].includes(curr.type)) ||
              tag === 'SELECT' || 
              tag === 'OPTION' ||
              role === 'button' ||
              role === 'link' ||
              role === 'checkbox' ||
              role === 'switch' ||
              cursor === 'pointer' ||
              hasClickAttr ||
              (curr.className && typeof curr.className === 'string' && (curr.className.includes('btn') || curr.className.includes('button') || curr.className.includes('toggle')))
            ) {
              interactiveEl = curr;
              break;
            }
            curr = curr.parentNode;
            depth++;
          }
          
          if (!interactiveEl) return;
          
          let label = '';
          if (interactiveEl.innerText) {
            label = interactiveEl.innerText.trim();
          }
          
          if (!label && interactiveEl.getAttribute) {
            label = interactiveEl.getAttribute('aria-label') || 
                    interactiveEl.getAttribute('title') || 
                    interactiveEl.getAttribute('placeholder') ||
                    interactiveEl.getAttribute('alt');
          }
          
          if (!label && interactiveEl.tagName === 'INPUT') {
            label = interactiveEl.value || interactiveEl.name || interactiveEl.type;
          }
          
          if (!label && interactiveEl.id) {
            label = '#' + interactiveEl.id;
          }
          
          if (!label) {
            label = interactiveEl.tagName;
          }
          
          label = label.substring(0, 60);
          
          sendLog('CLICK', {
            tag: interactiveEl.tagName.toLowerCase(),
            label: label,
            id: interactiveEl.id || '',
            class: typeof interactiveEl.className === 'string' ? interactiveEl.className : '',
            type: interactiveEl.type || '',
            role: interactiveEl.getAttribute ? interactiveEl.getAttribute('role') : ''
          });
        }, true);

        document.addEventListener('change', function(e) {
          const target = e.target;
          if (!target) return;
          
          const tag = target.tagName ? target.tagName.toUpperCase() : '';
          const type = target.type ? target.type.toLowerCase() : '';
          
          let label = '';
          if (target.id) {
            const labelEl = document.querySelector('label[for="' + target.id + '"]');
            if (labelEl) label = labelEl.innerText.trim();
          }
          if (!label && target.placeholder) label = target.placeholder;
          if (!label && target.name) label = target.name;
          
          let val = target.value;
          if (type === 'checkbox') {
            val = target.checked ? 'TRUE' : 'FALSE';
          } else if (type === 'radio') {
            val = target.checked ? target.value : '';
            if (!val) return;
          }
          
          sendLog('CHANGE', {
            tag: tag.toLowerCase(),
            name: target.name || target.id || '',
            label: label || target.name || '',
            value: val
          });
        }, true);

        document.addEventListener('submit', function(e) {
          const form = e.target;
          if (!form) return;
          
          const fields = {};
          try {
            const formData = new FormData(form);
            for (let [key, val] of formData.entries()) {
              if (/pass|token|secret|key/i.test(key)) {
                fields[key] = '********';
              } else {
                fields[key] = val;
              }
            }
          } catch (err) {}
          
          try {
            const inputs = form.querySelectorAll('input, select, textarea');
            inputs.forEach(input => {
              if (input.id && !fields[input.id] && (!input.name || input.name === '')) {
                const key = input.id;
                const val = input.value;
                if (input.type === 'password' || /pass|token|secret|key/i.test(key)) {
                  fields[key] = '********';
                } else {
                  fields[key] = val;
                }
              }
            });
          } catch (err) {}

          sendLog('SUBMIT', {
            id: form.id || '',
            name: form.name || '',
            fields: fields
          });
        }, true);
        
      })();

      (function() {

        /* ------ Helpers ------ */
        function addGlowBg() {
          if (document.querySelector('.magic-bg-glow')) return;

          const g2 = document.createElement('div');

          document.body.prepend(g2);
          document.body.prepend(g1);
        }

        function removeGlowBg() {
          document.querySelectorAll('.magic-bg-glow').forEach(el => el.remove());
        }

        /* ------ Mouse tracking pour le glow MagicCard ------ */
        function trackMouse(el) {
          // Glow effect disabled
        }

        /* ------ Application des effets login ------ */
        function applyLoginEffects() {
          // Cherche le conteneur de la card de login
          // La page login a un formulaire avec un champ username et password
          const inputs = document.querySelectorAll('input[type="password"], input[type="text"], input[placeholder*="tilisateur"], input[placeholder*="Mot"], input[name*="pass"], input[name*="user"]');
          if (inputs.length === 0) return false;

          // Remonter jusqu'à la card englobante
          let card = null;
          let el = inputs[0];
          for (let i = 0; i < 8; i++) {
            el = el.parentElement;
            if (!el) break;
            const s = window.getComputedStyle(el);
            if ((s.background && s.background.includes('rgba') || el.className.includes('glass') || el.className.includes('card') || el.className.includes('login') || el.className.includes('form') || el.className.includes('container')) && el.offsetWidth > 200) {
              card = el;
              break;
            }
          }

          if (!card) {
            // Fallback : prend le premier ancêtre avec une taille raisonnable
            el = inputs[0];
            for (let i = 0; i < 6; i++) {
              el = el.parentElement;
              if (!el) break;
              if (el.offsetWidth > 200 && el.offsetWidth < window.innerWidth * 0.8) {
                card = el;
                break;
              }
            }
          }

          if (card && !card.classList.contains('login-magic-wrap')) {
            card.classList.add('login-magic-wrap');
            trackMouse(card);
          }

          // Bouton de login → pulsating
          const btns = document.querySelectorAll('button[type="submit"], button');
          btns.forEach(btn => {
            const txt = btn.textContent.toLowerCase();
            if ((txt.includes('connect') || txt.includes('login') || txt.includes('identif') || txt.includes('valider') || txt.includes('sign')) && !btn.classList.contains('pulsating-btn')) {
              btn.classList.add('pulsating-btn');
            }
          });

          // Wrapping des inputs pour shimmer
          inputs.forEach(input => {
            if (!input.parentElement.classList.contains('magic-input-wrap')) {
              const wrap = document.createElement('div');
              wrap.className = 'magic-input-wrap';
              input.parentNode.insertBefore(wrap, input);
              wrap.appendChild(input);
            }
          });

          return true;
        }

        /* ------ Application des effets menus / nav ------ */
        function applyNavEffects() {
          // Cherche les éléments de navigation sidebar
          const navItems = document.querySelectorAll('nav a, nav button, [class*="sidebar"] a, [class*="sidebar"] button, [class*="nav"] a, [class*="menu"] li, [class*="nav-item"]');
          navItems.forEach(item => {
            if (!item.classList.contains('magic-nav-item')) {
              item.classList.add('magic-nav-item');
            }
          });

          // Cards du dashboard → MagicCard glow
          const cards = document.querySelectorAll('[class*="card"], [class*="glass"], [class*="stat"], [class*="widget"], [class*="panel"]');
          cards.forEach(card => {
            // Exclure les éléments de tableau ou leurs conteneurs pour éviter les bugs de bordure (effet de ligne rouge transversale)
            const tagName = card.tagName.toUpperCase();
            if (tagName === 'TABLE' || tagName === 'TR' || tagName === 'TD' || tagName === 'TH' || tagName === 'TBODY' || tagName === 'THEAD' || card.classList.contains('table-container') || card.closest('table')) {
              return;
            }
            if (!card.classList.contains('magic-card-wrapper') && !card.classList.contains('login-magic-wrap')) {
              card.classList.add('magic-card-wrapper');
              trackMouse(card);
            }
          });
        }

        /* ------ Détection page login vs dashboard ------ */
        function isLoginPage() {
          return !!document.querySelector('input[type="password"]');
        }

        /* ------ Application complète ------ */
        function applyEffects() {
          if (isLoginPage()) {
            addGlowBg();
            applyLoginEffects();
          } else {
            removeGlowBg();
            applyNavEffects();
          }
        }

        /* ------ Observer les changements React (SPA) ------ */
        const root = document.getElementById('root');
        if (root) {
          const observer = new MutationObserver(function() {
            // Léger délai pour que React finisse son render
            clearTimeout(window._magicTimer);
            window._magicTimer = setTimeout(applyEffects, 120);
          });
          observer.observe(root, { childList: true, subtree: true, attributes: false });
        }

        // Application initiale dès que le DOM est prêt
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            setTimeout(applyEffects, 300);
          });
        } else {
          setTimeout(applyEffects, 300);
        }

      })();
    </script>

            const typeButton = findVisibleButton(typeLabels[normalizedText(item.type)] || item.type);
            if (typeButton) {
              item._typeClicked = true;
              typeButton.click();
            }
          }
          setTimeout(() => processPendingDeviceNavigation(attempt + 1), 150);
        }

        function navigateToDevice(item) {
          pendingDeviceNavigation = { ...item };
          closeExtension();
          const standardButton = Array.from(document.querySelectorAll('nav button')).find(button =>
            button.textContent.includes('Vue Standard')
          );
          if (standardButton) standardButton.click();
          try {
            if (window.parent && typeof window.parent.onLegacyViewChanged === 'function') {
              window.parent.onLegacyViewChanged('standard');
            }
          } catch (error) {
            console.warn('Impossible de synchroniser la navigation parente.', error);
          }
          setTimeout(() => processPendingDeviceNavigation(0), 100);
        }

        function deviceTypeMeta(type) {
          const normalized = normalizedText(type);
          if (normalized === 'MOBILE') {
            return { label: 'Mobile', className: 'dolphi-device-type-mobile', icon: deviceTypeIcon('MOBILE') };
          }
          if (normalized === 'PORTATIF') {
            return { label: 'Portatif', className: 'dolphi-device-type-portable', icon: deviceTypeIcon('PORTATIF') };
          }
          if (normalized === 'ALERTE') {
            return { label: 'Alerte', className: 'dolphi-device-type-alert', icon: deviceTypeIcon('ALERTE') };
          }
          if (normalized === 'INFRA') {
            return { label: 'Infra', className: 'dolphi-device-type-infra', icon: deviceTypeIcon('INFRA') };
          }
          return null;
        }

        function filterDashboardDevices(items) {
          if (dashboardDeviceType === 'ALL') return items;
          return items.filter(item => normalizedText(item.type) === dashboardDeviceType);
        }

          if (typeMeta) {

            typeBadge.innerHTML = typeMeta.icon + '<span>' + typeMeta.label + '</span>';
            typeCell.appendChild(typeBadge);

            typeCell.textContent = '—';

          const affectationCell = document.createElement('td');

          const dateCell = document.createElement('td');
          dateCell.textContent = item.date_cle_a_faire || item.date_fin || '—';

          const delayCell = document.createElement('td');

          let delayLbl = label;
          let delayClass = 'dolphi-dashboard-delay' + (upcoming ? ' dolphi-dashboard-delay-upcoming' : '');

          if (dashboardFilter === 'hidden_devices') {
            if (item.days_overdue != null) {
              delayVal = item.days_overdue;
              delayLbl = 'de retard';
              delayClass = 'dolphi-dashboard-delay';
            } else if (item.days_remaining != null) {
              delayVal = item.days_remaining;
              delayLbl = 'restants';
              delayClass = 'dolphi-dashboard-delay dolphi-dashboard-delay-upcoming';
            } else {
              delayVal = '—';
              delayLbl = 'masqué';
              delayClass = 'dolphi-dashboard-delay';
            }
          }

          delayCell.className = delayClass;
          if (delayVal !== '—') {
            const barWidth = Math.min(100, Math.max(10, Math.log10(Number(delayVal || 0) + 1) * 30));
            delayCell.innerHTML = '<div class="dolphi-dashboard-delay-value"><strong>' + escapeHtml(delayVal) + ' j</strong><span class="dolphi-dashboard-delay-bar"><i style="width:' + barWidth + '%"></i></span></div><small>' + escapeHtml(delayLbl) + '</small>';
          } else {
            delayCell.textContent = '—';
          }

          const actionCell = document.createElement('td');
          actionCell.className = 'dolphi-dashboard-row-actions';
          if (dashboardFilter === 'hidden_devices') {
            const restoreButton = document.createElement('button');
            restoreButton.type = 'button';
            restoreButton.className = 'dolphi-dashboard-icon-action';
            restoreButton.title = 'Restaurer au tableau de bord';
            restoreButton.setAttribute('aria-label', 'Restaurer cet équipement au tableau de bord');
            restoreButton.innerHTML = dashboardIcon('restore');
            restoreButton.addEventListener('click', () => restoreDashboardDevice(item, restoreButton));
            actionCell.appendChild(restoreButton);
          } else if (item.id && item.date_cle_a_faire) {
            const hideButton = document.createElement('button');
            hideButton.type = 'button';
            hideButton.className = 'dolphi-dashboard-icon-action';
            hideButton.title = 'Masquer du tableau de bord';
            hideButton.setAttribute('aria-label', 'Masquer cet équipement du tableau de bord');

          row.append(deviceCell, typeCell, affectationCell, dateCell, delayCell, actionCell);

        async function hideDashboardDevice(item, button) {
          if (!window.confirm("Voulez-vous vraiment masquer cet équipement ?\n\nCela le retirera du tableau de bord et diminuera les compteurs d'appareils à mettre à jour de 1 de partout.")) {
            return;
          }
          button.disabled = true;
          try {
            await fetchJson('/api/dashboard/devices/' + item.id + '/hide', { method: 'POST' });
            await loadDashboard();
          } catch (error) {
            button.disabled = false;
            alert(error.message);
          }
        }

        async function restoreDashboardDevice(item, button) {
          button.disabled = true;
          try {
            await fetchJson('/api/dashboard/devices/' + item.id + '/restore', { method: 'POST' });
            await loadDashboard();
          } catch (error) {
            button.disabled = false;
            alert(error.message);
          }
        }



        function fillOperationList(id, items, label, upcoming) {
          const list = extensionMain.querySelector('#' + id);
          list.innerHTML = '';
          if (!items.length) {
            const empty = document.createElement('tr');
            empty.className = 'dolphi-dashboard-empty-row';
            empty.innerHTML = '<td colspan="6">Aucune opération dans cette catégorie.</td>';
            list.appendChild(empty);
            return;
          }
          items.forEach(item => list.appendChild(operationRow(item, label, upcoming)));
        }

        function parseDashboardDate(value) {
          if (!value) return null;
          const raw = String(value).trim().split(' ')[0];
          let match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if (match) return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
          match = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
          if (!match) return null;
          let year = Number(match[3]);
          if (year < 100) year += year < 70 ? 2000 : 1900;
          return new Date(year, Number(match[1]) - 1, Number(match[2]));
        }

        async function buildDashboardFallback() {
          const [devices, stock] = await Promise.all([
            fetchJson('/api/search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({})
            }),
            fetchJson('/api/stock')
          ]);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const oneDay = 86400000;
          const overdueCryptage = [];
          const approachingCryptage = [];
          let upToDateCryptage = 0;
          const typeDistribution = {};
          devices.filter(item => {
            const type = String(item.type || '').trim().toUpperCase();
            const cis = String(item.cis || '').trim().toUpperCase();
            return !['TEST', 'PERDU', 'REFORME', 'RÉFORME'].includes(cis) && type !== 'BIP' && type !== 'BIPS';
          }).forEach(item => {
            const dueDate = parseDashboardDate(item.date_cle_a_faire);
            if (!dueDate) return;
            const type = normalizedText(item.type) || 'AUTRE';
            typeDistribution[type] = (typeDistribution[type] || 0) + 1;
            const days = Math.round((dueDate - today) / oneDay);
            if (days < 0) overdueCryptage.push({ ...item, days_overdue: Math.abs(days) });
            else if (days <= 30) approachingCryptage.push({ ...item, days_remaining: days });
            else upToDateCryptage += 1;
          });
          const overdueLoans = stock
            .filter(item => String(item.cis || '').trim().toUpperCase() !== 'TEST' && item.active_pret_id)
            .map(item => {
              const dueDate = parseDashboardDate(item.date_fin);
              return dueDate && dueDate < today
                ? { ...item, days_overdue: Math.round((today - dueDate) / oneDay) }
                : null;
            })
            .filter(Boolean);
          overdueCryptage.sort((a, b) => b.days_overdue - a.days_overdue);
          approachingCryptage.sort((a, b) => a.days_remaining - b.days_remaining);
          overdueLoans.sort((a, b) => b.days_overdue - a.days_overdue);
          return {
            summary: {
              overdue_cryptage: overdueCryptage.length,
              approaching_cryptage: approachingCryptage.length,
              up_to_date_cryptage: upToDateCryptage,
              total_cryptage: Object.values(typeDistribution).reduce((sum, count) => sum + count, 0),
              type_distribution: typeDistribution,
              overdue_loans: overdueLoans.length,
              total_urgent: overdueCryptage.length + overdueLoans.length
            },
            overdue_cryptage: overdueCryptage,
            approaching_cryptage: approachingCryptage,
            overdue_loans: overdueLoans
          };
        }

        async function loadDashboard() {
          const feedback = extensionMain.querySelector('#dolphi-dashboard-feedback');
          if (feedback) {
            feedback.className = 'dolphi-feedback';
            feedback.textContent = 'Chargement des opérations...';
          }
          try {
            let data;
            try {
              data = await fetchJson('/api/dashboard/urgent');
            } catch (error) {
              data = await buildDashboardFallback();
            }
            dashboardData = data;

            // Extract unique CIS names
            const cisSet = new Set();
            const collectCis = arr => {
              if (Array.isArray(arr)) {
                arr.forEach(item => {
                  if (item.cis) {
                    const trimmed = String(item.cis).trim();
                    if (trimmed && trimmed.toUpperCase() !== 'N/A' && trimmed.toUpperCase() !== 'TEST') {
                      cisSet.add(trimmed);
                    }
                  }
                });
              }
            };
            if (data) {
              collectCis(data.overdue_cryptage);
              collectCis(data.approaching_cryptage);
              collectCis(data.overdue_loans);
              collectCis(data.hidden_devices);
            }
            dashboardAvailableCis = Array.from(cisSet).sort((a, b) => a.localeCompare(b, 'fr'));

            updateDashboardFilter();
            if (feedback) {
              feedback.remove();
            }
          } catch (error) {
            if (feedback) {
              feedback.className = 'dolphi-feedback error';
              feedback.textContent = error.message;
            }
          }
        }

        function updateDashboardFilter() {
          if (!dashboardData || !extensionMain) return;
          const summary = dashboardData.summary || {};
          const filters = {
            overdue_cryptage: {
              title: 'Cryptages dépassés',
              count: summary.overdue_cryptage || 0,
              items: dashboardData.overdue_cryptage || [],
              label: 'de retard',
              upcoming: false
            },
            approaching_cryptage: {
              title: 'Cryptages sous 30 jours',
              count: summary.approaching_cryptage || 0,
              items: dashboardData.approaching_cryptage || [],
              label: 'restants',
              upcoming: true
            },
            hidden_devices: {
              title: 'Appareils masqués',
              count: summary.hidden_devices || 0,
              items: dashboardData.hidden_devices || [],
              label: 'masqué',
              upcoming: false
            },
            overdue_loans: {
              title: 'Prêts en retard',
              count: summary.overdue_loans || 0,
              items: dashboardData.overdue_loans || [],
              label: 'de retard',
              upcoming: false
            }
          };
          const selected = filters[dashboardFilter] || filters.overdue_cryptage;
          
          let selectedItems = [...(selected.items || [])];
          
          // 1. Filter by CIS search
          if (dashboardCisFilter) {
            const cleanFilter = dashboardCisFilter.trim().toUpperCase();
            selectedItems = selectedItems.filter(item => 
              item.cis && String(item.cis).trim().toUpperCase() === cleanFilter
            );
          }

          // 2. Filter by Device Type
          if (dashboardSection === 'cryptage') {
            selectedItems = filterDashboardDevices(selectedItems);
          }

          // 3. Sort items
          const upcoming = selected.upcoming;
          selectedItems.sort((a, b) => {
            if (upcoming) {
              // Approaching cryptage: days_remaining
              // Default (desc): closest to deadline (ascending value of days_remaining)
              // Alternate (asc): furthest from deadline (descending value of days_remaining)
              const valA = a.days_remaining != null ? Number(a.days_remaining) : 99999;
              const valB = b.days_remaining != null ? Number(b.days_remaining) : 99999;
              return dashboardSortOrder === 'desc' ? (valA - valB) : (valB - valA);
            } else {
              // Overdue cryptage / loans: days_overdue
              // Default (desc): most overdue (descending value of days_overdue)
              // Alternate (asc): least overdue (ascending value of days_overdue)
              const valA = a.days_overdue != null ? Number(a.days_overdue) : -1;
              const valB = b.days_overdue != null ? Number(b.days_overdue) : -1;
              return dashboardSortOrder === 'desc' ? (valB - valA) : (valA - valB);
            }
          });

          dashboardCurrentItems = selectedItems;
          const overdueCount = filterDashboardDevices(filters.overdue_cryptage.items).length;
          const approachingCount = filterDashboardDevices(filters.approaching_cryptage.items).length;
          const validCount = Number(summary.up_to_date_cryptage || 0);
          const totalCount = Number(summary.total_cryptage || (filters.overdue_cryptage.count + filters.approaching_cryptage.count + validCount));
          extensionMain.querySelector('#cryptage-count').textContent = overdueCount;
          extensionMain.querySelector('#approaching-count').textContent = approachingCount;
          extensionMain.querySelector('#hidden-count').textContent = Number(summary.hidden_devices || 0);
          extensionMain.querySelector('#loan-count').textContent = filters.overdue_loans.count;
          extensionMain.querySelector('#dashboard-filter-title').textContent = selected.title;
          extensionMain.querySelector('#dashboard-filter-badge').textContent = selectedItems.length;

          const activity = dashboardData.last_cryptage_update;
          const activityDate = activity && activity.updated_at ? new Date(activity.updated_at) : null;
          let updatedLabel = 'Aucun cryptage enregistré';
          let updatedDetail = '';
          if (activityDate && !Number.isNaN(activityDate.getTime())) {
            updatedLabel = activityDate.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            if (activity.date_only) {
              updatedDetail = 'Heure historique non disponible';
            } else {
              updatedLabel += ' à ' + activityDate.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
              updatedDetail = activity.device_count + ' équipement' + (activity.device_count > 1 ? 's' : '') + ' mis à jour';
            }
          }
          extensionMain.querySelector('#dashboard-updated-at').textContent = updatedLabel;
          extensionMain.querySelector('#dashboard-updated-detail').textContent = updatedDetail;

          const distribution = summary.type_distribution || {};
          const mobileCount = Number(distribution.MOBILE || 0);
          const portableCount = Number(distribution.PORTATIF || 0);
          const otherCount = Math.max(0, totalCount - mobileCount - portableCount);
          const distributionTotal = Math.max(1, mobileCount + portableCount + otherCount);
          const portablePercent = portableCount / distributionTotal * 100;
          const mobilePercent = mobileCount / distributionTotal * 100;
          const donut = extensionMain.querySelector('#dashboard-type-donut');
          donut.style.setProperty('--portable-end', portablePercent + '%');
          donut.style.setProperty('--mobile-end', (portablePercent + mobilePercent) + '%');
          extensionMain.querySelector('#portable-total').textContent = portableCount;
          const formatPercent = value => value.toLocaleString('fr-FR', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' %';
          extensionMain.querySelector('#portable-percent').textContent = formatPercent(portablePercent);
          extensionMain.querySelector('#mobile-total').textContent = mobileCount;
          extensionMain.querySelector('#mobile-percent').textContent = formatPercent(mobilePercent);
          extensionMain.querySelector('#other-total').textContent = otherCount;
          extensionMain.querySelector('#other-percent').textContent = formatPercent(otherCount / distributionTotal * 100);

          const deadlineTotal = Math.max(1, Number(summary.overdue_cryptage || 0) + Number(summary.approaching_cryptage || 0) + validCount);
          const overduePercent = Number(summary.overdue_cryptage || 0) / deadlineTotal * 100;
          const approachingPercent = Number(summary.approaching_cryptage || 0) / deadlineTotal * 100;
          const validPercent = validCount / deadlineTotal * 100;
          extensionMain.querySelector('#deadline-overdue').style.width = overduePercent + '%';
          extensionMain.querySelector('#deadline-soon').style.width = approachingPercent + '%';
          extensionMain.querySelector('#deadline-valid').style.width = validPercent + '%';
          extensionMain.querySelector('#deadline-overdue-value').textContent = summary.overdue_cryptage || 0;
          extensionMain.querySelector('#deadline-soon-value').textContent = summary.approaching_cryptage || 0;
          extensionMain.querySelector('#deadline-valid-value').textContent = validCount;
          extensionMain.querySelectorAll('[data-dashboard-filter]').forEach(button => {
            button.classList.toggle('active', button.dataset.dashboardFilter === dashboardFilter);
          });
          extensionMain.querySelectorAll('[data-dashboard-section]').forEach(button => {
            const active = button.dataset.dashboardSection === dashboardSection;
            button.classList.toggle('active', active);
            button.setAttribute('aria-selected', active ? 'true' : 'false');
          });
          extensionMain.querySelectorAll('[data-dashboard-panel]').forEach(panel => {
            panel.hidden = panel.dataset.dashboardPanel !== dashboardSection;
          });
          const typeToolbar = extensionMain.querySelector('#dolphi-device-type-toolbar');
          if (typeToolbar) typeToolbar.hidden = dashboardSection !== 'cryptage';
          extensionMain.querySelectorAll('[data-dashboard-device-type]').forEach(button => {
            const active = button.dataset.dashboardDeviceType === dashboardDeviceType;
            button.classList.toggle('active', active);
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
          });
          fillOperationList('dashboard-filter-list', selectedItems, selected.label, selected.upcoming);
        }

        function exportDashboardCsv() {
          if (!dashboardCurrentItems.length) return;
          const rows = [['Numéro de série', 'Type', 'CIS', 'Affectation', 'Modèle', 'Date limite', 'Délai']];
          dashboardCurrentItems.forEach(item => {
            const delay = item.days_remaining != null ? item.days_remaining + ' jours restants' : item.days_overdue + ' jours de retard';
            rows.push([
              item.num_serie || item.nom || '',
              item.type || '',
              item.cis || '',
              item.affectation || item.emprunteur || '',
              item.modele || '',
              item.date_cle_a_faire || item.date_fin || '',
              delay
            ]);
          });

              dashboardSortOrder = e.target.value;

            });
          }

          // Bind CIS typeahead search
          const cisInput = extensionMain.querySelector('#dashboard-cis-search');
          const cisClear = extensionMain.querySelector('#dashboard-cis-clear');
          const cisSuggestions = extensionMain.querySelector('#dashboard-cis-suggestions');

          if (cisInput && cisSuggestions && cisClear) {
            cisInput.value = dashboardCisFilter;
            if (dashboardCisFilter) {
              cisClear.style.display = 'block';
            }

            const renderCisSuggestions = (filterText) => {
              const query = filterText.trim().toLowerCase();
              const matches = dashboardAvailableCis.filter(cis => 
                cis.toLowerCase().includes(query)
              );

              cisSuggestions.innerHTML = '';
              if (matches.length > 0) {
                matches.forEach(cis => {
                  const div = document.createElement('div');
                  div.className = 'dolphi-typeahead-suggestion-item';
                  div.textContent = cis;
                  div.addEventListener('click', () => {
                     cisInput.value = cis;
                     dashboardCisFilter = cis;
                     cisClear.style.display = 'block';
                     cisSuggestions.style.display = 'none';
                     updateDashboardFilter();
                  });
                  cisSuggestions.appendChild(div);
                });
                cisSuggestions.style.display = 'block';
              } else {
                cisSuggestions.style.display = 'none';
              }
            };

            cisInput.addEventListener('focus', () => {
              renderCisSuggestions(cisInput.value);
            });

            cisInput.addEventListener('input', () => {
              if (cisInput.value.trim() !== '') {
                cisClear.style.display = 'block';
              } else {
                cisClear.style.display = 'none';
                dashboardCisFilter = '';
                updateDashboardFilter();
              }
              renderCisSuggestions(cisInput.value);
            });

            cisClear.addEventListener('click', () => {
              cisInput.value = '';
              cisClear.style.display = 'none';
              cisSuggestions.style.display = 'none';
              dashboardCisFilter = '';
              updateDashboardFilter();
            });

            // Click outside search container to close suggestions
            document.addEventListener('click', (e) => {
              if (!e.target.closest('.dolphi-typeahead-container')) {
                cisSuggestions.style.display = 'none';
              }
            });
          }
          if (dashboardData) updateDashboardFilter();
          loadDashboard();
        }

          let emails = [];
          let selectedEmail = null;
          let assignedDevices = [];
          let availableDevices = [];

          const notifFeedback = extensionMain.querySelector('#dolphi-notif-feedback');
          const emailsListTbody = extensionMain.querySelector('#emails-list-tbody');
          const recipientCount = extensionMain.querySelector('#notif-recipient-count');
          const emailSearchInput = extensionMain.querySelector('#notif-email-search');
          const emailConfigSection = extensionMain.querySelector('#email-config-section');
          const configTitle = extensionMain.querySelector('#config-title');
          const configSubtitle = extensionMain.querySelector('#config-subtitle');
          const selectedCard = extensionMain.querySelector('#dolphi-notif-selected-card');
          const selectedAvatar = selectedCard.querySelector('.dolphi-notif-avatar');
          const selectedEmailLabel = extensionMain.querySelector('#notif-selected-email');
          const selectedStatusLabel = extensionMain.querySelector('#notif-selected-status');
          const selectedModeLabel = extensionMain.querySelector('#notif-selected-mode');
          const selectedCountLabel = extensionMain.querySelector('#notif-selected-count');
          const notifEnabled = extensionMain.querySelector('#email-notif-enabled');
          const notifEnabledLabel = extensionMain.querySelector('#notif-enabled-label');
          const configControls = extensionMain.querySelector('#config-controls');
          const emailNotifMode = extensionMain.querySelector('#email-notif-mode');
          const globalCriteriaBox = extensionMain.querySelector('#global-criteria-box');
          const notifJMinus1 = extensionMain.querySelector('#notif-j-minus-1');
          const notifJ = extensionMain.querySelector('#notif-j');
          const assignedDevicesTbody = extensionMain.querySelector('#assigned-devices-tbody');
          const deviceAssociationBox = extensionMain.querySelector('#device-association-box');
          const deviceSelect = extensionMain.querySelector('#notif-device-select');

          function showFeedback(message, error) {
            notifFeedback.hidden = false;
            notifFeedback.className = 'dolphi-feedback ' + (error ? 'error' : 'success');
            notifFeedback.textContent = message;
            setTimeout(() => { notifFeedback.hidden = true; }, 5000);
          }

          function showConfirmationPopup(title, message) {
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100vw';
            overlay.style.height = '100vh';
            overlay.style.backgroundColor = 'rgba(0, 0, 0, 0.6)';
            overlay.style.backdropFilter = 'blur(6px)';
            overlay.style.display = 'flex';
            overlay.style.justifyContent = 'center';
            overlay.style.alignItems = 'center';
            overlay.style.zIndex = '9999';
            overlay.style.animation = 'fadeIn 0.2s ease-out';

            const modal = document.createElement('div');
            modal.style.backgroundColor = '#1e2230';
            modal.style.border = '1px solid rgba(255, 255, 255, 0.08)';
            modal.style.borderRadius = '16px';
            modal.style.padding = '28px 32px';
            modal.style.maxWidth = '420px';
            modal.style.width = '90%';
            modal.style.textAlign = 'center';
            modal.style.boxShadow = '0 20px 50px rgba(0, 0, 0, 0.6)';
            modal.style.animation = 'scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';

            const iconContainer = document.createElement('div');
            iconContainer.style.width = '64px';
            iconContainer.style.height = '64px';
            iconContainer.style.backgroundColor = 'rgba(16, 185, 129, 0.12)';
            iconContainer.style.borderRadius = '50%';
            iconContainer.style.display = 'flex';
            iconContainer.style.justifyContent = 'center';
            iconContainer.style.alignItems = 'center';
            iconContainer.style.margin = '0 auto 20px auto';
            iconContainer.innerHTML = `
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="#10b981" style="width: 32px; height: 32px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
              </svg>
            `;
            modal.appendChild(iconContainer);

            const titleEl = document.createElement('h3');
            titleEl.textContent = title;
            titleEl.style.color = '#ffffff';
            titleEl.style.fontSize = '20px';
            titleEl.style.fontWeight = '600';
            titleEl.style.margin = '0 0 10px 0';
            titleEl.style.fontFamily = 'system-ui, -apple-system, sans-serif';
            modal.appendChild(titleEl);

            const msgEl = document.createElement('p');
            msgEl.textContent = message;
            msgEl.style.color = '#94a3b8';
            msgEl.style.fontSize = '14px';
            msgEl.style.margin = '0 0 24px 0';
            msgEl.style.lineHeight = '1.6';
            msgEl.style.fontFamily = 'system-ui, -apple-system, sans-serif';
            modal.appendChild(msgEl);

            const btn = document.createElement('button');
            btn.textContent = 'Continuer';
            btn.style.backgroundColor = '#10b981';
            btn.style.color = '#ffffff';
            btn.style.border = 'none';
            btn.style.borderRadius = '8px';
            btn.style.padding = '12px 30px';
            btn.style.fontSize = '14px';
            btn.style.fontWeight = '600';
            btn.style.cursor = 'pointer';
            btn.style.transition = 'all 0.2s';
            btn.style.fontFamily = 'system-ui, -apple-system, sans-serif';
            btn.style.boxShadow = '0 4px 12px rgba(16, 185, 129, 0.2)';
            
            btn.addEventListener('mouseover', () => { 
              btn.style.backgroundColor = '#059669';
              btn.style.transform = 'translateY(-1px)';
            });
            btn.addEventListener('mouseout', () => { 
              btn.style.backgroundColor = '#10b981';
              btn.style.transform = 'translateY(0)';
            });
            btn.addEventListener('click', () => {
              overlay.style.animation = 'fadeOut 0.15s ease-in';
              modal.style.animation = 'scaleDown 0.15s ease-in';
              setTimeout(() => { document.body.removeChild(overlay); }, 140);
            });
            modal.appendChild(btn);

            overlay.appendChild(modal);

            if (!document.getElementById('modal-animations-style')) {
              const style = document.createElement('style');
              style.id = 'modal-animations-style';
              style.innerHTML = `
                @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
                @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
                @keyframes scaleDown { from { transform: scale(1); opacity: 1; } to { transform: scale(0.95); opacity: 0; } }
              `;
              document.head.appendChild(style);
            }

            document.body.appendChild(overlay);
          }


          function modeLabel(item) {
            return item && item.global_enabled ? 'Toutes les alertes' : 'Personnalisé';
          }

          function statusLabel(item) {
            return item && item.enabled ? 'Actif' : 'Désactivé';
          }

          function updateSelectedSummary() {
            if (!selectedEmail) {
              selectedCard.classList.add('is-empty');
              selectedAvatar.textContent = '?';
              selectedEmailLabel.textContent = 'Aucun destinataire sélectionné';
              selectedStatusLabel.textContent = 'Sélection requise';
              selectedStatusLabel.className = 'dolphi-pill muted';
              selectedModeLabel.textContent = 'Choisissez une adresse à configurer';
              selectedCountLabel.textContent = '0 appareil associé';
              configTitle.textContent = 'Configuration';
              configSubtitle.textContent = 'Sélectionnez un destinataire pour modifier ses préférences.';
              return;
            }

            selectedCard.classList.remove('is-empty');
            selectedAvatar.textContent = (selectedEmail.email || '?').trim().charAt(0).toUpperCase();
            selectedEmailLabel.textContent = selectedEmail.email;
            selectedStatusLabel.textContent = statusLabel(selectedEmail);
            selectedStatusLabel.className = 'dolphi-pill ' + (selectedEmail.enabled ? 'success' : 'danger');
            selectedModeLabel.textContent = modeLabel(selectedEmail);
            selectedCountLabel.textContent = assignedDevices.length + ' appareil' + (assignedDevices.length > 1 ? 's' : '') + ' associé' + (assignedDevices.length > 1 ? 's' : '');
            configTitle.textContent = 'Configuration de ' + selectedEmail.email;
            configSubtitle.textContent = 'Définissez comment ce destinataire reçoit ses alertes.';
          }

          async function loadEmails() {
            try {
              emails = await fetchJson('/api/notifications/emails');
              recipientCount.textContent = emails.length + ' destinataire' + (emails.length > 1 ? 's' : '');
              renderEmailsList();
            } catch (err) {
              showFeedback('Erreur de chargement des emails : ' + err.message, true);
            }
          }

          function renderEmailsList() {
            const query = (emailSearchInput.value || '').trim().toLowerCase();
            const filtered = emails.filter(item => !query || String(item.email || '').toLowerCase().includes(query));
            if (!filtered.length) {
              emailsListTbody.innerHTML = '<tr><td colspan="4" class="dolphi-notif-empty">Aucun destinataire trouvé.</td></tr>';
              return;
            }

            emailsListTbody.innerHTML = '';
            filtered.forEach(item => {
              const tr = document.createElement('tr');
              tr.className = 'dolphi-notif-email-row' + (selectedEmail && selectedEmail.id === item.id ? ' selected' : '');
              tr.addEventListener('click', () => selectEmail(item));

              const tdEmail = document.createElement('td');
              tdEmail.innerHTML = '<strong class="dolphi-notif-email-main">' + escapeHtml(item.email) + '</strong>';
              const tdMode = document.createElement('td');
              tdMode.innerHTML = '<span class="dolphi-pill info">' + escapeHtml(modeLabel(item)) + '</span>';
              const tdStatus = document.createElement('td');
              tdStatus.innerHTML = '<span class="dolphi-pill ' + (item.enabled ? 'success' : 'danger') + '">' + escapeHtml(statusLabel(item)) + '</span>';
              
              const tdActions = document.createElement('td');
              tdActions.className = 'dolphi-notif-row-actions';
              const delBtn = document.createElement('button');
              delBtn.type = 'button';
              delBtn.className = 'dolphi-notif-icon-btn danger';
              delBtn.title = "Supprimer ce destinataire";
              delBtn.setAttribute('aria-label', "Supprimer le destinataire " + item.email);
              delBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;"><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path></svg>';
              delBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (!confirm("Supprimer définitivement le destinataire " + item.email + " ainsi que toutes ses associations ?")) return;
                try {
                  await fetchJson('/api/notifications/emails/' + item.id, { method: 'DELETE' });
                  showFeedback('Destinataire supprimé avec succès.');
                  if (selectedEmail && selectedEmail.id === item.id) {
                    selectedEmail = null;
                    disableConfigPanel();
                  }
                  await loadEmails();
                } catch (err) {
                  showFeedback(err.message, true);
                }
              });
              tdActions.appendChild(delBtn);

              tr.appendChild(tdEmail);
              tr.appendChild(tdMode);
              tr.appendChild(tdStatus);
              tr.appendChild(tdActions);
              emailsListTbody.appendChild(tr);
            });
          }

          function setMode(mode) {
            emailNotifMode.value = mode;
            extensionMain.querySelectorAll('.dolphi-mode-card').forEach(card => {
              const active = card.dataset.mode === mode;
              card.classList.toggle('active', active);
              card.setAttribute('aria-checked', active ? 'true' : 'false');
            });
            updateCriteriaVisibility();
          }

          function disableConfigPanel() {
            emailConfigSection.classList.add('disabled');
            emailConfigSection.classList.remove('notifications-locked');
            configControls.style.pointerEvents = 'none';
            configControls.style.opacity = '0.46';
            notifEnabled.checked = false;
            notifEnabledLabel.textContent = 'Inactif';
            setMode('devices');
            deviceSelect.innerHTML = '<option value="">Sélectionner un appareil à associer</option>';
            deviceAssociationBox.classList.add('disabled');
            assignedDevicesTbody.innerHTML = '<tr><td colspan="5" class="dolphi-notif-empty">Sélectionnez une adresse pour afficher les équipements.</td></tr>';
            updateSelectedSummary();
          }

          function updateConfigControlsState() {
            if (!selectedEmail) return;
            const isEnabled = notifEnabled.checked;
            notifEnabledLabel.textContent = isEnabled ? 'Actif' : 'Désactivé';
            configControls.style.pointerEvents = 'auto';
            configControls.style.opacity = '1';
            emailConfigSection.classList.toggle('notifications-locked', !isEnabled);
            deviceAssociationBox.classList.toggle('disabled', !isEnabled || emailNotifMode.value !== 'devices');
          }

          function selectEmail(item) {
            selectedEmail = item;
            assignedDevices = [];
            localStorage.setItem('dolphi_active_email_id', item.id);
            localStorage.setItem('dolphi_active_email_name', item.email);
            emailConfigSection.classList.remove('disabled');
            notifEnabled.checked = !!item.enabled;
            notifJMinus1.checked = !!item.notify_j_minus_1;
            notifJ.checked = !!item.notify_j;
            setMode(item.global_enabled ? 'global' : 'devices');
            updateConfigControlsState();
            renderEmailsList();
            updateSelectedSummary();
            loadAssignedDevices();
          }

          function updateCriteriaVisibility() {
            const isGlobal = emailNotifMode.value === 'global';
            globalCriteriaBox.hidden = !isGlobal;
            deviceAssociationBox.classList.toggle('disabled', !selectedEmail || !notifEnabled.checked || isGlobal);
          }

          async function loadAssignedDevices() {
            if (!selectedEmail) return;
            assignedDevicesTbody.innerHTML = '<tr><td colspan="5" class="dolphi-notif-empty">Chargement des appareils liés...</td></tr>';
            try {
              assignedDevices = await fetchJson('/api/notifications/emails/' + selectedEmail.id + '/devices');
              renderAssignedDevices(assignedDevices);
              const allActive = await fetchJson('/api/notifications/active-devices');
              const associatedIds = new Set(assignedDevices.map(d => d.id));
              availableDevices = allActive.filter(d => !associatedIds.has(d.id));
              renderAvailableDeviceOptions();
              updateSelectedSummary();
            } catch (err) {
              assignedDevicesTbody.innerHTML = '<tr><td colspan="5" class="dolphi-notif-empty error">Erreur de chargement : ' + escapeHtml(err.message) + '</td></tr>';
            }
          }

          function renderAvailableDeviceOptions() {
            deviceSelect.innerHTML = '<option value="">Sélectionner un appareil à associer</option>';
            availableDevices.forEach(d => {
              const opt = document.createElement('option');
              opt.value = d.id;
              opt.textContent = (d.modele || 'N/A') + ' - ' + (d.num_serie || 'Sans série') + ' (' + (d.cis || 'N/A') + ')';
              deviceSelect.appendChild(opt);
            });
          }

          function renderAssignedDevices(devices) {
            if (!devices.length) {
              assignedDevicesTbody.innerHTML = '<tr><td colspan="5" class="dolphi-notif-empty"><strong>Aucun appareil associé</strong><br><small>Sélectionnez un appareil puis cliquez sur Associer.</small></td></tr>';
              return;
            }
            assignedDevicesTbody.innerHTML = '';
            devices.forEach(dev => {
              const tr = document.createElement('tr');
              const tdDevice = document.createElement('td');
              tdDevice.innerHTML = '<strong>' + escapeHtml(dev.num_serie || 'Sans série') + '</strong><small>' + escapeHtml(dev.modele || 'Modèle inconnu') + '</small>';
              const tdType = document.createElement('td');
              tdType.innerHTML = '<span class="dolphi-pill info">' + escapeHtml(dev.modele || 'N/A') + '</span>';
              const tdCis = document.createElement('td');
              tdCis.textContent = dev.cis || 'N/A';
              const tdDate = document.createElement('td');
              tdDate.textContent = dev.date_cle_a_faire || 'N/A';
              const tdAction = document.createElement('td');
              tdAction.className = 'dolphi-notif-row-actions';
              const delBtn = document.createElement('button');
              delBtn.type = 'button';
              delBtn.className = 'dolphi-notif-icon-btn danger';
              delBtn.title = "Retirer l'association";
              delBtn.setAttribute('aria-label', "Retirer l'association de " + (dev.num_serie || dev.modele || 'cet appareil'));
              delBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"></path></svg>';
              delBtn.addEventListener('click', async () => {
                if (!confirm("Supprimer l'association de cet appareil avec " + selectedEmail.email + ' ?')) return;
                try {
                  await fetchJson('/api/notifications/emails/' + selectedEmail.id + '/devices/' + dev.id, { method: 'DELETE' });
                  await loadAssignedDevices();
                  showFeedback('Association supprimée avec succès.');
                } catch (err) {
                  showFeedback(err.message, true);
                }
              });
              tdAction.appendChild(delBtn);
              tr.appendChild(tdDevice);
              tr.appendChild(tdType);
              tr.appendChild(tdCis);
              tr.appendChild(tdDate);
              tr.appendChild(tdAction);
              assignedDevicesTbody.appendChild(tr);
            });
          }

          extensionMain.querySelector('#notif-associate-btn').addEventListener('click', async () => {
            if (!selectedEmail) return;
            if (!notifEnabled.checked) {
              showFeedback("Activez les notifications avant d'associer un appareil.", true);
              return;
            }
            const deviceId = deviceSelect.value;
            if (!deviceId) {
              showFeedback('Veuillez sélectionner un appareil dans la liste.', true);
              return;
            }
            try {
              const result = await fetchJson('/api/notifications/assign-device', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ device_id: parseInt(deviceId, 10), email_id: selectedEmail.id })
              });
              showFeedback(result.message || 'Équipement associé avec succès.');
              await loadAssignedDevices();
            } catch (err) {
