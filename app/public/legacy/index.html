        function localToday() {
          const now = new Date();
          const offset = now.getTimezoneOffset();
          return new Date(now.getTime() - offset * 60000).toISOString().slice(0, 10);
        }

        function normalizeDateInput(value) {
          const text = String(value || '').trim();
          const match = text.match(/^(\d{4}-\d{2}-\d{2})|^(\d{2})\/(\d{2})\/(\d{2,4})/);
          if (!match) return '';
          if (match[1]) return match[1];
          const year = match[4].length === 2 ? '20' + match[4] : match[4];
          const first = Number(match[2]);
          const second = Number(match[3]);
          const month = first > 12 ? match[3] : match[2];
          const day = first > 12 ? match[2] : match[3];
          if (second > 31 || first > 31) return '';
          return `${year}-${month}-${day}`;
        }

          const ids = options && options.ids ? options.ids : [];

          const label = ids.length
            ? `${count} équipement${count > 1 ? 's' : ''} sélectionné${count > 1 ? 's' : ''}`

            <form class="dolphi-modal">

                  <p class="dolphi-muted" style="margin:0">Déclare la mise à jour comme effectuée aujourd'hui.</p>

          async function run(date, button) {

              await applyCryptageDate({ ids, device, date });

            } catch (error) {
              button.disabled = false;

          overlay.querySelector('[data-cancel]').addEventListener('click', () => overlay.remove());

          overlay.querySelector('form').addEventListener('submit', event => {
            event.preventDefault();
            const date = event.currentTarget.elements.date_maj_cle.value;
            run(date, event.submitter || event.currentTarget.querySelector('[type="submit"]'));
          });
          document.body.appendChild(overlay);

        function installBulkSelection() {
          const devices = Array.isArray(window.DolphiSICLastDevices) ? window.DolphiSICLastDevices : [];
          if (!devices.length) return;
          // Determine whether the current view allows cryptage update (not BIP / Infra / Alerte)
          const isNonCryptable = d => { const t = String(d.type || '').toUpperCase(); return t.includes('BIP') || t.includes('INFRA') || t.includes('ALERTE'); };
          currentBulkContextIsCryptable = !devices.every(isNonCryptable);
          const devicesBySerial = new Map(devices.map(device => [normalizedText(device.num_serie), device]));
          const validIds = new Set(devices.map(device => Number(device.id)));
          Array.from(selectedDeviceIds).forEach(id => {
            if (!validIds.has(id)) selectedDeviceIds.delete(id);
          });

          const eligibleTables = Array.from(document.querySelectorAll('main table')).filter(table => {
            const headers = Array.from(table.querySelectorAll('thead th'));
            return (headers[0] && headers[0].textContent.trim() === 'N° Série') ||
              (headers[0] && headers[0].querySelector('[data-select-all]') && headers[1] && headers[1].textContent.trim() === 'N° Série');
          });
          if (!eligibleTables.length) return;

          eligibleTables.forEach(table => {
            const headerRow = table.querySelector('thead tr');
            if (headerRow && !headerRow.querySelector('[data-select-all]')) {
              const header = document.createElement('th');
              header.className = 'dolphi-select-cell';
              const selectAll = document.createElement('input');
              selectAll.type = 'checkbox';
              selectAll.dataset.selectAll = '1';
              selectAll.title = 'Tout sélectionner dans ce tableau';
              selectAll.addEventListener('change', () => {
                table.querySelectorAll('[data-device-select]').forEach(input => {
                  const id = Number(input.dataset.deviceSelect);
                  if (selectAll.checked) selectedDeviceIds.add(id);
                  else selectedDeviceIds.delete(id);
                });
                updateBulkToolbar();
              });
              header.appendChild(selectAll);
              headerRow.insertBefore(header, headerRow.firstChild);
            }

            table.querySelectorAll('tbody tr').forEach(row => {
              let cell = row.querySelector('[data-dolphi-select-cell]');
              if (!cell) {
                cell = document.createElement('td');
                cell.className = 'dolphi-select-cell';
                cell.dataset.dolphiSelectCell = '1';
                row.insertBefore(cell, row.firstChild);
              }
              const serialCell = row.querySelector('td:not([data-dolphi-select-cell])');
              const device = serialCell && devicesBySerial.get(normalizedText(serialCell.textContent));
              if (device) {
                const lastCell = row.lastElementChild;
                if (lastCell) {
                  const nativeBellBtn = Array.from(lastCell.querySelectorAll('button')).find(btn => 
                    btn.querySelector('svg.lucide-bell, svg.lucide-bell-off') ||
                    btn.querySelector('svg[class*="lucide-bell"]')
                  );
                  if (nativeBellBtn && !nativeBellBtn.dataset.dolphiBellIntercepted) {
                    nativeBellBtn.dataset.dolphiBellIntercepted = '1';
                    nativeBellBtn.addEventListener('click', async (e) => {
                      e.stopPropagation();
                      e.preventDefault();
                      
                      const isCurrentlyActive = device.notification_active === 1 || device.notification_active === true || String(device.notification_active) === '1';
                      const newActive = !isCurrentlyActive;
                      
                      try {
                        const res = await fetchJson(`/api/devices/${device.id}/toggle-notification`, {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify({
                            notification_active: newActive,
                            email_notif: newActive ? 'dummy@sdis04.fr' : null
                          })
                        });
                        
                        if (res.success) {
                          device.notification_active = newActive ? 1 : 0;
                          refreshStandardView();
                        }
                      } catch (err) {
                        alert("Erreur lors de la modification de la notification : " + err.message);
                      }
                    }, true);
                  }

                  const nativeKeyBtn = Array.from(lastCell.querySelectorAll('button')).find(isCryptageButton);
                  if (nativeKeyBtn && !nativeKeyBtn.dataset.dolphiCryptageIntercepted) {
                    nativeKeyBtn.dataset.dolphiCryptageIntercepted = '1';
                    nativeKeyBtn.title = 'Mettre à jour le cryptage';
                    nativeKeyBtn.addEventListener('click', (e) => {
                      e.stopPropagation();
                      e.preventDefault();
                      openCryptageUpdateModal({ device });
                    }, true);
                  }

                  if (!lastCell.querySelector('[data-dolphi-edit-device]')) {
                    const editButton = document.createElement('button');
                    editButton.type = 'button';
                    editButton.className = 'dolphi-dashboard-icon-action dolphi-edit-device-btn';
                    editButton.dataset.dolphiEditDevice = String(device.id);
                    editButton.title = "Modifier les informations de l'appareil";
                    editButton.innerHTML = editIconSvg();
                    editButton.addEventListener('click', event => {
                      event.stopPropagation();
                      event.preventDefault();
                      openEditDeviceModal(device);
                    });
                    const deleteButton = Array.from(lastCell.querySelectorAll('button')).find(btn => {
                      const text = `${btn.title || ''} ${btn.getAttribute('aria-label') || ''}`.toLowerCase();
                      const svg = btn.querySelector('svg');
                      const svgClass = svg ? String(svg.getAttribute('class') || '').toLowerCase() : '';
                      return text.includes('supprimer') || svgClass.includes('trash');
                    });
                    lastCell.insertBefore(editButton, deleteButton || lastCell.firstChild);
                  }
                }
              }
              if (cell.querySelector('[data-device-select]')) return;
              if (!device) return;
              const checkbox = document.createElement('input');
              checkbox.type = 'checkbox';
              checkbox.dataset.deviceSelect = String(device.id);
              checkbox.dataset.deviceType = String(device.type || '');
              checkbox.checked = selectedDeviceIds.has(Number(device.id));
              checkbox.title = 'Sélectionner ' + (device.num_serie || 'cet équipement');
              checkbox.addEventListener('change', () => {
                if (checkbox.checked) selectedDeviceIds.add(Number(device.id));
                else selectedDeviceIds.delete(Number(device.id));
                updateBulkToolbar();
              });
              cell.appendChild(checkbox);
            });
          });

          if (!document.querySelector('[data-dolphi-bulk-toolbar]')) {
            const firstContainer = eligibleTables[0].closest('.table-container');
            if (firstContainer) {
              const toolbar = document.createElement('div');
              toolbar.className = 'dolphi-bulk-toolbar';
              toolbar.dataset.dolphiBulkToolbar = '1';

                <strong data-bulk-count>0 sélectionné</strong>

                  <button type="button" class="btn btn-outline" data-bulk-cryptage disabled>Mettre à jour le cryptage</button>
                  <button type="button" class="btn btn-outline" data-bulk-delete disabled style="color:var(--primary)">Supprimer</button>
                </div>`;
              toolbar.querySelector('[data-bulk-cryptage]').addEventListener('click', openBulkCryptageModal);
              toolbar.querySelector('[data-bulk-delete]').addEventListener('click', bulkDeleteDevices);
              firstContainer.parentElement.insertBefore(toolbar, firstContainer);
            }
          }
          updateBulkToolbar();
        }

        let cartoSitesCache = null;

        function normalizeLoose(value) {
          return String(value || '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/\s+/g, ' ')
            .trim()
            .toLowerCase();
        }

        async function getCartoSitesCache() {
          if (cartoSitesCache) return cartoSitesCache;
          const data = await fetchJson('/api/carto');
          cartoSitesCache = Array.isArray(data.sites) ? data.sites : [];
          return cartoSitesCache;
        }

        async function refreshCartoSitesCache() {
          cartoSitesCache = null;
          return getCartoSitesCache();
        }

        function findCartoDrawer() {
          return Array.from(document.querySelectorAll('#root .glass')).find(panel => {
            if (!panel.offsetParent) return false;
            const text = normalizeLoose(panel.textContent);
            return text.includes('inventaire') && text.includes('log') && text.includes('taches');
          });
        }

        function findCartoTabBar(drawer) {
          return Array.from(drawer.querySelectorAll('div')).find(div => {
            const buttons = Array.from(div.querySelectorAll(':scope > button'));
            const labels = buttons.map(button => normalizeLoose(button.textContent)).join(' ');
            return buttons.length >= 3 && labels.includes('inventaire') && labels.includes('log');
          });
        }

        function getCartoContent(drawer) {
          const tabBar = findCartoTabBar(drawer);
          return tabBar && tabBar.nextElementSibling ? tabBar.nextElementSibling : null;
        }

        function isCartoEnhancedTabLabel(value) {
          const label = normalizeLoose(value);
          return label.includes('taches') || label.includes('log');
        }

        function primeCartoEnhancedContent(drawer) {
          const content = getCartoContent(drawer);
          if (!content) return;
          content.classList.add('dolphi-carto-content-primed');
          const existingPanel = content.querySelector(':scope > .dolphi-carto-tasks-panel, :scope > .dolphi-carto-log-panel');
          Array.from(content.children).forEach(child => {
            child.style.display = child === existingPanel ? '' : 'none';
          });
          if (!existingPanel && !content.querySelector(':scope > .dolphi-carto-prime')) {
            const placeholder = document.createElement('div');
            placeholder.className = 'dolphi-carto-prime dolphi-carto-enhanced-panel';
            placeholder.innerHTML = '<div class="dolphi-carto-empty">Chargement...</div>';
            content.appendChild(placeholder);
          }
        }

        function normalizeCartoDrawerSpacing(drawer) {
          const tabBar = findCartoTabBar(drawer);
          if (tabBar) {
            tabBar.style.overflow = 'visible';
            tabBar.style.paddingTop = '4px';
            Array.from(tabBar.querySelectorAll(':scope > button')).forEach(button => {
              button.style.lineHeight = '1.5';
              button.style.paddingTop = '10px';
              button.style.paddingBottom = '10px';
              button.style.overflow = 'visible';
            });
          }
          const heading = drawer.querySelector('h3');
          if (heading) {
            heading.style.lineHeight = '1.35';
            heading.style.overflow = 'visible';
          }
        }

        function getCartoActivePanel(drawer, content) {
          if (!content) return null;
          const tabBar = findCartoTabBar(drawer);
          if (tabBar) {
            const buttons = Array.from(tabBar.querySelectorAll(':scope > button'));
            const activeButton = buttons.find(button => {
              const style = button.getAttribute('style') || '';
              return style.includes('var(--primary)') || button.style.borderBottomColor === 'var(--primary)' || button.style.color === 'var(--primary)';
            });
            const label = normalizeLoose(activeButton && activeButton.textContent);
            if (label.includes('taches')) return 'tasks';
            if (label.includes('log')) return 'log';
            if (activeButton) return null;
          }
          const clone = content.cloneNode(true);
          clone.querySelectorAll('.dolphi-carto-tasks-panel, .dolphi-carto-log-panel').forEach(panel => panel.remove());
          const text = normalizeLoose(clone.textContent);
          if (text.includes('historique main courante') || text.includes('consigner evenement')) return 'log';
          if (text.includes('taches et operations') || (text.includes('enregistrer les') && content.querySelector('textarea'))) return 'tasks';
          return null;
        }

        async function getActiveCartoSite(drawer) {
          const heading = Array.from(drawer.querySelectorAll('h3')).find(el => el.offsetParent && el.textContent.trim());
          if (!heading) return null;
          const name = normalizeLoose(heading.textContent);
          let sites = await getCartoSitesCache();
          let site = sites.find(site => normalizeLoose(site.nom) === name);
          if (!site) {
            sites = await refreshCartoSitesCache();
            site = sites.find(site => normalizeLoose(site.nom) === name);
          }
          return site || null;
        }

        function prepareCartoEnhancedContent(content, panelClass) {
          content.classList.remove('dolphi-carto-content-primed');
          content.querySelectorAll(':scope > .dolphi-carto-prime').forEach(panel => panel.remove());
          Array.from(content.children).forEach(child => {
            if (child.classList.contains(panelClass)) {
              child.style.display = '';
            } else {
              child.style.display = 'none';
            }
          });
          let panel = content.querySelector(':scope > .' + panelClass);
          if (!panel) {
            panel = document.createElement('div');
            panel.className = panelClass + ' dolphi-carto-enhanced-panel';
            content.appendChild(panel);
          }
          return panel;
        }

        function clearCartoEnhancedContent(content) {
          if (!content) return;
          content.querySelectorAll(':scope > .dolphi-carto-tasks-panel, :scope > .dolphi-carto-log-panel').forEach(panel => panel.remove());
          Array.from(content.children).forEach(child => { child.style.display = ''; });
        }

        function localDateTimeInput(value) {
          const date = value ? new Date(String(value).replace(' ', 'T')) : new Date();
          if (Number.isNaN(date.getTime())) return '';
          const pad = part => String(part).padStart(2, '0');
          return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        function displayCartoDate(value) {
          if (!value) return '';
          const date = new Date(String(value).replace(' ', 'T'));
          if (Number.isNaN(date.getTime())) return value;
          return date.toLocaleString('fr-FR', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
        }

        async function renderCartoTasksPanel(content, site) {
          const panel = prepareCartoEnhancedContent(content, 'dolphi-carto-tasks-panel');
          if (panel.dataset.loading === '1') return;
          const signature = String(site.id);
          if (panel.dataset.signature === signature && panel.dataset.rendered === '1') return;
          panel.dataset.signature = signature;
          panel.dataset.loading = '1';
          panel.innerHTML = '<div class="dolphi-carto-empty">Chargement des taches...</div>';
          try {
            const tasks = await fetchJson(`/api/carto/sites/${site.id}/tasks`);
            panel.dataset.rendered = '1';
            panel.innerHTML = `
              <div class="dolphi-carto-panel-head">
                <div>
                  <h4 class="dolphi-carto-panel-title">Taches du site</h4>
                  <p class="dolphi-carto-panel-subtitle">Ajoutez les operations a prevoir, puis validez-les quand elles sont terminees.</p>
                </div>
                <button type="button" class="dolphi-carto-small-btn dolphi-carto-primary-btn" data-carto-add-task>Ajouter</button>
              </div>
              <form class="dolphi-carto-form" data-carto-task-form hidden>
                <input class="dolphi-carto-input" name="nom" placeholder="Nom de la tache" required>
                <textarea class="dolphi-carto-textarea" name="description" placeholder="Description, contexte, materiel concerne..."></textarea>
                <div class="dolphi-carto-form-row">
                  <button type="submit" class="dolphi-carto-small-btn dolphi-carto-primary-btn">Enregistrer</button>
                  <button type="button" class="dolphi-carto-small-btn" data-carto-cancel-task>Annuler</button>
                </div>
              </form>
              <div class="dolphi-carto-task-list" data-carto-active-tasks></div>
              <div class="dolphi-carto-history">
                <div class="dolphi-carto-history-head">
                  <span>Historique des taches faites</span>
                  <span>${tasks.filter(task => Number(task.fait)).length}</span>
                </div>
                <div class="dolphi-carto-history-list" data-carto-done-tasks></div>
              </div>
            `;

            const form = panel.querySelector('[data-carto-task-form]');
            const addTaskBtn = panel.querySelector('[data-carto-add-task]');
            addTaskBtn.addEventListener('click', () => {
              form.hidden = false;
              addTaskBtn.hidden = true;
              form.elements.nom.focus();
            });
            panel.querySelector('[data-carto-cancel-task]').addEventListener('click', () => {
              form.reset();
              form.hidden = true;
              addTaskBtn.hidden = false;
            });
            form.addEventListener('submit', async event => {
              event.preventDefault();
              const nom = form.elements.nom.value.trim();
              const description = form.elements.description.value.trim();
              if (!nom) return;
              await fetchJson(`/api/carto/sites/${site.id}/tasks`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nom, description })
              });
              panel.dataset.rendered = '0';
              renderCartoTasksPanel(content, site);
            });

            const activeBox = panel.querySelector('[data-carto-active-tasks]');
            const doneBox = panel.querySelector('[data-carto-done-tasks]');
            const activeTasks = tasks.filter(task => !Number(task.fait));
            const doneTasks = tasks.filter(task => Number(task.fait));
            activeBox.innerHTML = activeTasks.length ? '' : '<div class="dolphi-carto-empty">Aucune tache active pour ce site.</div>';
            doneBox.innerHTML = doneTasks.length ? '' : '<div class="dolphi-carto-empty">Aucune tache terminee.</div>';

            activeTasks.forEach(task => {
              const row = document.createElement('div');
              row.className = 'dolphi-carto-task-card';
              row.innerHTML = `
                <input type="checkbox" class="dolphi-carto-task-check" title="Marquer comme fait">
                <div>
                  <div class="dolphi-carto-item-title">${escapeHtml(task.nom)}</div>
                  ${task.description ? `<div class="dolphi-carto-item-desc">${escapeHtml(task.description)}</div>` : ''}
                  <div class="dolphi-carto-item-meta">Cree le ${escapeHtml(displayCartoDate(task.created_at))}</div>
                </div>
                <button type="button" class="dolphi-carto-icon-btn dolphi-carto-danger-btn" title="Supprimer">×</button>
              `;
              row.querySelector('input').addEventListener('change', async event => {
                const confirmed = window.confirm(`Confirmer la fin de la tache "${task.nom}" ?`);
                if (!confirmed) {
                  event.target.checked = false;
                  return;
                }
                await fetchJson(`/api/carto/tasks/${task.id}`, {
                  method: 'PATCH',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ fait: true })
                });
                panel.dataset.rendered = '0';
                renderCartoTasksPanel(content, site);
              });
              row.querySelector('button').addEventListener('click', async () => {
                if (!window.confirm(`Supprimer la tache "${task.nom}" ?`)) return;
                await fetchJson(`/api/carto/tasks/${task.id}/delete`, { method: 'POST' });
                panel.dataset.rendered = '0';
                renderCartoTasksPanel(content, site);
              });
              activeBox.appendChild(row);
            });

            doneTasks.forEach(task => {
              const row = document.createElement('div');
              row.className = 'dolphi-carto-task-card is-done';
              row.innerHTML = `
                <input type="checkbox" class="dolphi-carto-task-check" checked disabled>
                <div>
                  <div class="dolphi-carto-item-title">${escapeHtml(task.nom)}</div>
                  ${task.description ? `<div class="dolphi-carto-item-desc">${escapeHtml(task.description)}</div>` : ''}
                  <div class="dolphi-carto-item-meta">Fait le ${escapeHtml(displayCartoDate(task.completed_at || task.created_at))}</div>
                </div>
                <button type="button" class="dolphi-carto-icon-btn dolphi-carto-danger-btn" title="Supprimer de l'historique">×</button>
              `;
              row.querySelector('button').addEventListener('click', async () => {
                if (!window.confirm(`Supprimer "${task.nom}" de l'historique ?`)) return;
                await fetchJson(`/api/carto/tasks/${task.id}/delete`, { method: 'POST' });
                panel.dataset.rendered = '0';
                renderCartoTasksPanel(content, site);
              });
              doneBox.appendChild(row);
            });
          } catch (err) {
            panel.innerHTML = `<div class="dolphi-carto-empty">Erreur de chargement : ${escapeHtml(err.message)}</div>`;
          } finally {
            panel.dataset.loading = '0';
          }
        }

        async function renderCartoLogPanel(content, site) {
          const panel = prepareCartoEnhancedContent(content, 'dolphi-carto-log-panel');
          if (panel.dataset.loading === '1') return;
          const signature = String(site.id);
          if (panel.dataset.signature === signature && panel.dataset.rendered === '1') return;
          panel.dataset.signature = signature;
          panel.dataset.loading = '1';
          panel.innerHTML = '<div class="dolphi-carto-empty">Chargement du journal...</div>';
          try {
            const logs = await fetchJson(`/api/carto/sites/${site.id}/main_courante`);
            panel.dataset.rendered = '1';
            panel.innerHTML = `
              <div class="dolphi-carto-panel-head">
                <div>
                  <h4 class="dolphi-carto-panel-title">Journal du site</h4>
                  <p class="dolphi-carto-panel-subtitle">Consignez les interventions et gardez un historique datable.</p>
                </div>
                <button type="button" class="dolphi-carto-small-btn dolphi-carto-primary-btn" data-carto-add-log>Ajouter</button>
              </div>
              <form class="dolphi-carto-form" data-carto-log-form hidden>
                <input class="dolphi-carto-input" type="datetime-local" name="date_heure" required>
                <textarea class="dolphi-carto-textarea" name="evenement" placeholder="Passage technicien, incident, controle..." required></textarea>
                <div class="dolphi-carto-form-row">
                  <button type="submit" class="dolphi-carto-small-btn dolphi-carto-primary-btn" data-carto-log-submit>Consigner</button>
                  <button type="button" class="dolphi-carto-small-btn" data-carto-log-cancel>Annuler</button>
                </div>
              </form>
              <div class="dolphi-carto-history">
                <div class="dolphi-carto-history-head">
                  <span>Historique main courante</span>
                  <span>${logs.length}</span>
                </div>
                <div class="dolphi-carto-log-list" data-carto-log-list></div>
              </div>
            `;
            const form = panel.querySelector('[data-carto-log-form]');
            const dateInput = form.elements.date_heure;
            const eventInput = form.elements.evenement;
            const submitBtn = panel.querySelector('[data-carto-log-submit]');
            const cancelBtn = panel.querySelector('[data-carto-log-cancel]');
            const addLogBtn = panel.querySelector('[data-carto-add-log]');

            function resetLogForm() {
              form.dataset.editingId = '';
              dateInput.value = localDateTimeInput();
              eventInput.value = '';
              submitBtn.textContent = 'Consigner';
              form.hidden = true;
              addLogBtn.hidden = false;
            }

            addLogBtn.addEventListener('click', () => {
              form.dataset.editingId = '';
              dateInput.value = localDateTimeInput();
              eventInput.value = '';
              submitBtn.textContent = 'Consigner';
              form.hidden = false;
              addLogBtn.hidden = true;
              eventInput.focus();
            });
            cancelBtn.addEventListener('click', resetLogForm);
            form.addEventListener('submit', async event => {
              event.preventDefault();
              const payload = { date_heure: dateInput.value, evenement: eventInput.value.trim() };
              if (!payload.evenement) return;
              const editingId = form.dataset.editingId;
              await fetchJson(editingId ? `/api/carto/main_courante/${editingId}` : `/api/carto/sites/${site.id}/main_courante`, {
                method: editingId ? 'PATCH' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              panel.dataset.rendered = '0';
              renderCartoLogPanel(content, site);
            });

            const list = panel.querySelector('[data-carto-log-list]');
            list.innerHTML = logs.length ? '' : '<div class="dolphi-carto-empty">Aucun evenement consigne.</div>';
            logs.forEach(item => {
              const row = document.createElement('div');
              row.className = 'dolphi-carto-log-card';
              row.innerHTML = `
                <div>
                  <div class="dolphi-carto-item-title">${escapeHtml(item.evenement)}</div>
                  <div class="dolphi-carto-item-meta">${escapeHtml(displayCartoDate(item.date_heure))}</div>
                </div>
                <div class="dolphi-carto-log-actions">
                  <button type="button" class="dolphi-carto-icon-btn" title="Modifier">✎</button>
                  <button type="button" class="dolphi-carto-icon-btn dolphi-carto-danger-btn" title="Supprimer">×</button>
                </div>
              `;
              const buttons = row.querySelectorAll('button');
              buttons[0].addEventListener('click', () => {
                form.dataset.editingId = String(item.id);
                dateInput.value = localDateTimeInput(item.date_heure);
                eventInput.value = item.evenement || '';
                submitBtn.textContent = 'Enregistrer la modification';
                form.hidden = false;
                addLogBtn.hidden = true;
                form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                eventInput.focus();
              });
              buttons[1].addEventListener('click', async () => {
                if (!window.confirm('Supprimer cet evenement du journal ?')) return;
                await fetchJson(`/api/carto/main_courante/${item.id}/delete`, { method: 'POST' });
                panel.dataset.rendered = '0';
                renderCartoLogPanel(content, site);
              });
              list.appendChild(row);
            });
          } catch (err) {
            panel.innerHTML = `<div class="dolphi-carto-empty">Erreur de chargement : ${escapeHtml(err.message)}</div>`;
          } finally {
            panel.dataset.loading = '0';
          }
        }

        async function enhanceCartoPanels() {
          const drawer = findCartoDrawer();
          if (!drawer) return;
          normalizeCartoDrawerSpacing(drawer);
          const content = getCartoContent(drawer);
          if (!content) return;
          const activePanel = getCartoActivePanel(drawer, content);
          if (!activePanel) {
            clearCartoEnhancedContent(content);
            return;
          }
          const site = await getActiveCartoSite(drawer).catch(() => null);
          if (!site) return;
          if (activePanel === 'tasks') renderCartoTasksPanel(content, site);
          if (activePanel === 'log') renderCartoLogPanel(content, site);
        }

        async function getCentresCache() {
          if (centresCache) return centresCache;
          centresCache = await fetchJson('/api/centres');
          return centresCache;
        }

        function setReactInputValue(input, value) {
          const setter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
          setter.call(input, value);
          input.dispatchEvent(new Event('input', { bubbles: true }));
          input.dispatchEvent(new Event('change', { bubbles: true }));
        }

        async function enhanceStockCisSelect() {
          const modalTitle = Array.from(document.querySelectorAll('h3')).find(title =>
            title.offsetParent && normalizeLoose(title.textContent).includes('ajouter un equipement au stock')
          );
          if (!modalTitle) return;
          const modal = modalTitle.closest('.glass') || modalTitle.closest('div');
          if (!modal) return;
          modal.classList.add('dolphi-stock-add-modal');
          const cisLabel = Array.from(modal.querySelectorAll('label')).find(label => normalizeLoose(label.textContent) === 'cis');
          if (!cisLabel) return;
          const group = cisLabel.parentElement;
          const input = group && group.querySelector('input[type="text"]');
          if (!input || input.dataset.dolphiCisSelectSource === '1') return;
          const centres = await getCentresCache().catch(() => []);
          if (!Array.isArray(centres) || !centres.length) return;

          const select = document.createElement('select');
          select.className = 'dolphi-stock-cis-select';
          select.required = input.required;
          select.innerHTML = '<option value="">Selectionner un CIS</option>' + centres
            .map(cis => `<option value="${escapeHtml(cis)}">${escapeHtml(cis)}</option>`)
            .join('');
          select.value = input.value || '';
          select.addEventListener('change', () => setReactInputValue(input, select.value));

          input.dataset.dolphiCisSelectSource = '1';
          input.style.display = 'none';
          group.appendChild(select);
        }

        function solidifyTransparentMenus() {
          function isLargeOverlay(element) {
            const rect = element.getBoundingClientRect();
            const style = window.getComputedStyle(element);
            return style.position === 'fixed' &&
              rect.width >= window.innerWidth * 0.82 &&
              rect.height >= window.innerHeight * 0.82;
          }

          function resetMenuClasses() {
            document
              .querySelectorAll('.dolphi-solid-menu, .dolphi-device-add-modal, .dolphi-stock-add-modal, .dolphi-carto-link-modal, .dolphi-transparent-overlay')
              .forEach(element => element.classList.remove(
                'dolphi-solid-menu',
                'dolphi-device-add-modal',
                'dolphi-stock-add-modal',
                'dolphi-carto-link-modal',
                'dolphi-transparent-overlay'
              ));
          }

          function markOverlayFor(panel) {
            let node = panel && panel.parentElement;
            while (node && node !== document.body) {
              if (isLargeOverlay(node)) {
                node.classList.add('dolphi-transparent-overlay');
                return;
              }
              node = node.parentElement;
            }
          }

          function closestMenuPanel(title) {
            let node = title;
            while (node && node !== document.body) {
              const rect = node.getBoundingClientRect();
              const style = window.getComputedStyle(node);
              const hasPanelShape = rect.width >= 260 &&
                rect.height >= 120 &&
                rect.width <= window.innerWidth * 0.92 &&
                rect.height <= window.innerHeight + 2 &&
                !isLargeOverlay(node) &&
                (node.classList.contains('glass') || style.borderRadius !== '0px' || parseFloat(style.paddingTop) > 8);

              if (hasPanelShape) return node;
              node = node.parentElement;
            }
            return null;
          }

          function applyPanel(title, ...extraClasses) {
            const panel = closestMenuPanel(title);
            if (!panel) return;
            panel.classList.add('dolphi-solid-menu', ...extraClasses);
            markOverlayFor(panel);
          }

          resetMenuClasses();

          Array.from(document.querySelectorAll('h2, h3')).forEach(title => {
            if (!title.offsetParent) return;
            const text = normalizeLoose(title.textContent);

            if (text.includes('ajouter un appareil')) {
              applyPanel(title, 'dolphi-device-add-modal');
            } else if (text.includes('ajouter un equipement au stock')) {
              applyPanel(title, 'dolphi-stock-add-modal');
            } else if (text.includes('tracer une liaison radio')) {
              applyPanel(title, 'dolphi-carto-link-modal');
            } else if (text.includes('nouveau point haut') || text.includes('nouveau perroquet')) {
              applyPanel(title);
            }
          });

          Array.from(document.querySelectorAll('#root .glass')).forEach(element => {
            if (!element.offsetParent || isLargeOverlay(element)) return;
            const rect = element.getBoundingClientRect();
            const text = normalizeLoose(element.textContent);
            const isCartoTools = text.includes('+ site') &&
              text.includes('+ liaison') &&
              text.includes('point haut') &&
              text.includes('perroquet');

            if (isCartoTools && rect.height < 96) {
              element.classList.add('dolphi-solid-menu');
            }
          });
        }

        function installEnhancements() {
          const app = document.querySelector('#root > div');
          if (!app) return;
          const sidebar = app.querySelector(':scope > div.glass');
          const nav = sidebar && sidebar.querySelector('nav');
          const footer = sidebar && nav && nav.nextElementSibling;
          const main = app.querySelector(':scope > main');
          if (!sidebar || !nav || !footer || !main) return;
          reactMain = main;

          if (!app.dataset.dolphiCartoTabPrimeBound) {
            app.dataset.dolphiCartoTabPrimeBound = '1';
            app.addEventListener('click', event => {
              const button = event.target && event.target.closest ? event.target.closest('button') : null;
              if (!button || !isCartoEnhancedTabLabel(button.textContent)) return;
              const drawer = findCartoDrawer();
              if (drawer && drawer.contains(button)) {
                primeCartoEnhancedContent(drawer);
                setTimeout(() => enhanceCartoPanels().catch(error => console.warn('Cartographie enhancements failed', error)), 0);
                setTimeout(() => enhanceCartoPanels().catch(error => console.warn('Cartographie enhancements failed', error)), 40);
              }
            }, true);
          }

          if (!extensionMain || !extensionMain.isConnected) {
            extensionMain = document.createElement('main');
            extensionMain.className = 'dolphi-extension-main';
            extensionMain.style.display = 'none';
            app.appendChild(extensionMain);
          }

          nav.querySelectorAll('button:not([data-dolphi-dashboard])').forEach(button => {
            if (button.dataset.dolphiExtensionBound) return;
            button.dataset.dolphiExtensionBound = '1';
            button.addEventListener('click', () => {
              closeExtension();
              nav.querySelectorAll('button:not([data-dolphi-dashboard])').forEach(other => {
                other.style.backgroundColor = 'transparent';
                other.style.color = 'var(--text-main)';
              });
              button.style.backgroundColor = 'var(--primary)';
              button.style.color = '#ffffff';
            });
          });

          dashboardButton = nav.querySelector('[data-dolphi-dashboard]');
          if (!dashboardButton) {
            const source = Array.from(nav.querySelectorAll('button')).find(button => button.textContent.includes('Statistiques')) || nav.querySelector('button');
            dashboardButton = source.cloneNode(true);
            dashboardButton.dataset.dolphiDashboard = '1';
            const label = dashboardButton.querySelector('span');
            if (label) label.textContent = 'Tableau de bord';
            dashboardButton.title = 'Tableau de bord';
            dashboardButton.addEventListener('click', () => openExtension('dashboard'));

            const svg = dashboardButton.querySelector('svg');
            if (svg) {
              svg.innerHTML = `<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>`;
              svg.setAttribute('class', 'lucide lucide-home');
              svg.setAttribute('stroke', 'currentColor');
              svg.setAttribute('stroke-width', '2');
              svg.setAttribute('stroke-linecap', 'round');
              svg.setAttribute('stroke-linejoin', 'round');
              svg.setAttribute('fill', 'none');
            }

            nav.insertBefore(dashboardButton, nav.firstChild);
          }

          notifNavBtn = nav.querySelector('[data-dolphi-nav-notifications]');
          if (!notifNavBtn) {
            const stockButton = Array.from(nav.querySelectorAll('button')).find(button => button.textContent.includes('Stock') || (button.title && button.title.includes('Stock')));
            if (stockButton) {
              const svg = stockButton.querySelector('svg');
              if (svg) {
                svg.innerHTML = `<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>`;
                svg.setAttribute('class', 'lucide lucide-box');
                svg.setAttribute('stroke', 'currentColor');
                svg.setAttribute('stroke-width', '2');
                svg.setAttribute('stroke-linecap', 'round');
                svg.setAttribute('stroke-linejoin', 'round');
                svg.setAttribute('fill', 'none');
              }
            }
            if (stockButton) {
              notifNavBtn = stockButton.cloneNode(true);
              notifNavBtn.dataset.dolphiNavNotifications = '1';
              notifNavBtn.style.backgroundColor = 'transparent';
              notifNavBtn.style.color = 'var(--text-main)';
              const label = notifNavBtn.querySelector('span');
              if (label) label.textContent = 'Notifications';
              notifNavBtn.title = 'Notifications';
              
              const svg = notifNavBtn.querySelector('svg');
              if (svg) {
                svg.innerHTML = `<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9m1.73 13a3 3 0 0 0 5.54 0"></path>`;
                svg.setAttribute('class', 'lucide lucide-bell');
                svg.setAttribute('stroke', 'currentColor');
                svg.setAttribute('stroke-width', '2');
                svg.setAttribute('stroke-linecap', 'round');
                svg.setAttribute('stroke-linejoin', 'round');
                svg.setAttribute('fill', 'none');
              }
              
              notifNavBtn.addEventListener('click', () => openExtension('notifications'));
              stockButton.parentNode.insertBefore(notifNavBtn, stockButton.nextSibling);
            }
          }

          settingsButton = footer.querySelector('[data-dolphi-settings]');
          if (!settingsButton) {
            const themeButton = footer.querySelector('button[title="Changer le thème"]');
            const logoutButton = footer.querySelector('button[title="Se déconnecter"]');
            if (themeButton) {
              settingsButton = themeButton.cloneNode(true);
              settingsButton.dataset.dolphiSettings = '1';
              settingsButton.title = 'Paramètres';
              const label = settingsButton.querySelector('span');
              if (label) label.textContent = 'Paramètres';
              settingsButton.addEventListener('click', () => openExtension('settings'));
              footer.insertBefore(settingsButton, logoutButton || null);
            }
          }

          let collapseButton = footer.querySelector('[data-dolphi-collapse]');
          if (!collapseButton) {
            collapseButton = document.createElement('button');
            collapseButton.type = 'button';
            collapseButton.className = 'dolphi-collapse-toggle';
            collapseButton.dataset.dolphiCollapse = '1';
            collapseButton.addEventListener('click', () => {
              const collapsed = !sidebar.classList.contains('dolphi-sidebar-collapsed');
              sidebar.classList.toggle('dolphi-sidebar-collapsed', collapsed);
              localStorage.setItem(COLLAPSE_KEY, collapsed ? '1' : '0');
              collapseButton.textContent = collapsed ? '›' : '‹';
              collapseButton.title = collapsed ? 'Déployer le menu' : 'Rétracter le menu';
            });
            footer.appendChild(collapseButton);
          }

          const collapsed = localStorage.getItem(COLLAPSE_KEY) === '1';
          sidebar.classList.toggle('dolphi-sidebar-collapsed', collapsed);
          const collapseSymbol = collapsed ? '›' : '‹';
          if (collapseButton.textContent !== collapseSymbol) {
            collapseButton.textContent = collapseSymbol;
          }
          collapseButton.title = collapsed ? 'Déployer le menu' : 'Rétracter le menu';
          updateAdvancedSearchFields();
          hideSiteInfoTab();
          removeLegacyNotificationConfig();
          solidifyTransparentMenus();
          enhanceCartoPanels().catch(error => console.warn('Cartographie enhancements failed', error));
          enhanceStockCisSelect().catch(error => console.warn('Stock CIS selector enhancement failed', error));

          if (!app.dataset.dolphiDefaultDashboard) {
            app.dataset.dolphiDefaultDashboard = '1';
            openExtension('dashboard');
          }
          replaceTextInNode(document.getElementById('root'));
        }

        function replaceTextInNode(node) {
          if (!node) return;
          let child = node.firstChild;
          while (child) {
            if (child.nodeType === 3) {
              const val = child.nodeValue;
              if (val.includes('Bips Pager')) {
                child.nodeValue = val.replace(/Bips Pager/g, 'BIPs');
              } else if (val.includes('Bips pager')) {
                child.nodeValue = val.replace(/Bips pager/g, 'BIPs');
              }
            } else if (child.nodeType === 1) {
              replaceTextInNode(child);
            }
            child = child.nextSibling;
          }
        }

                window.changeLegacyView = function(viewId) {
          if (activeView === viewId) return;
          if (viewId === 'dashboard') {
            openExtension('dashboard');
          } else if (viewId === 'settings') {
            openExtension('settings');
          } else if (viewId === 'notifications') {
            openExtension('notifications');
          } else {
            closeExtension();
            if (typeof window.setLegacyPage === 'function') {
              window.setLegacyPage(viewId);
            }
          }
        };

        function removeLegacyNotificationConfig() {
          const headings = Array.from(document.querySelectorAll('h3, h2, h4'));
          const targetHeading = headings.find(h => 
            h.textContent.includes('Configuration des Alertes')
          );
          if (targetHeading) {
            const card = targetHeading.closest('.glass') || targetHeading.parentElement;
            if (card) card.style.display = 'none';
          }
        }

        const observer = new MutationObserver(installEnhancements);
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
        window.addEventListener('dolphisic-devices-loaded', installBulkSelection);
        installEnhancements();
      })();
    </script>
  </body>
</html>
