<!doctype html>

    <meta name="description" content="DolphiSIC - Gestion du parc matériel radio et cartographie opérationnelle du SDIS 04" />
    <title>DolphiSIC - SDIS 04</title>
    <style>
      .dolphisic-cookie-banner {

      }

        color: #f8fafc;
      }

      button[title="Changer le thème"] {
        display: none !important;
      }

      .dolphi-extension-main {
        flex: 1;
        min-width: 0;
        height: 100%;
        overflow-y: auto;
        padding: 24px;
        color: var(--text-main);
      }

      .dolphi-extension-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      .dolphi-extension-header h1 {
        margin: 0 0 4px;
        font-size: 2rem;
        font-weight: 800;
      }

      .dolphi-extension-header p,
      .dolphi-muted {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .dolphi-summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 24px;
      }

      .dolphi-dashboard-tabs {
        display: flex;
        width: min(100%, 520px);
        gap: 4px;
        margin: 0 auto 24px;
        padding: 4px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--card-bg-solid);
      }

      .dolphi-dashboard-tab {
        display: inline-flex;
        flex: 1;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 150px;
        padding: 10px 16px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: var(--text-muted);
        font-family: inherit;
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
      }

      .dolphi-dashboard-tab svg {
        width: 15px;
        height: 15px;
      }

      .dolphi-dashboard-tab.active {
        background: var(--primary);
        color: #ffffff;
      }

      .dolphi-dashboard-panel[hidden] {
        display: none;
      }

      .dolphi-dashboard-panel-loans .dolphi-summary-grid {
        grid-template-columns: minmax(260px, 420px);
        justify-content: center;
      }

      .dolphi-dashboard-content {
        width: 100%;
        max-width: 1480px;
        margin: 0 auto;
      }

      .dolphi-dashboard-content > .dolphi-extension-header {
        justify-content: center;
        text-align: center;
      }

      .dolphi-dashboard-panel,
      .dolphi-dashboard-content > .dolphi-section {
        width: 100%;
        max-width: 960px;
        margin-right: auto;
        margin-left: auto;
      }

      .dolphi-dashboard-hero {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) minmax(360px, 520px) minmax(240px, 1fr);
        align-items: start;
        gap: 24px;
        margin-bottom: 22px;
      }

      .dolphi-dashboard-title h1 {
        margin: 0;
        font-size: 2rem;
      }

      .dolphi-dashboard-title p {
        margin: 6px 0 0;
        color: var(--text-muted);
      }

      .dolphi-dashboard-title::after {
        display: block;
        width: 34px;
        height: 3px;
        margin-top: 12px;
        border-radius: 2px;
        background: var(--primary);
        content: '';
      }

      .dolphi-dashboard-updated {
        display: flex;
        align-items: flex-start;
        justify-content: flex-end;
        gap: 8px;
        color: var(--text-muted);
        font-size: 0.75rem;
        line-height: 1.5;
        text-align: right;
      }

      .dolphi-dashboard-updated svg {
        width: 16px;
        height: 16px;
        margin-top: 1px;
      }

      .dolphi-dashboard-updated > div {
        display: grid;
        gap: 4px;
      }

      .dolphi-dashboard-updated span,
      .dolphi-dashboard-updated strong,
      .dolphi-dashboard-updated small {
        display: block;
      }

      .dolphi-dashboard-updated strong {
        color: var(--text-main);
      }

      .dolphi-dashboard-updated small {
        max-width: 230px;
      }

      .dolphi-dashboard-kpis {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 360px));
        justify-content: center;
        gap: 14px;
        margin-bottom: 18px;
      }

      .dolphi-kpi-card {
        display: grid;
        grid-template-columns: 52px minmax(0, 1fr);
        align-items: center;
        gap: 16px;
        min-width: 0;
        min-height: 112px;
        padding: 18px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--card-bg-solid);
        color: var(--text-main);
        font-family: inherit;
        text-align: left;
      }

      button.dolphi-kpi-card {
        cursor: pointer;
        transition: border-color 180ms ease, background 180ms ease;
      }

      button.dolphi-kpi-card:hover,
      button.dolphi-kpi-card.active {
        border-color: var(--primary);
        background: rgba(230, 57, 70, 0.06);
      }

      .dolphi-kpi-icon {
        display: inline-flex;
        width: 52px;
        height: 52px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
      }

      .dolphi-kpi-icon svg {
        width: 25px;
        height: 25px;
      }

      .dolphi-kpi-danger { background: rgba(244, 63, 94, 0.18); color: #fb7185; }
      .dolphi-kpi-warning { background: rgba(245, 158, 11, 0.18); color: #f59e0b; }
      .dolphi-kpi-info { background: rgba(56, 189, 248, 0.16); color: #38bdf8; }
      .dolphi-kpi-success { background: rgba(16, 185, 129, 0.16); color: #10b981; }

      .dolphi-kpi-copy span,
      .dolphi-kpi-copy small {
        display: block;
      }

      .dolphi-kpi-copy > span {
        color: var(--text-muted);
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .dolphi-kpi-copy strong {
        display: block;
        margin: 4px 0;
        font-size: 1.75rem;
        line-height: 1;
      }

      .dolphi-kpi-copy small {
        overflow: hidden;
        color: var(--text-muted);
        font-size: 0.7rem;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .dolphi-kpi-copy small::before {
        display: inline-block;
        width: 6px;
        height: 6px;
        margin-right: 6px;
        border-radius: 50%;
        background: currentColor;
        content: '';
      }

      .dolphi-dashboard-analytics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        margin-bottom: 18px;
      }

      .dolphi-analytics-panel {
        min-width: 0;
        padding: 18px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--card-bg-solid);
      }

      .dolphi-analytics-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-color);
      }

      .dolphi-analytics-heading h2 {
        margin: 0;
        font-size: 0.9rem;
      }

      .dolphi-type-overview {
        display: grid;
        grid-template-columns: 170px minmax(0, 1fr);
        align-items: center;
        gap: 24px;
      }

      .dolphi-type-donut {
        position: relative;
        width: 132px;
        aspect-ratio: 1;
        margin: 0 auto;
        border-radius: 50%;
        background: conic-gradient(#38bdf8 0 var(--portable-end, 50%), #f59e0b var(--portable-end, 50%) var(--mobile-end, 100%), #fb7185 var(--mobile-end, 100%) 100%);
      }

      .dolphi-type-donut::after {
        position: absolute;
        inset: 24px;
        border-radius: 50%;
        background: var(--card-bg-solid);
        content: '';
      }

      .dolphi-type-legend {
        display: grid;
        gap: 12px;
      }

      .dolphi-type-legend-row {
        display: grid;
        grid-template-columns: 12px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
      }

      .dolphi-type-legend-swatch {
        width: 10px;
        height: 10px;
        border-radius: 2px;
      }

      .dolphi-type-legend-row strong,
      .dolphi-type-legend-row small {
        display: block;
      }

      .dolphi-type-legend-row small {
        color: var(--text-muted);
        font-size: 0.7rem;
      }

      .dolphi-deadline-bar {
        display: flex;
        width: 100%;
        height: 12px;
        overflow: hidden;
        border-radius: 6px;
        background: var(--secondary);
      }

      .dolphi-deadline-bar span { min-width: 2px; }
      .dolphi-deadline-overdue { background: #f43f5e; }
      .dolphi-deadline-soon { background: #f59e0b; }
      .dolphi-deadline-valid { background: #10b981; }

      .dolphi-deadline-legend {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin-top: 22px;
      }

      .dolphi-deadline-stat {
        min-width: 0;
        padding: 0 4px;
      }

      .dolphi-deadline-stat span,
      .dolphi-deadline-stat strong,
      .dolphi-deadline-stat small {
        display: block;
      }

      .dolphi-deadline-stat span {
        color: var(--text-muted);
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .dolphi-deadline-stat strong {
        margin-top: 8px;
        font-size: 1.3rem;
      }

      .dolphi-deadline-stat small {
        margin-top: 4px;
        color: var(--text-muted);
        font-size: 0.7rem;
      }

      .dolphi-dashboard-table-panel {
        overflow: hidden;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--card-bg-solid);
      }

      .dolphi-dashboard-table-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 14px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-color);
      }

      .dolphi-dashboard-table-title,
      .dolphi-dashboard-table-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dolphi-dashboard-table-title h2 {
        margin: 0;
        font-size: 0.9rem;
      }

      .dolphi-dashboard-table-actions .dolphi-device-type-toolbar {
        margin: 0;
      }

      .dolphi-export-button svg {
        width: 16px;
        height: 16px;
      }

      .dolphi-dashboard-table-wrap {
        overflow-x: auto;
      }

      .dolphi-dashboard-table {
        width: 100%;
        min-width: 820px;
        border-collapse: collapse;
      }

      .dolphi-dashboard-table th {
        padding: 11px 16px;
        font-size: 0.68rem;
      }

      .dolphi-dashboard-table td {
        padding: 11px 16px;
        font-size: 0.78rem;
        vertical-align: middle;
      }

      .dolphi-dashboard-device-cell {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dolphi-dashboard-device-cell .dolphi-goto-device {
        width: 28px;
        height: 28px;
      }

      .dolphi-dashboard-affectation {
        max-width: 280px;
        overflow: hidden;
        color: var(--text-muted);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .dolphi-dashboard-delay {
        min-width: 150px;
      }

      .dolphi-dashboard-delay-value {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dolphi-dashboard-delay-value strong {
        min-width: 48px;
        color: #fb7185;
      }

      .dolphi-dashboard-delay-bar {
        width: 100px;
        height: 5px;
        overflow: hidden;
        border-radius: 3px;
        background: var(--secondary);
      }

      .dolphi-dashboard-delay-bar i {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: #f43f5e;
      }

      .dolphi-dashboard-row-actions {
        width: 56px;
        text-align: right;
      }

      .dolphi-dashboard-icon-action {
        display: inline-flex;
        width: 32px;
        height: 32px;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
      }

      .dolphi-dashboard-icon-action:hover {
        border-color: var(--primary);
        color: var(--primary);
      }

      .dolphi-dashboard-icon-action svg,
      .dolphi-hidden-button svg {
        width: 16px;
        height: 16px;
      }

      .dolphi-hidden-button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
      }

      .dolphi-hidden-count {
        min-width: 20px;
        padding: 2px 6px;
        border-radius: 10px;
        background: var(--secondary);
        font-size: 0.7rem;
        text-align: center;
      }

      .dolphi-hidden-list {
        display: grid;
        gap: 10px;
        max-height: 52vh;
        margin-top: 18px;
        overflow-y: auto;
      }

      .dolphi-hidden-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        padding: 12px;
        border: 1px solid var(--border-color);
        border-radius: 6px;
      }

      .dolphi-hidden-row strong,
      .dolphi-hidden-row small {
        display: block;
      }

      .dolphi-hidden-row small {
        margin-top: 4px;
        color: var(--text-muted);
      }

      .dolphi-dashboard-delay-upcoming strong { color: #f59e0b; }
      .dolphi-dashboard-delay-upcoming .dolphi-dashboard-delay-bar i { background: #f59e0b; }

      .dolphi-dashboard-empty-row td {
        padding: 28px;
        color: var(--text-muted);
        text-align: center;
      }

      [data-dashboard-panel][hidden] {
        display: none !important;
      }

      .dolphi-summary-card {
        min-width: 0;
        padding: 18px;
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        background: var(--card-bg-solid);
        color: var(--text-main);
        font-family: inherit;
        text-align: left;
      }

      button.dolphi-summary-card {
        cursor: pointer;
        transition: var(--transition);
      }

      button.dolphi-summary-card.active {
        border-color: var(--primary);
        box-shadow: inset 0 0 0 1px var(--primary);
      }

      .dolphi-summary-card span {
        display: block;
        color: var(--text-muted);
        font-size: 0.74rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      .dolphi-summary-card strong {
        display: block;
        margin-top: 8px;
        font-size: 1.8rem;
      }

      .dolphi-dashboard-columns,
      .dolphi-settings-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
      }

      .dolphi-section {
        margin-top: 10px;
        padding: 20px 0;
        border-top: 1px solid var(--border-color);
      }

      .dolphi-section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .dolphi-section h2 {
        margin: 0;
        font-size: 1rem;
      }

      .dolphi-operation-list {
        overflow: hidden;
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
      }

      .dolphi-operation-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 62px;
        padding: 13px 15px;
        border-bottom: 1px solid var(--border-color);
      }

      .dolphi-operation-row:last-child {
        border-bottom: 0;
      }

      .dolphi-operation-row > div:first-child {
        min-width: 0;
      }

      .dolphi-operation-main {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .dolphi-goto-device {
        width: 30px;
        height: 30px;
        flex-shrink: 0;
        padding: 0;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        background: transparent;
        color: var(--primary);
        cursor: pointer;
        font-size: 1rem;
      }

      .dolphi-operation-row strong,
      .dolphi-operation-row small {
        display: block;
      }

      .dolphi-operation-row small {
        overflow-wrap: anywhere;
        margin-top: 3px;
        color: var(--text-muted);
      }

      .dolphi-operation-title-row {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .dolphi-device-type-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 8px;
        border: 1px solid currentColor;
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .dolphi-device-type-badge svg,
      .dolphi-device-type-filter svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }

      .dolphi-device-type-mobile {
        background: rgba(251, 146, 60, 0.12);
        color: #fb923c;
      }

      .dolphi-device-type-portable {
        background: rgba(56, 189, 248, 0.12);
        color: #38bdf8;
      }

      .dolphi-device-type-alert {
        background: rgba(244, 63, 94, 0.12);
        color: #fb7185;
      }

      .dolphi-device-type-infra {
        background: rgba(45, 212, 191, 0.12);
        color: #2dd4bf;
      }

        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;

        font-size: 0.76rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      }

      }

      .dolphi-device-type-filter[data-dashboard-device-type="MOBILE"].active {
        background: rgba(251, 146, 60, 0.16);
        color: #fb923c;
      }

        color: #38bdf8;
      }

      .dolphi-device-type-filter[data-dashboard-device-type="PORTATIF"].active {

        color: #38bdf8;

      }

        color: var(--text-muted);
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
      }

        display: flex;
        align-items: center;
        justify-content: space-between;

        const CONSENT_COOKIE = 'dolphisic_cookie_consent';
        const COOKIE_PREFIX = 'dolphisic_';
        const MANAGED_KEYS = ['cryptis_token', 'cryptis_user', 'cryptis_theme'];
        const ONE_YEAR = 60 * 60 * 24 * 365;
        const nativeGetItem = Storage.prototype.getItem;
        const nativeSetItem = Storage.prototype.setItem;
        const nativeRemoveItem = Storage.prototype.removeItem;

            if (method === 'set') return nativeSetItem.call(localStorage, key, value);
            if (method === 'remove') return nativeRemoveItem.call(localStorage, key);

        function setCookie(name, value, maxAge) {
          document.cookie = name + '=' + encodeURIComponent(value || '') + '; Max-Age=' + maxAge + '; Path=/; SameSite=Lax';

              nativeRemoveItem.call(sessionStorage, key);
              setCookie(cookieName(key), value, ONE_YEAR);
            }
          });

        function migratePersistentStorageToSession() {

          if (banner) banner.remove();
        }

        function acceptCookies() {
          getNativeLocalStorage('set', CONSENT_KEY, 'accepted');
          setCookie(CONSENT_COOKIE, 'accepted', ONE_YEAR);
          migrateStorageToCookies();
          removeBanner();
        }

        function refuseCookies() {
          getNativeLocalStorage('set', CONSENT_KEY, 'refused');
          migratePersistentStorageToSession();
          clearManagedCookies();

        }

        function renderBanner() {

        document.addEventListener('click', function(event) {
          const button = event.target && event.target.closest ? event.target.closest('button') : null;

          refuse: refuseCookies,

            getNativeLocalStorage('remove', CONSENT_KEY);

          },

      (function() {
        const LOG_ENDPOINT = '/api/logs/ui';
        
        function sendLog(event, details) {
          const payload = {
            event: event,
            path: window.location.pathname + window.location.search + window.location.hash,
            details: details,
            timestamp: new Date().toISOString()
          };
          fetch(LOG_ENDPOINT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload),
            keepalive: true
          }).catch(err => {});
        }

        let lastPath = window.location.pathname + window.location.search + window.location.hash;
        
        function checkNavigation() {
          const currentPath = window.location.pathname + window.location.search + window.location.hash;
          if (currentPath !== lastPath) {
            lastPath = currentPath;
            sendLog('NAVIGATION', {});
          }
        }

        const originalPushState = history.pushState;
        history.pushState = function() {
          originalPushState.apply(this, arguments);
          checkNavigation();
        };

        const originalReplaceState = history.replaceState;
        history.replaceState = function() {
          originalReplaceState.apply(this, arguments);
          checkNavigation();
        };

        window.addEventListener('popstate', checkNavigation);

        document.addEventListener('click', function(e) {
          let target = e.target;
          let interactiveEl = null;
          let depth = 0;
          let curr = target;
          
          while (curr && depth < 4) {
            const tag = curr.tagName ? curr.tagName.toUpperCase() : '';
            const role = curr.getAttribute ? curr.getAttribute('role') : '';
            let cursor = '';
            try {
              if (window.getComputedStyle && curr instanceof Element) {
                cursor = window.getComputedStyle(curr).cursor;
              }
            } catch (err) {}
            
            const hasClickAttr = curr.getAttribute && (curr.getAttribute('onclick') || curr.getAttribute('@click') || curr.getAttribute('v-on:click'));
            
            if (
              tag === 'BUTTON' || 
              tag === 'A' || 
              (tag === 'INPUT' && ['submit', 'button', 'checkbox', 'radio', 'image'].includes(curr.type)) ||
              tag === 'SELECT' || 
              tag === 'OPTION' ||
              role === 'button' ||
              role === 'link' ||
              role === 'checkbox' ||
              role === 'switch' ||
              cursor === 'pointer' ||
              hasClickAttr ||
              (curr.className && typeof curr.className === 'string' && (curr.className.includes('btn') || curr.className.includes('button') || curr.className.includes('toggle')))
            ) {
              interactiveEl = curr;
              break;
            }
            curr = curr.parentNode;
            depth++;
          }
          
          if (!interactiveEl) return;
          
          let label = '';
          if (interactiveEl.innerText) {
            label = interactiveEl.innerText.trim();
          }
          
          if (!label && interactiveEl.getAttribute) {
            label = interactiveEl.getAttribute('aria-label') || 
                    interactiveEl.getAttribute('title') || 
                    interactiveEl.getAttribute('placeholder') ||
                    interactiveEl.getAttribute('alt');
          }
          
          if (!label && interactiveEl.tagName === 'INPUT') {
            label = interactiveEl.value || interactiveEl.name || interactiveEl.type;
          }
          
          if (!label && interactiveEl.id) {
            label = '#' + interactiveEl.id;
          }
          
          if (!label) {
            label = interactiveEl.tagName;
          }
          
          label = label.substring(0, 60);
          
          sendLog('CLICK', {
            tag: interactiveEl.tagName.toLowerCase(),
            label: label,
            id: interactiveEl.id || '',
            class: typeof interactiveEl.className === 'string' ? interactiveEl.className : '',
            type: interactiveEl.type || '',
            role: interactiveEl.getAttribute ? interactiveEl.getAttribute('role') : ''
          });
        }, true);

        document.addEventListener('change', function(e) {
          const target = e.target;
          if (!target) return;
          
          const tag = target.tagName ? target.tagName.toUpperCase() : '';
          const type = target.type ? target.type.toLowerCase() : '';
          
          let label = '';
          if (target.id) {
            const labelEl = document.querySelector('label[for="' + target.id + '"]');
            if (labelEl) label = labelEl.innerText.trim();
          }
          if (!label && target.placeholder) label = target.placeholder;
          if (!label && target.name) label = target.name;
          
          let val = target.value;
          if (type === 'checkbox') {
            val = target.checked ? 'TRUE' : 'FALSE';
          } else if (type === 'radio') {
            val = target.checked ? target.value : '';
            if (!val) return;
          }
          
          sendLog('CHANGE', {
            tag: tag.toLowerCase(),
            name: target.name || target.id || '',
            label: label || target.name || '',
            value: val
          });
        }, true);

        document.addEventListener('submit', function(e) {
          const form = e.target;
          if (!form) return;
          
          const fields = {};
          try {
            const formData = new FormData(form);
            for (let [key, val] of formData.entries()) {
              if (/pass|token|secret|key/i.test(key)) {
                fields[key] = '********';
              } else {
                fields[key] = val;
              }
            }
          } catch (err) {}
          
          try {
            const inputs = form.querySelectorAll('input, select, textarea');
            inputs.forEach(input => {
              if (input.id && !fields[input.id] && (!input.name || input.name === '')) {
                const key = input.id;
                const val = input.value;
                if (input.type === 'password' || /pass|token|secret|key/i.test(key)) {
                  fields[key] = '********';
                } else {
                  fields[key] = val;
                }
              }
            });
          } catch (err) {}

          sendLog('SUBMIT', {
            id: form.id || '',
            name: form.name || '',
            fields: fields
          });
        }, true);
        
      })();

        /* ------ Helpers ------ */
        function addGlowBg() {
          if (document.querySelector('.magic-bg-glow')) return;
          const g1 = document.createElement('div');
          g1.className = 'magic-bg-glow magic-bg-glow-1';
          const g2 = document.createElement('div');
          g2.className = 'magic-bg-glow magic-bg-glow-2';
          document.body.prepend(g2);
          document.body.prepend(g1);
        }

        function removeGlowBg() {
          document.querySelectorAll('.magic-bg-glow').forEach(el => el.remove());
        }

        /* ------ Mouse tracking pour le glow MagicCard ------ */
        function trackMouse(el) {
          // Glow effect disabled
        }

        /* ------ Application des effets login ------ */
        function applyLoginEffects() {
          // Cherche le conteneur de la card de login
          // La page login a un formulaire avec un champ username et password
          const inputs = document.querySelectorAll('input[type="password"], input[type="text"], input[placeholder*="tilisateur"], input[placeholder*="Mot"], input[name*="pass"], input[name*="user"]');
          if (inputs.length === 0) return false;

          // Remonter jusqu'à la card englobante
          let card = null;
          let el = inputs[0];
          for (let i = 0; i < 8; i++) {
            el = el.parentElement;
            if (!el) break;
            const s = window.getComputedStyle(el);
            if ((s.background && s.background.includes('rgba') || el.className.includes('glass') || el.className.includes('card') || el.className.includes('login') || el.className.includes('form') || el.className.includes('container')) && el.offsetWidth > 200) {
              card = el;
              break;
            }
          }

          if (!card) {
            // Fallback : prend le premier ancêtre avec une taille raisonnable
            el = inputs[0];
            for (let i = 0; i < 6; i++) {
              el = el.parentElement;
              if (!el) break;
              if (el.offsetWidth > 200 && el.offsetWidth < window.innerWidth * 0.8) {
                card = el;
                break;
              }
            }
          }

          if (card && !card.classList.contains('login-magic-wrap')) {
            card.classList.add('login-magic-wrap');
            trackMouse(card);
          }

          // Bouton de login → pulsating
          const btns = document.querySelectorAll('button[type="submit"], button');
          btns.forEach(btn => {
            const txt = btn.textContent.toLowerCase();
            if ((txt.includes('connect') || txt.includes('login') || txt.includes('identif') || txt.includes('valider') || txt.includes('sign')) && !btn.classList.contains('pulsating-btn')) {
              btn.classList.add('pulsating-btn');
            }
          });

          // Wrapping des inputs pour shimmer
          inputs.forEach(input => {
            if (!input.parentElement.classList.contains('magic-input-wrap')) {
              const wrap = document.createElement('div');
              wrap.className = 'magic-input-wrap';
              input.parentNode.insertBefore(wrap, input);
              wrap.appendChild(input);
            }
          });

          return true;
        }

        /* ------ Application des effets menus / nav ------ */
        function applyNavEffects() {
          // Cherche les éléments de navigation sidebar
          const navItems = document.querySelectorAll('nav a, nav button, [class*="sidebar"] a, [class*="sidebar"] button, [class*="nav"] a, [class*="menu"] li, [class*="nav-item"]');
          navItems.forEach(item => {
            if (!item.classList.contains('magic-nav-item')) {
              item.classList.add('magic-nav-item');
            }
          });

          // Cards du dashboard → MagicCard glow
          const cards = document.querySelectorAll('[class*="card"], [class*="glass"], [class*="stat"], [class*="widget"], [class*="panel"]');
          cards.forEach(card => {
            // Exclure les éléments de tableau ou leurs conteneurs pour éviter les bugs de bordure (effet de ligne rouge transversale)
            const tagName = card.tagName.toUpperCase();
            if (tagName === 'TABLE' || tagName === 'TR' || tagName === 'TD' || tagName === 'TH' || tagName === 'TBODY' || tagName === 'THEAD' || card.classList.contains('table-container') || card.closest('table')) {
              return;
            }
            if (!card.classList.contains('magic-card-wrapper') && !card.classList.contains('login-magic-wrap')) {
              card.classList.add('magic-card-wrapper');
              trackMouse(card);
            }
          });
        }

        /* ------ Détection page login vs dashboard ------ */
        function isLoginPage() {
          return !!document.querySelector('input[type="password"]');
        }

        /* ------ Application complète ------ */
        function applyEffects() {
          if (isLoginPage()) {
            addGlowBg();
            applyLoginEffects();
          } else {
            removeGlowBg();
            applyNavEffects();
          }
        }

        /* ------ Observer les changements React (SPA) ------ */
        const root = document.getElementById('root');
        if (root) {
          const observer = new MutationObserver(function() {
            // Léger délai pour que React finisse son render
            clearTimeout(window._magicTimer);
            window._magicTimer = setTimeout(applyEffects, 120);
          });
          observer.observe(root, { childList: true, subtree: true, attributes: false });
        }

        // Application initiale dès que le DOM est prêt
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            setTimeout(applyEffects, 300);
          });
        } else {
          setTimeout(applyEffects, 300);
        }

      })();
    </script>

    <script>
      (function() {
        'use strict';

        const COLLAPSE_KEY = 'dolphisic_sidebar_collapsed';
        const NAV_AUTO_COLLAPSE_KEY = 'dolphisic_nav_auto_collapse';
        let extensionMain = null;
        let reactMain = null;
        let activeView = null;
        let dashboardButton = null;
        let settingsButton = null;
        let notifNavBtn = null;
        let dashboardData = null;
        let dashboardSection = 'cryptage';
        let dashboardFilter = 'overdue_cryptage';
        let lastCryptageFilter = 'overdue_cryptage';
        let dashboardDeviceType = 'ALL';
        let dashboardCurrentItems = [];
        let pendingDeviceNavigation = null;
        const selectedDeviceIds = new Set();

        function escapeHtml(value) {
          return String(value == null ? '' : value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
        }

        async function fetchJson(url, options) {
          const response = await fetch(url, options);
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || 'Erreur serveur');
          return data;
        }

        function setCustomActive(button, active) {
          if (!button) return;
          button.style.backgroundColor = active ? 'var(--primary)' : 'transparent';
          button.style.color = active ? '#ffffff' : 'var(--text-main)';
        }

        function closeExtension() {
          activeView = null;
          const app = reactMain && reactMain.parentElement;
          if (app) app.classList.remove('dolphi-custom-view-active');
          if (extensionMain) extensionMain.style.display = 'none';
          if (reactMain) reactMain.style.display = '';
          setCustomActive(dashboardButton, false);
          setCustomActive(settingsButton, false);
        }

        function openExtension(view) {
          activeView = view;
          const app = reactMain && reactMain.parentElement;
          if (app) app.classList.add('dolphi-custom-view-active');
          const nav = dashboardButton && dashboardButton.closest('nav');
          if (nav) {
            nav.querySelectorAll('button:not([data-dolphi-dashboard])').forEach(button => {
              button.style.backgroundColor = 'transparent';
              button.style.color = 'var(--text-main)';
            });
          }
          if (reactMain) reactMain.style.display = 'none';
          if (extensionMain) extensionMain.style.display = 'block';
          setCustomActive(dashboardButton, view === 'dashboard');
          setCustomActive(settingsButton, view === 'settings');
          setCustomActive(notifNavBtn, view === 'notifications');
          if (view === 'dashboard') renderDashboard();
          if (view === 'settings') renderSettings();
          if (view === 'notifications') renderNotifications();
        }

        function normalizedText(value) {
          return String(value || '').trim().toUpperCase();
        }

        function findVisibleButton(text) {
          const target = normalizedText(text);
          const button = Array.from(document.querySelectorAll('button')).find(button => {
            return button.offsetParent !== null && normalizedText(button.textContent) === target;
          });
          if (button) return button;
          const span = Array.from(document.querySelectorAll('span')).find(span => {
            return span.offsetParent !== null && normalizedText(span.textContent) === target;
          });
          if (span) return span;
          return Array.from(document.querySelectorAll('div')).find(div => {
            return div.offsetParent !== null && div.childElementCount === 0 && normalizedText(div.textContent) === target;
          });
        }

        function processPendingDeviceNavigation(attempt) {
          if (!pendingDeviceNavigation || attempt > 40) {
            pendingDeviceNavigation = null;
            return;
          }
          const item = pendingDeviceNavigation;
          const loadedQuery = window.DolphiSICLastDeviceQuery || {};
          const targetLoaded = normalizedText(loadedQuery.cis) === normalizedText(item.cis) &&
            normalizedText(loadedQuery.type) === normalizedText(item.type);
          if (item._typeClicked && targetLoaded) {
            const rows = Array.from(document.querySelectorAll('main table tbody tr'));
            const targetRow = rows.find(row => normalizedText(row.textContent).includes(normalizedText(item.num_serie)));
            if (targetRow) {
              targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
              targetRow.classList.add('dolphi-row-highlight');
              setTimeout(() => targetRow.classList.remove('dolphi-row-highlight'), 2600);
              pendingDeviceNavigation = null;
              return;
            }
          }

          if (!item._cisClicked) {
            const cisButton = findVisibleButton(item.cis);
            if (cisButton) {
              item._cisClicked = true;
              cisButton.click();
            }
          } else if (!item._typeClicked && item.type) {
            const currentCentreVisible = Array.from(document.querySelectorAll('main h1')).some(heading =>
              heading.offsetParent !== null && normalizedText(heading.textContent) === normalizedText(item.cis)
            );
            if (!currentCentreVisible) {
              setTimeout(() => processPendingDeviceNavigation(attempt + 1), 150);
              return;
            }
            const typeLabels = {
              BIP: 'Bips Pager',
              PORTATIF: 'Portatifs',
              MOBILE: 'Mobiles Véhicule',
              INFRA: 'Infrastructures',
              ALERTE: 'Alerte Centrale'
            };
            const typeButton = findVisibleButton(typeLabels[normalizedText(item.type)] || item.type);
            if (typeButton) {
              item._typeClicked = true;
              typeButton.click();
            }
          }
          setTimeout(() => processPendingDeviceNavigation(attempt + 1), 150);
        }

        function navigateToDevice(item) {
          pendingDeviceNavigation = { ...item };
          closeExtension();
          const standardButton = Array.from(document.querySelectorAll('nav button')).find(button =>
            button.textContent.includes('Vue Standard')
          );
          if (standardButton) standardButton.click();
          try {
            if (window.parent && typeof window.parent.onLegacyViewChanged === 'function') {
              window.parent.onLegacyViewChanged('standard');
            }
          } catch (error) {
            console.warn('Impossible de synchroniser la navigation parente.', error);
          }
          setTimeout(() => processPendingDeviceNavigation(0), 100);
        }

        function deviceTypeIcon(type) {
          const normalized = normalizedText(type);
          if (normalized === 'MOBILE') {
            return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 16v2"></path><path d="M19 16v2"></path><rect width="20" height="8" x="2" y="8" rx="2"></rect><path d="M18 12h.01"></path></svg>';
          }
          if (normalized === 'PORTATIF') {
            return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"></rect><path d="M12 18h.01"></path></svg>';
          }
          if (normalized === 'ALERTE') {
            return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.268 21a2 2 0 0 0 3.464 0"></path><path d="M22 8c0-2.3-.8-4.3-2-6"></path><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"></path><path d="M4 2C2.8 3.7 2 5.7 2 8"></path></svg>';
          }
          return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.9 16.1C1 12.2 1 5.8 4.9 1.9"></path><path d="M7.8 4.7a6.14 6.14 0 0 0-.8 7.5"></path><circle cx="12" cy="9" r="2"></circle><path d="M16.2 4.8c2 2 2.26 5.11.8 7.47"></path><path d="M19.1 1.9a9.96 9.96 0 0 1 0 14.1"></path><path d="M9.5 18h5"></path><path d="m8 22 4-11 4 11"></path></svg>';
        }

        function deviceTypeMeta(type) {
          const normalized = normalizedText(type);
          if (normalized === 'MOBILE') {
            return { label: 'Mobile', className: 'dolphi-device-type-mobile', icon: deviceTypeIcon('MOBILE') };
          }
          if (normalized === 'PORTATIF') {
            return { label: 'Portatif', className: 'dolphi-device-type-portable', icon: deviceTypeIcon('PORTATIF') };
          }
          if (normalized === 'ALERTE') {
            return { label: 'Alerte', className: 'dolphi-device-type-alert', icon: deviceTypeIcon('ALERTE') };
          }
          if (normalized === 'INFRA') {
            return { label: 'Infra', className: 'dolphi-device-type-infra', icon: deviceTypeIcon('INFRA') };
          }
          return null;
        }

        function dashboardIcon(name) {
          const start = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">';
          if (name === 'shield') return start + '<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path><path d="m9 12 2 2 4-4"></path></svg>';
          if (name === 'clock') return start + '<circle cx="12" cy="12" r="10"></circle><path d="M12 6v6h4"></path></svg>';
          if (name === 'calendar') return start + '<path d="M8 2v4"></path><path d="M16 2v4"></path><rect width="18" height="18" x="3" y="4" rx="2"></rect><path d="M3 10h18"></path><path d="m9 16 2 2 4-4"></path></svg>';
          if (name === 'download') return start + '<path d="M12 15V3"></path><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="m7 10 5 5 5-5"></path></svg>';
          if (name === 'loans') return start + '<path d="M8 3 4 7l4 4"></path><path d="M4 7h16"></path><path d="m16 21 4-4-4-4"></path><path d="M20 17H4"></path></svg>';
          if (name === 'eye') return start + '<path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path><circle cx="12" cy="12" r="3"></circle></svg>';
          if (name === 'eye-off') return start + '<path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"></path><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"></path><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"></path><path d="m2 2 20 20"></path></svg>';
          if (name === 'restore') return start + '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>';
          return start + '<path d="M4.9 16.1C1 12.2 1 5.8 4.9 1.9"></path><path d="M7.8 4.7a6.14 6.14 0 0 0-.8 7.5"></path><circle cx="12" cy="9" r="2"></circle><path d="M16.2 4.8c2 2 2.26 5.11.8 7.47"></path><path d="M19.1 1.9a9.96 9.96 0 0 1 0 14.1"></path><path d="M9.5 18h5"></path><path d="m8 22 4-11 4 11"></path></svg>';
        }

        function filterDashboardDevices(items) {
          if (dashboardDeviceType === 'ALL') return items;
          return items.filter(item => normalizedText(item.type) === dashboardDeviceType);
        }

        function operationRow(item, label, upcoming) {
          const row = document.createElement('tr');
          const deviceCell = document.createElement('td');
          const main = document.createElement('div');
          main.className = 'dolphi-dashboard-device-cell';
          if (item.id && item.cis && item.num_serie && item.type) {
            const goButton = document.createElement('button');
            goButton.type = 'button';
            goButton.className = 'dolphi-goto-device';
            goButton.title = 'Voir dans le parc';
            goButton.textContent = '→';
            goButton.addEventListener('click', () => navigateToDevice(item));
            main.appendChild(goButton);
          }
          const title = document.createElement('strong');
          title.textContent = item.num_serie || item.nom || item.modele || 'Matériel';
          main.appendChild(title);
          deviceCell.appendChild(main);

          const typeCell = document.createElement('td');
          const typeMeta = deviceTypeMeta(item.type);
          if (typeMeta) {
            const typeBadge = document.createElement('span');
            typeBadge.className = 'dolphi-device-type-badge ' + typeMeta.className;
            typeBadge.innerHTML = typeMeta.icon + '<span>' + typeMeta.label + '</span>';
            typeCell.appendChild(typeBadge);
          } else {
            typeCell.textContent = '—';
          }

          const affectationCell = document.createElement('td');
          affectationCell.className = 'dolphi-dashboard-affectation';
          affectationCell.textContent = [item.cis, item.affectation || item.emprunteur, item.modele].filter(Boolean).join(' · ');

          const dateCell = document.createElement('td');
          dateCell.textContent = item.date_cle_a_faire || item.date_fin || '—';

          const delayCell = document.createElement('td');
          let delayVal = upcoming ? item.days_remaining : item.days_overdue;
          let delayLbl = label;
          let delayClass = 'dolphi-dashboard-delay' + (upcoming ? ' dolphi-dashboard-delay-upcoming' : '');

          if (dashboardFilter === 'hidden_devices') {
            if (item.days_overdue != null) {
              delayVal = item.days_overdue;
              delayLbl = 'de retard';
              delayClass = 'dolphi-dashboard-delay';
            } else if (item.days_remaining != null) {
              delayVal = item.days_remaining;
              delayLbl = 'restants';
              delayClass = 'dolphi-dashboard-delay dolphi-dashboard-delay-upcoming';
            } else {

        function parseDashboardDate(value) {
          if (!value) return null;
          const raw = String(value).trim().split(' ')[0];
          let match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if (match) return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
          match = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
          if (!match) return null;
          let year = Number(match[3]);
          if (year < 100) year += year < 70 ? 2000 : 1900;
          return new Date(year, Number(match[1]) - 1, Number(match[2]));
        }

        async function buildDashboardFallback() {
          const [devices, stock] = await Promise.all([
            fetchJson('/api/search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({})
            }),
            fetchJson('/api/stock')
          ]);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const oneDay = 86400000;
          const overdueCryptage = [];
          const approachingCryptage = [];
          let upToDateCryptage = 0;
          const typeDistribution = {};
          devices.filter(item => {
            const type = String(item.type || '').trim().toUpperCase();
            const cis = String(item.cis || '').trim().toUpperCase();
            return !['TEST', 'PERDU', 'REFORME', 'RÉFORME'].includes(cis) && type !== 'BIP' && type !== 'BIPS';
          }).forEach(item => {
            const dueDate = parseDashboardDate(item.date_cle_a_faire);
            if (!dueDate) return;
            const type = normalizedText(item.type) || 'AUTRE';
            typeDistribution[type] = (typeDistribution[type] || 0) + 1;
            const days = Math.round((dueDate - today) / oneDay);
            if (days < 0) overdueCryptage.push({ ...item, days_overdue: Math.abs(days) });
            else if (days <= 30) approachingCryptage.push({ ...item, days_remaining: days });
            else upToDateCryptage += 1;
          });
          const overdueLoans = stock
            .filter(item => String(item.cis || '').trim().toUpperCase() !== 'TEST' && item.active_pret_id)
            .map(item => {
              const dueDate = parseDashboardDate(item.date_fin);
              return dueDate && dueDate < today
                ? { ...item, days_overdue: Math.round((today - dueDate) / oneDay) }
                : null;
            })
            .filter(Boolean);
          overdueCryptage.sort((a, b) => b.days_overdue - a.days_overdue);
          approachingCryptage.sort((a, b) => a.days_remaining - b.days_remaining);
          overdueLoans.sort((a, b) => b.days_overdue - a.days_overdue);
          return {
            summary: {
              overdue_cryptage: overdueCryptage.length,
              approaching_cryptage: approachingCryptage.length,
              up_to_date_cryptage: upToDateCryptage,
              total_cryptage: Object.values(typeDistribution).reduce((sum, count) => sum + count, 0),
              type_distribution: typeDistribution,
              overdue_loans: overdueLoans.length,
              total_urgent: overdueCryptage.length + overdueLoans.length
            },
            overdue_cryptage: overdueCryptage,
            approaching_cryptage: approachingCryptage,
            overdue_loans: overdueLoans
          };
        }

        async function loadDashboard() {
          const feedback = extensionMain.querySelector('#dolphi-dashboard-feedback');
          if (feedback) {
            feedback.className = 'dolphi-feedback';
            feedback.textContent = 'Chargement des opérations...';
          }
          try {
            let data;
            try {
              data = await fetchJson('/api/dashboard/urgent');
            } catch (error) {
              data = await buildDashboardFallback();
            }
            dashboardData = data;
            updateDashboardFilter();
            if (feedback) {
              feedback.remove();
            }
          } catch (error) {
            if (feedback) {
              feedback.className = 'dolphi-feedback error';
              feedback.textContent = error.message;
            }
          }
        }

        function updateDashboardFilter() {
          if (!dashboardData || !extensionMain) return;
          const summary = dashboardData.summary || {};
          const filters = {
            overdue_cryptage: {
              title: 'Cryptages dépassés',
              count: summary.overdue_cryptage || 0,
              items: dashboardData.overdue_cryptage || [],
              label: 'de retard',
              upcoming: false
            },
            approaching_cryptage: {
              title: 'Cryptages sous 30 jours',
              count: summary.approaching_cryptage || 0,
              items: dashboardData.approaching_cryptage || [],
              label: 'restants',
              upcoming: true
            },
            hidden_devices: {
              title: 'Appareils masqués',
              count: summary.hidden_devices || 0,
              items: dashboardData.hidden_devices || [],
              label: 'masqué',
              upcoming: false
            },
            overdue_loans: {
              title: 'Prêts en retard',
              count: summary.overdue_loans || 0,
              items: dashboardData.overdue_loans || [],
              label: 'de retard',
              upcoming: false
            }
          };
          const selected = filters[dashboardFilter] || filters.overdue_cryptage;
          const selectedItems = dashboardSection === 'cryptage' ? filterDashboardDevices(selected.items) : selected.items;
          dashboardCurrentItems = selectedItems;
          const overdueCount = filterDashboardDevices(filters.overdue_cryptage.items).length;
          const approachingCount = filterDashboardDevices(filters.approaching_cryptage.items).length;
          const validCount = Number(summary.up_to_date_cryptage || 0);
          const totalCount = Number(summary.total_cryptage || (filters.overdue_cryptage.count + filters.approaching_cryptage.count + validCount));
          extensionMain.querySelector('#cryptage-count').textContent = overdueCount;
          extensionMain.querySelector('#approaching-count').textContent = approachingCount;
          extensionMain.querySelector('#hidden-count').textContent = Number(summary.hidden_devices || 0);
          extensionMain.querySelector('#loan-count').textContent = filters.overdue_loans.count;
          extensionMain.querySelector('#dashboard-filter-title').textContent = selected.title;
          extensionMain.querySelector('#dashboard-filter-badge').textContent = selectedItems.length;

          const activity = dashboardData.last_cryptage_update;
          const activityDate = activity && activity.updated_at ? new Date(activity.updated_at) : null;
          let updatedLabel = 'Aucun cryptage enregistré';
          let updatedDetail = '';
          if (activityDate && !Number.isNaN(activityDate.getTime())) {
            updatedLabel = activityDate.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
            if (activity.date_only) {
              updatedDetail = 'Heure historique non disponible';
            } else {
              updatedLabel += ' à ' + activityDate.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
              updatedDetail = activity.device_count + ' équipement' + (activity.device_count > 1 ? 's' : '') + ' mis à jour';
            }
          }
          extensionMain.querySelector('#dashboard-updated-at').textContent = updatedLabel;
          extensionMain.querySelector('#dashboard-updated-detail').textContent = updatedDetail;

          const distribution = summary.type_distribution || {};
          const mobileCount = Number(distribution.MOBILE || 0);
          const portableCount = Number(distribution.PORTATIF || 0);
          const otherCount = Math.max(0, totalCount - mobileCount - portableCount);
          const distributionTotal = Math.max(1, mobileCount + portableCount + otherCount);
          const portablePercent = portableCount / distributionTotal * 100;
          const mobilePercent = mobileCount / distributionTotal * 100;
          const donut = extensionMain.querySelector('#dashboard-type-donut');
          donut.style.setProperty('--portable-end', portablePercent + '%');
          donut.style.setProperty('--mobile-end', (portablePercent + mobilePercent) + '%');
          extensionMain.querySelector('#portable-total').textContent = portableCount;
          const formatPercent = value => value.toLocaleString('fr-FR', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' %';
          extensionMain.querySelector('#portable-percent').textContent = formatPercent(portablePercent);
          extensionMain.querySelector('#mobile-total').textContent = mobileCount;
          extensionMain.querySelector('#mobile-percent').textContent = formatPercent(mobilePercent);
          extensionMain.querySelector('#other-total').textContent = otherCount;
          extensionMain.querySelector('#other-percent').textContent = formatPercent(otherCount / distributionTotal * 100);

          const deadlineTotal = Math.max(1, Number(summary.overdue_cryptage || 0) + Number(summary.approaching_cryptage || 0) + validCount);
          const overduePercent = Number(summary.overdue_cryptage || 0) / deadlineTotal * 100;
          const approachingPercent = Number(summary.approaching_cryptage || 0) / deadlineTotal * 100;
          const validPercent = validCount / deadlineTotal * 100;
          extensionMain.querySelector('#deadline-overdue').style.width = overduePercent + '%';
          extensionMain.querySelector('#deadline-soon').style.width = approachingPercent + '%';
          extensionMain.querySelector('#deadline-valid').style.width = validPercent + '%';
          extensionMain.querySelector('#deadline-overdue-value').textContent = summary.overdue_cryptage || 0;
          extensionMain.querySelector('#deadline-soon-value').textContent = summary.approaching_cryptage || 0;
          extensionMain.querySelector('#deadline-valid-value').textContent = validCount;
          extensionMain.querySelectorAll('[data-dashboard-filter]').forEach(button => {
            button.classList.toggle('active', button.dataset.dashboardFilter === dashboardFilter);
          });
          extensionMain.querySelectorAll('[data-dashboard-section]').forEach(button => {
            const active = button.dataset.dashboardSection === dashboardSection;
            button.classList.toggle('active', active);
            button.setAttribute('aria-selected', active ? 'true' : 'false');
          });
          extensionMain.querySelectorAll('[data-dashboard-panel]').forEach(panel => {
            panel.hidden = panel.dataset.dashboardPanel !== dashboardSection;
          });
          const typeToolbar = extensionMain.querySelector('#dolphi-device-type-toolbar');
          if (typeToolbar) typeToolbar.hidden = dashboardSection !== 'cryptage';
          extensionMain.querySelectorAll('[data-dashboard-device-type]').forEach(button => {
            const active = button.dataset.dashboardDeviceType === dashboardDeviceType;
            button.classList.toggle('active', active);
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
          });
          fillOperationList('dashboard-filter-list', selectedItems, selected.label, selected.upcoming);
        }

        function exportDashboardCsv() {
          if (!dashboardCurrentItems.length) return;
          const rows = [['Numéro de série', 'Type', 'CIS', 'Affectation', 'Modèle', 'Date limite', 'Délai']];
          dashboardCurrentItems.forEach(item => {
            const delay = item.days_remaining != null ? item.days_remaining + ' jours restants' : item.days_overdue + ' jours de retard';
            rows.push([
              item.num_serie || item.nom || '',
              item.type || '',
              item.cis || '',
              item.affectation || item.emprunteur || '',
              item.modele || '',
              item.date_cle_a_faire || item.date_fin || '',
              delay
            ]);
          });
          const csv = '\ufeff' + rows.map(row => row.map(value => '"' + String(value).replace(/"/g, '""') + '"').join(';')).join('\r\n');
          const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
          const link = document.createElement('a');
          link.href = url;
          link.download = 'dolphisic-dashboard-' + new Date().toISOString().slice(0, 10) + '.csv';
          link.click();
          URL.revokeObjectURL(url);
        }

          async function loadEmails() {

              emails = await fetchJson('/api/notifications/emails');

              showFeedback("Erreur de chargement des emails: " + err.message, true);
            }

          function renderEmailsList() {
            if (!emails.length) {
              emailsListTbody.innerHTML = `<tr><td colspan="2" style="text-align: center; color: var(--text-muted); padding: 20px;">Aucun destinataire enregistré.</td></tr>`;
              return;
            }
            
            emailsListTbody.innerHTML = '';
            emails.forEach(item => {
              const tr = document.createElement('tr');
              tr.style.cursor = 'pointer';
              if (selectedEmail && selectedEmail.id === item.id) {
                tr.style.backgroundColor = 'rgba(255, 255, 255, 0.08)';
                tr.style.fontWeight = 'bold';
              }
              
              const tdEmail = document.createElement('td');
              tdEmail.innerHTML = `${item.email} ${item.enabled ? (item.global_enabled ? '<span class="badge" style="margin-left:8px; font-size:10px; background-color: var(--primary);">Global</span>' : '<span class="badge" style="margin-left:8px; font-size:10px; background-color: rgba(255,255,255,0.15); color: var(--text-main);">Individuel</span>') : '<span class="badge" style="margin-left:8px; font-size:10px; background-color: rgba(230, 57, 70, 0.15); color: #e63946;">Désactivé</span>'}`;
              tdEmail.addEventListener('click', () => selectEmail(item));
              
              const tdAction = document.createElement('td');
              tdAction.style.textAlign = 'right';
              
              const delBtn = document.createElement('button');
              delBtn.type = 'button';
              delBtn.className = 'btn btn-outline btn-xs';
              delBtn.style.color = 'var(--primary)';
              delBtn.innerHTML = '🗑️';
              delBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (!confirm(`Supprimer l'adresse ${item.email} et toutes ses liaisons ?`)) return;
                try {
                  await fetchJson(`/api/notifications/emails/${item.id}`, { method: 'DELETE' });
                  if (selectedEmail && selectedEmail.id === item.id) {
                    selectedEmail = null;
                    localStorage.removeItem('dolphi_active_email_id');
                    localStorage.removeItem('dolphi_active_email_name');
                    disableConfigPanel();

                  await loadEmails();
