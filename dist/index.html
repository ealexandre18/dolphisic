        'use strict';

        const CONSENT_KEY = 'dolphisic_cookie_consent';
        const CONSENT_COOKIE = 'dolphisic_cookie_consent';
        const COOKIE_PREFIX = 'dolphisic_';
        const MANAGED_KEYS = ['cryptis_token', 'cryptis_user', 'cryptis_theme'];
        const ONE_YEAR = 60 * 60 * 24 * 365;
        const nativeGetItem = Storage.prototype.getItem;
        const nativeSetItem = Storage.prototype.setItem;

        function getNativeLocalStorage(method, key, value) {

            if (method === 'get') return nativeGetItem.call(localStorage, key);

        function setCookie(name, value, maxAge) {
          document.cookie = name + '=' + encodeURIComponent(value || '') + '; Max-Age=' + maxAge + '; Path=/; SameSite=Lax';

        function getCookie(name) {

          clearManagedCookies();
          if (nativeFetch) {

          if (getDecision() || document.querySelector('.dolphisic-cookie-banner')) return;
          const banner = document.createElement('div');
          banner.className = 'dolphisic-cookie-banner';
          banner.innerHTML =

        document.addEventListener('click', function(event) {

            renderBanner();

        const LOG_ENDPOINT = '/api/logs/ui';
        
        function sendLog(event, details) {
          const payload = {
            event: event,
            path: window.location.pathname + window.location.search + window.location.hash,
            details: details,
            timestamp: new Date().toISOString()

          fetch(LOG_ENDPOINT, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload),
            keepalive: true
          }).catch(err => {});
        }

        let lastPath = window.location.pathname + window.location.search + window.location.hash;
        
        function checkNavigation() {
          const currentPath = window.location.pathname + window.location.search + window.location.hash;
          if (currentPath !== lastPath) {
            lastPath = currentPath;
            sendLog('NAVIGATION', {});
          }
        }

        const originalPushState = history.pushState;
        history.pushState = function() {
          originalPushState.apply(this, arguments);
          checkNavigation();
        };

        const originalReplaceState = history.replaceState;
        history.replaceState = function() {
          originalReplaceState.apply(this, arguments);
          checkNavigation();
        };

        window.addEventListener('popstate', checkNavigation);

        document.addEventListener('click', function(e) {
          let target = e.target;
          let interactiveEl = null;
          let depth = 0;
          let curr = target;
          
          while (curr && depth < 4) {
            const tag = curr.tagName ? curr.tagName.toUpperCase() : '';
            const role = curr.getAttribute ? curr.getAttribute('role') : '';
            let cursor = '';
            try {
              if (window.getComputedStyle && curr instanceof Element) {
                cursor = window.getComputedStyle(curr).cursor;
              }
            } catch (err) {}
            
            const hasClickAttr = curr.getAttribute && (curr.getAttribute('onclick') || curr.getAttribute('@click') || curr.getAttribute('v-on:click'));
            
            if (
              tag === 'BUTTON' || 
              tag === 'A' || 
              (tag === 'INPUT' && ['submit', 'button', 'checkbox', 'radio', 'image'].includes(curr.type)) ||
              tag === 'SELECT' || 
              tag === 'OPTION' ||
              role === 'button' ||
              role === 'link' ||
              role === 'checkbox' ||
              role === 'switch' ||
              cursor === 'pointer' ||
              hasClickAttr ||
              (curr.className && typeof curr.className === 'string' && (curr.className.includes('btn') || curr.className.includes('button') || curr.className.includes('toggle')))
            ) {
              interactiveEl = curr;
              break;
            }
            curr = curr.parentNode;
            depth++;
          }
          
          if (!interactiveEl) return;
          
          let label = '';
          if (interactiveEl.innerText) {
            label = interactiveEl.innerText.trim();
          }
          
          if (!label && interactiveEl.getAttribute) {
            label = interactiveEl.getAttribute('aria-label') || 
                    interactiveEl.getAttribute('title') || 
                    interactiveEl.getAttribute('placeholder') ||
                    interactiveEl.getAttribute('alt');
          }
          
          if (!label && interactiveEl.tagName === 'INPUT') {
            label = interactiveEl.value || interactiveEl.name || interactiveEl.type;
          }
          
          if (!label && interactiveEl.id) {
            label = '#' + interactiveEl.id;
          }
          
          if (!label) {
            label = interactiveEl.tagName;
          }
          
          label = label.substring(0, 60);
          
          sendLog('CLICK', {
            tag: interactiveEl.tagName.toLowerCase(),
            label: label,
            id: interactiveEl.id || '',
            class: typeof interactiveEl.className === 'string' ? interactiveEl.className : '',
            type: interactiveEl.type || '',
            role: interactiveEl.getAttribute ? interactiveEl.getAttribute('role') : ''
          });
        }, true);

        document.addEventListener('change', function(e) {
          const target = e.target;
          if (!target) return;
          
          const tag = target.tagName ? target.tagName.toUpperCase() : '';
          const type = target.type ? target.type.toLowerCase() : '';
          
          let label = '';
          if (target.id) {
            const labelEl = document.querySelector('label[for="' + target.id + '"]');
            if (labelEl) label = labelEl.innerText.trim();
          }
          if (!label && target.placeholder) label = target.placeholder;
          if (!label && target.name) label = target.name;
          
          let val = target.value;
          if (type === 'checkbox') {
            val = target.checked ? 'TRUE' : 'FALSE';
          } else if (type === 'radio') {
            val = target.checked ? target.value : '';
            if (!val) return;
          }
          
          sendLog('CHANGE', {
            tag: tag.toLowerCase(),
            name: target.name || target.id || '',
            label: label || target.name || '',
            value: val
          });
        }, true);

        document.addEventListener('submit', function(e) {
          const form = e.target;
          if (!form) return;
          
          const fields = {};
          try {
            const formData = new FormData(form);
            for (let [key, val] of formData.entries()) {
              if (/pass|token|secret|key/i.test(key)) {
                fields[key] = '********';
              } else {
                fields[key] = val;
              }
            }
          } catch (err) {}
          
          try {
            const inputs = form.querySelectorAll('input, select, textarea');
            inputs.forEach(input => {
              if (input.id && !fields[input.id] && (!input.name || input.name === '')) {
                const key = input.id;
                const val = input.value;
                if (input.type === 'password' || /pass|token|secret|key/i.test(key)) {
                  fields[key] = '********';
                } else {
                  fields[key] = val;
                }
              }
            });
          } catch (err) {}

          sendLog('SUBMIT', {
            id: form.id || '',
            name: form.name || '',
            fields: fields
          });
        }, true);
        
      })();
    </script>

    <!-- ====================================================
         MagicUI Effects — Injection dynamique
         Observe le DOM React et applique les effets CSS
         ==================================================== -->
    <script>
      (function() {
        'use strict';

        /* ------ Helpers ------ */
        function addGlowBg() {
          if (document.querySelector('.magic-bg-glow')) return;
          const g1 = document.createElement('div');
          g1.className = 'magic-bg-glow magic-bg-glow-1';
          const g2 = document.createElement('div');
          g2.className = 'magic-bg-glow magic-bg-glow-2';
          document.body.prepend(g2);
          document.body.prepend(g1);
        }

        function removeGlowBg() {
          document.querySelectorAll('.magic-bg-glow').forEach(el => el.remove());
        }

        /* ------ Mouse tracking pour le glow MagicCard ------ */
        function trackMouse(el) {
          // Glow effect disabled
        }

        /* ------ Application des effets login ------ */
        function applyLoginEffects() {
          // Cherche le conteneur de la card de login
          // La page login a un formulaire avec un champ username et password
          const inputs = document.querySelectorAll('input[type="password"], input[type="text"], input[placeholder*="tilisateur"], input[placeholder*="Mot"], input[name*="pass"], input[name*="user"]');
          if (inputs.length === 0) return false;

          // Remonter jusqu'à la card englobante
          let card = null;
          let el = inputs[0];
          for (let i = 0; i < 8; i++) {
            el = el.parentElement;
            if (!el) break;
            const s = window.getComputedStyle(el);
            if ((s.background && s.background.includes('rgba') || el.className.includes('glass') || el.className.includes('card') || el.className.includes('login') || el.className.includes('form') || el.className.includes('container')) && el.offsetWidth > 200) {
              card = el;
              break;
            }
          }

          if (!card) {
            // Fallback : prend le premier ancêtre avec une taille raisonnable
            el = inputs[0];
            for (let i = 0; i < 6; i++) {
              el = el.parentElement;
              if (!el) break;
              if (el.offsetWidth > 200 && el.offsetWidth < window.innerWidth * 0.8) {
                card = el;
                break;
              }
            }
          }

          if (card && !card.classList.contains('login-magic-wrap')) {
            card.classList.add('login-magic-wrap', 'magic-entrance');
            trackMouse(card);
          }

          // Bouton de login → pulsating
          const btns = document.querySelectorAll('button[type="submit"], button');
          btns.forEach(btn => {
            const txt = btn.textContent.toLowerCase();
            if ((txt.includes('connect') || txt.includes('login') || txt.includes('identif') || txt.includes('valider') || txt.includes('sign')) && !btn.classList.contains('pulsating-btn')) {
              btn.classList.add('pulsating-btn');
            }
          });

          // Wrapping des inputs pour shimmer
          inputs.forEach(input => {
            if (!input.parentElement.classList.contains('magic-input-wrap')) {
              const wrap = document.createElement('div');
              wrap.className = 'magic-input-wrap';
              input.parentNode.insertBefore(wrap, input);
              wrap.appendChild(input);
            }
          });

          return true;
        }

        /* ------ Application des effets menus / nav ------ */
        function applyNavEffects() {
          // Cherche les éléments de navigation sidebar
          const navItems = document.querySelectorAll('nav a, nav button, [class*="sidebar"] a, [class*="sidebar"] button, [class*="nav"] a, [class*="menu"] li, [class*="nav-item"]');
          navItems.forEach(item => {
            if (!item.classList.contains('magic-nav-item')) {
              item.classList.add('magic-nav-item');
            }
          });

          // Cards du dashboard → MagicCard glow
          const cards = document.querySelectorAll('[class*="card"], [class*="glass"], [class*="stat"], [class*="widget"], [class*="panel"]');
          cards.forEach(card => {
            // Exclure les éléments de tableau ou leurs conteneurs pour éviter les bugs de bordure (effet de ligne rouge transversale)
            const tagName = card.tagName.toUpperCase();
            if (tagName === 'TABLE' || tagName === 'TR' || tagName === 'TD' || tagName === 'TH' || tagName === 'TBODY' || tagName === 'THEAD' || card.classList.contains('table-container') || card.closest('table')) {
              return;
            }
            if (!card.classList.contains('magic-card-wrapper') && !card.classList.contains('login-magic-wrap')) {
              card.classList.add('magic-card-wrapper');
              trackMouse(card);
            }
          });
        }

        /* ------ Détection page login vs dashboard ------ */
        function isLoginPage() {
          return !!document.querySelector('input[type="password"]');
        }

        /* ------ Application complète ------ */
        function applyEffects() {
          if (isLoginPage()) {
            addGlowBg();
            applyLoginEffects();
          } else {
            removeGlowBg();
            applyNavEffects();
          }
        }

        /* ------ Observer les changements React (SPA) ------ */
        const root = document.getElementById('root');
        if (root) {
          const observer = new MutationObserver(function() {
            // Léger délai pour que React finisse son render
            clearTimeout(window._magicTimer);
            window._magicTimer = setTimeout(applyEffects, 120);
          });
          observer.observe(root, { childList: true, subtree: true, attributes: false });
        }

        // Application initiale dès que le DOM est prêt
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            setTimeout(applyEffects, 300);
          });
        } else {
          setTimeout(applyEffects, 300);
        }

      })();
    </script>

    <script>
      (function() {
        'use strict';

        const COLLAPSE_KEY = 'dolphisic_sidebar_collapsed';
        let extensionMain = null;
        let reactMain = null;
        let activeView = null;
        let dashboardButton = null;
        let settingsButton = null;
        let notifNavBtn = null;
        let dashboardData = null;
        let dashboardFilter = 'overdue_cryptage';
        let dashboardSortOrder = 'desc';
        let dashboardCisFilter = '';
        let dashboardAvailableCis = [];
        let pendingDeviceNavigation = null;
        const selectedDeviceIds = new Set();

        function escapeHtml(value) {
          return String(value == null ? '' : value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
        }

        async function fetchJson(url, options) {
          const response = await fetch(url, options);
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || 'Erreur serveur');
          return data;
        }

        function setCustomActive(button, active) {
          if (!button) return;
          button.style.backgroundColor = active ? 'var(--primary)' : 'transparent';
          button.style.color = active ? '#ffffff' : 'var(--text-main)';
        }

        function closeExtension() {
          activeView = null;
          const app = reactMain && reactMain.parentElement;
          if (app) app.classList.remove('dolphi-custom-view-active');
          if (extensionMain) extensionMain.style.display = 'none';
          if (reactMain) reactMain.style.display = '';
          setCustomActive(dashboardButton, false);
          setCustomActive(settingsButton, false);
        }

        function openExtension(view) {
          activeView = view;
          const app = reactMain && reactMain.parentElement;
          if (app) app.classList.add('dolphi-custom-view-active');
          const nav = dashboardButton && dashboardButton.closest('nav');
          if (nav) {
            nav.querySelectorAll('button:not([data-dolphi-dashboard])').forEach(button => {
              button.style.backgroundColor = 'transparent';
              button.style.color = 'var(--text-main)';
            });
          }
          if (reactMain) reactMain.style.display = 'none';
          if (extensionMain) extensionMain.style.display = 'block';
          setCustomActive(dashboardButton, view === 'dashboard');
          setCustomActive(settingsButton, view === 'settings');
          setCustomActive(notifNavBtn, view === 'notifications');
          if (view === 'dashboard') renderDashboard();
          if (view === 'settings') renderSettings();
          if (view === 'notifications') renderNotifications();
        }

        function normalizedText(value) {
          return String(value || '').trim().toUpperCase();
        }

        function findVisibleButton(text) {
          const target = normalizedText(text);
          const button = Array.from(document.querySelectorAll('button')).find(button => {
            return button.offsetParent !== null && normalizedText(button.textContent) === target;
          });
          if (button) return button;
          const span = Array.from(document.querySelectorAll('span')).find(span => {
            return span.offsetParent !== null && normalizedText(span.textContent) === target;
          });
          if (span) return span;
          return Array.from(document.querySelectorAll('div')).find(div => {
            return div.offsetParent !== null && div.childElementCount === 0 && normalizedText(div.textContent) === target;
          });
        }

        function processPendingDeviceNavigation(attempt) {
          if (!pendingDeviceNavigation || attempt > 40) {
            pendingDeviceNavigation = null;
            return;
          }
          const item = pendingDeviceNavigation;
          const loadedQuery = window.DolphiSICLastDeviceQuery || {};
          const targetLoaded = normalizedText(loadedQuery.cis) === normalizedText(item.cis) &&
            normalizedText(loadedQuery.type) === normalizedText(item.type);
          if (item._typeClicked && targetLoaded) {
            const rows = Array.from(document.querySelectorAll('main table tbody tr'));
            const targetRow = rows.find(row => normalizedText(row.textContent).includes(normalizedText(item.num_serie)));
            if (targetRow) {
              targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
              targetRow.classList.add('dolphi-row-highlight');
              setTimeout(() => targetRow.classList.remove('dolphi-row-highlight'), 2600);
              pendingDeviceNavigation = null;
              return;
            }
          }

          if (!item._cisClicked) {
            const cisButton = findVisibleButton(item.cis);
            if (cisButton) {
              item._cisClicked = true;
              cisButton.click();
            }
          } else if (!item._typeClicked && item.type) {
            const currentCentreVisible = Array.from(document.querySelectorAll('main h1')).some(heading =>
              heading.offsetParent !== null && normalizedText(heading.textContent) === normalizedText(item.cis)
            );
            if (!currentCentreVisible) {
              setTimeout(() => processPendingDeviceNavigation(attempt + 1), 150);
              return;
            }
            const typeLabels = {
              BIP: 'BIPs',
              PORTATIF: 'Portatifs',
              MOBILE: 'Mobiles Véhicule',
              INFRA: 'Infrastructures',
              ALERTE: 'Alerte Centrale'
            };
            const typeButton = findVisibleButton(typeLabels[normalizedText(item.type)] || item.type);
            if (typeButton) {
              item._typeClicked = true;
              typeButton.click();
            }
          }
          setTimeout(() => processPendingDeviceNavigation(attempt + 1), 150);
        }

        function navigateToDevice(item) {
          pendingDeviceNavigation = { ...item };
          closeExtension();
          const standardButton = Array.from(document.querySelectorAll('nav button')).find(button =>
            button.textContent.includes('Vue Standard')
          );
          if (standardButton) standardButton.click();
          try {
            if (window.parent && typeof window.parent.onLegacyViewChanged === 'function') {
              window.parent.onLegacyViewChanged('standard');
            }
          } catch (error) {
            console.warn('Impossible de synchroniser la navigation parente.', error);
          }
          setTimeout(() => processPendingDeviceNavigation(0), 100);
        }

        function operationRow(item, label, upcoming) {
          const row = document.createElement('div');
          row.className = 'dolphi-operation-row';

          const main = document.createElement('div');
          main.className = 'dolphi-operation-main';
          if (item.id && item.cis && item.num_serie && item.type) {
            const goButton = document.createElement('button');
            goButton.type = 'button';
            goButton.className = 'dolphi-goto-device';
            goButton.title = 'Voir dans le parc';
            goButton.textContent = '→';
            goButton.addEventListener('click', () => navigateToDevice(item));
            main.appendChild(goButton);
          }
          const identity = document.createElement('div');
          const title = document.createElement('strong');
          title.textContent = item.num_serie || item.nom || item.modele || 'Matériel';
          const detail = document.createElement('small');
          detail.textContent = [item.modele, item.cis, item.emprunteur].filter(Boolean).join(' · ');
          identity.append(title, detail);
          main.appendChild(identity);

          const delay = document.createElement('div');
          delay.className = 'dolphi-operation-delay';
          const value = upcoming ? item.days_remaining : item.days_overdue;
          delay.innerHTML = '<strong>' + escapeHtml(value) + ' j</strong><small>' + escapeHtml(label) + '</small>';
          row.append(main, delay);
          return row;
        }

        function fillOperationList(id, items, label, upcoming) {
          const list = extensionMain.querySelector('#' + id);
          list.innerHTML = '';
          if (!items.length) {
            const empty = document.createElement('div');
            empty.className = 'dolphi-empty';
            empty.textContent = 'Aucune opération dans cette catégorie.';
            list.appendChild(empty);
            return;
          }
          items.forEach(item => list.appendChild(operationRow(item, label, upcoming)));
        }

        function parseDashboardDate(value) {
          if (!value) return null;
          const raw = String(value).trim().split(' ')[0];
          let match = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
          if (match) return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
          match = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
          if (!match) return null;
          let year = Number(match[3]);
          if (year < 100) year += year < 70 ? 2000 : 1900;
          return new Date(year, Number(match[1]) - 1, Number(match[2]));
        }

        async function buildDashboardFallback() {
          const [devices, stock] = await Promise.all([
            fetchJson('/api/search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({})
            }),
            fetchJson('/api/stock')
          ]);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const oneDay = 86400000;
          const overdueCryptage = [];
          const approachingCryptage = [];
          devices.filter(item => String(item.cis || '').trim().toUpperCase() !== 'TEST').forEach(item => {
            const dueDate = parseDashboardDate(item.date_cle_a_faire);
            if (!dueDate) return;
            const days = Math.round((dueDate - today) / oneDay);
            if (days < 0) overdueCryptage.push({ ...item, days_overdue: Math.abs(days) });
            else if (days <= 30) approachingCryptage.push({ ...item, days_remaining: days });
          });
          const overdueLoans = stock
            .filter(item => String(item.cis || '').trim().toUpperCase() !== 'TEST' && item.active_pret_id)
            .map(item => {
              const dueDate = parseDashboardDate(item.date_fin);
              return dueDate && dueDate < today
                ? { ...item, days_overdue: Math.round((today - dueDate) / oneDay) }
                : null;
            })
            .filter(Boolean);
          overdueCryptage.sort((a, b) => b.days_overdue - a.days_overdue);
          approachingCryptage.sort((a, b) => a.days_remaining - b.days_remaining);
          overdueLoans.sort((a, b) => b.days_overdue - a.days_overdue);
          return {
            summary: {
              overdue_cryptage: overdueCryptage.length,
              approaching_cryptage: approachingCryptage.length,
              overdue_loans: overdueLoans.length,
              total_urgent: overdueCryptage.length + overdueLoans.length
            },
            overdue_cryptage: overdueCryptage,
            approaching_cryptage: approachingCryptage,
            overdue_loans: overdueLoans
          };
        }

        async function loadDashboard() {
          const feedback = extensionMain.querySelector('#dolphi-dashboard-feedback');
          feedback.className = 'dolphi-feedback';
          feedback.textContent = 'Chargement des opérations...';
          try {
            let data;
            try {
              data = await fetchJson('/api/dashboard/urgent');
            } catch (error) {
              data = await buildDashboardFallback();
            }
            dashboardData = data;

            // Extract unique CIS names
            const cisSet = new Set();
            const collectCis = arr => {
              if (Array.isArray(arr)) {
                arr.forEach(item => {
                  if (item.cis) {
                    const trimmed = String(item.cis).trim();
                    if (trimmed && trimmed.toUpperCase() !== 'N/A' && trimmed.toUpperCase() !== 'TEST') {
                      cisSet.add(trimmed);
                    }
                  }
                });
              }
            };
            if (data) {
              collectCis(data.overdue_cryptage);
              collectCis(data.approaching_cryptage);
              collectCis(data.overdue_loans);
              collectCis(data.hidden_devices);
            }
            dashboardAvailableCis = Array.from(cisSet).sort((a, b) => a.localeCompare(b, 'fr'));

            updateDashboardFilter();
            feedback.remove();
          } catch (error) {
            feedback.className = 'dolphi-feedback error';
            feedback.textContent = error.message;
          }
        }

        function updateDashboardFilter() {
          if (!dashboardData || !extensionMain) return;
          const summary = dashboardData.summary || {};
          const filters = {
            overdue_cryptage: {
              title: 'Cryptages dépassés',
              count: summary.overdue_cryptage || 0,
              items: dashboardData.overdue_cryptage || [],
              label: 'de retard',
              upcoming: false
            },
            approaching_cryptage: {
              title: 'Cryptages sous 30 jours',
              count: summary.approaching_cryptage || 0,
              items: dashboardData.approaching_cryptage || [],
              label: 'restants',
              upcoming: true
            },
            overdue_loans: {
              title: 'Prêts en retard',
              count: summary.overdue_loans || 0,
              items: dashboardData.overdue_loans || [],
              label: 'de retard',
              upcoming: false
            }
          };
          const selected = filters[dashboardFilter] || filters.overdue_cryptage;
          
          let selectedItems = [...(selected.items || [])];
          
          // 1. Filter by CIS search
          if (dashboardCisFilter) {
            const cleanFilter = dashboardCisFilter.trim().toUpperCase();
            selectedItems = selectedItems.filter(item => 
              item.cis && String(item.cis).trim().toUpperCase() === cleanFilter
            );
          }

          // 2. Sort items
          const upcoming = selected.upcoming;
          selectedItems.sort((a, b) => {
            if (upcoming) {
              // Approaching cryptage: days_remaining
              // Default (desc): closest to deadline (ascending value of days_remaining)
              // Alternate (asc): furthest from deadline (descending value of days_remaining)
              const valA = a.days_remaining != null ? Number(a.days_remaining) : 99999;
              const valB = b.days_remaining != null ? Number(b.days_remaining) : 99999;
              return dashboardSortOrder === 'desc' ? (valA - valB) : (valB - valA);
            } else {
              // Overdue cryptage / loans: days_overdue
              // Default (desc): most overdue (descending value of days_overdue)
              // Alternate (asc): least overdue (ascending value of days_overdue)
              const valA = a.days_overdue != null ? Number(a.days_overdue) : -1;
              const valB = b.days_overdue != null ? Number(b.days_overdue) : -1;
              return dashboardSortOrder === 'desc' ? (valB - valA) : (valA - valB);
            }
          });

          extensionMain.querySelector('#cryptage-count').textContent = filters.overdue_cryptage.count;
          extensionMain.querySelector('#approaching-count').textContent = filters.approaching_cryptage.count;
          extensionMain.querySelector('#loan-count').textContent = filters.overdue_loans.count;
          extensionMain.querySelector('#dashboard-filter-title').textContent = selected.title;
          extensionMain.querySelector('#dashboard-filter-badge').textContent = selectedItems.length;
          extensionMain.querySelectorAll('[data-dashboard-filter]').forEach(button => {
            button.classList.toggle('active', button.dataset.dashboardFilter === dashboardFilter);
          });
          fillOperationList('dashboard-filter-list', selectedItems, selected.label, selected.upcoming);
        }

            </section>`;
          extensionMain.querySelector('#dolphi-refresh-dashboard').addEventListener('click', loadDashboard);
          extensionMain.querySelectorAll('[data-dashboard-filter]').forEach(button => {
            button.addEventListener('click', () => {
              dashboardFilter = button.dataset.dashboardFilter;
              updateDashboardFilter();
            });
          });

          // Bind sort order changes
          const sortSelect = extensionMain.querySelector('#dashboard-sort-order');
          if (sortSelect) {
            sortSelect.value = dashboardSortOrder;
            sortSelect.addEventListener('change', (e) => {
              dashboardSortOrder = e.target.value;
              updateDashboardFilter();
            });
          }

          // Bind CIS typeahead search
          const cisInput = extensionMain.querySelector('#dashboard-cis-search');
          const cisClear = extensionMain.querySelector('#dashboard-cis-clear');
          const cisSuggestions = extensionMain.querySelector('#dashboard-cis-suggestions');

          if (cisInput && cisSuggestions && cisClear) {
            cisInput.value = dashboardCisFilter;
            if (dashboardCisFilter) {
              cisClear.style.display = 'block';
            }

            const renderCisSuggestions = (filterText) => {
              const query = filterText.trim().toLowerCase();
              const matches = dashboardAvailableCis.filter(cis => 
                cis.toLowerCase().includes(query)
              );

              cisSuggestions.innerHTML = '';
              if (matches.length > 0) {
                matches.forEach(cis => {
                  const div = document.createElement('div');
                  div.className = 'dolphi-typeahead-suggestion-item';
                  div.textContent = cis;
                  div.addEventListener('click', () => {
                     cisInput.value = cis;
                     dashboardCisFilter = cis;
                     cisClear.style.display = 'block';
                     cisSuggestions.style.display = 'none';
                     updateDashboardFilter();
                  });
                  cisSuggestions.appendChild(div);
                });
                cisSuggestions.style.display = 'block';
              } else {
                cisSuggestions.style.display = 'none';
              }
            };

            cisInput.addEventListener('focus', () => {
              renderCisSuggestions(cisInput.value);
            });

            cisInput.addEventListener('input', () => {
              if (cisInput.value.trim() !== '') {
                cisClear.style.display = 'block';
              } else {
                cisClear.style.display = 'none';
                dashboardCisFilter = '';
                updateDashboardFilter();
              }
              renderCisSuggestions(cisInput.value);
            });

            cisClear.addEventListener('click', () => {
              cisInput.value = '';
              cisClear.style.display = 'none';
              cisSuggestions.style.display = 'none';
              dashboardCisFilter = '';
              updateDashboardFilter();
            });

            // Click outside search container to close suggestions
            document.addEventListener('click', (e) => {
              if (!e.target.closest('.dolphi-typeahead-container')) {
                cisSuggestions.style.display = 'none';
              }
            });
          }
          loadDashboard();
        }

                          <div class="dolphi-muted" style="font-size: 11px; margin-top: 4px; font-style: italic;">
                            * Note : Les appareils déjà en retard de cryptage (dépassés) sont toujours inclus dans le rapport par sécurité.
                          </div>
                        </div>
                      </div>
                      
                      <div style="display: flex; gap: 12px; margin-top: 8px; border-top: 1px solid var(--border-color); padding-top: 16px;">
                        <button id="save-config-btn" type="button" class="btn btn-primary" style="flex: 1; min-height: 38px; justify-content: center;">Enregistrer</button>
                        <button id="test-email-btn" type="button" class="btn btn-outline" style="flex: 1; min-height: 38px; justify-content: center;">Tester la connexion</button>
                      </div>
                    </div>
                  </div>
                </div>
                
                <!-- COLONNE DROITE: APPAREILS ASSIGNÉS -->
                <div class="dolphi-notif-column dolphi-notif-column-right">
                  <div class="dolphi-dashboard-table-panel" style="height: 100%; padding: 24px; display: flex; flex-direction: column; gap: 16px;">
                    <h2 style="font-size: 1.1rem; font-weight: 700; margin: 0; display: flex; align-items: center; gap: 8px; color: var(--text-main);">
                      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-radio"><circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M7.76 16.24a6 6 0 0 1 0-8.49"/><path d="M4.93 19.07a10 10 0 0 1 0-14.14"/></svg>
                      Équipements sous Surveillance
                    </h2>
                    <p class="dolphi-muted" style="line-height: 1.45; font-size: 0.8rem; margin: 0;">
                      Pour associer un ou plusieurs équipements à l'email sélectionné, vous devez ajouter le ou les appareils à la liste des appareils que vous souhaitez suivre via le bouton de notification  (🔔) dans l'un des tableaux du Parc matériel
                    </p>
                    
                    <div id="device-association-box" style="display: flex; flex-direction: column; gap: 10px; align-items: stretch; opacity: 0.5; pointer-events: none; margin-top: 8px;">
                      <select id="notif-device-select" class="dolphi-select" style="margin: 0; width: 100%; min-height: 38px; font-size: 0.9rem;">
                        <option value="">-- Sélectionner un appareil à associer --</option>
                      </select>
                      <button id="notif-associate-btn" type="button" class="btn btn-primary" style="min-height: 38px; width: 100%;">Associer</button>
                    </div>
                    
                    <div class="dolphi-dashboard-table-wrap" style="flex: 1; min-height: 250px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px;">
                      <table class="dolphi-dashboard-table" style="min-width: auto; width: 100%;">
                        <thead>
                          <tr>
                            <th>Appareil</th>
                            <th>CIS</th>
                            <th>Échéance</th>
                            <th style="text-align: right; width: 60px;">Retirer</th>
                          </tr>
                        </thead>
                        <tbody id="assigned-devices-tbody">
                          <tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 30px;">Sélectionnez une adresse pour afficher les équipements.</td></tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;

          let emails = [];
          let selectedEmail = null;
          
          const notifFeedback = extensionMain.querySelector('#dolphi-notif-feedback');
          const emailsListTbody = extensionMain.querySelector('#emails-list-tbody');
          const emailConfigSection = extensionMain.querySelector('#email-config-section');
          const configTitle = extensionMain.querySelector('#config-title');
          const notifEnabled = extensionMain.querySelector('#email-notif-enabled');
          const configSubSettings = extensionMain.querySelector('#config-sub-settings');
          const emailNotifMode = extensionMain.querySelector('#email-notif-mode');
          const globalCriteriaBox = extensionMain.querySelector('#global-criteria-box');
          const notifJMinus1 = extensionMain.querySelector('#notif-j-minus-1');
          const notifJ = extensionMain.querySelector('#notif-j');
          const assignedDevicesTbody = extensionMain.querySelector('#assigned-devices-tbody');
          
          function showFeedback(message, error) {
            notifFeedback.hidden = false;
            notifFeedback.className = 'dolphi-feedback ' + (error ? 'error' : 'success');
            notifFeedback.textContent = message;
            setTimeout(() => { notifFeedback.hidden = true; }, 5000);
          }
          
          async function loadEmails() {
            try {
              emails = await fetchJson('/api/notifications/emails');
              renderEmailsList();
            } catch (err) {
              showFeedback("Erreur de chargement des emails: " + err.message, true);
            }
          }
          
          function renderEmailsList() {
            if (!emails.length) {
              emailsListTbody.innerHTML = `<tr><td colspan="2" style="text-align: center; color: var(--text-muted); padding: 20px;">Aucun destinataire enregistré.</td></tr>`;
              return;
            }
            
            emailsListTbody.innerHTML = '';
            emails.forEach(item => {
              const tr = document.createElement('tr');
              tr.style.cursor = 'pointer';
              if (selectedEmail && selectedEmail.id === item.id) {
                tr.style.backgroundColor = 'rgba(255, 255, 255, 0.08)';
                tr.style.fontWeight = 'bold';
              }
              
              const tdEmail = document.createElement('td');
              tdEmail.innerHTML = `${item.email} ${item.enabled ? (item.global_enabled ? '<span class="badge" style="margin-left:8px; font-size:10px; background-color: var(--primary);">Global</span>' : '<span class="badge" style="margin-left:8px; font-size:10px; background-color: rgba(255,255,255,0.15); color: var(--text-main);">Individuel</span>') : '<span class="badge" style="margin-left:8px; font-size:10px; background-color: rgba(230, 57, 70, 0.15); color: #e63946;">Désactivé</span>'}`;
              tdEmail.addEventListener('click', () => selectEmail(item));
              
              const tdAction = document.createElement('td');
              tdAction.style.textAlign = 'right';
              
              const delBtn = document.createElement('button');
              delBtn.type = 'button';
              delBtn.className = 'btn btn-outline btn-xs';
              delBtn.style.color = 'var(--primary)';
              delBtn.innerHTML = '🗑️';
              delBtn.addEventListener('click', async (e) => {
                e.stopPropagation();
                if (!confirm(`Supprimer l'adresse ${item.email} et toutes ses liaisons ?`)) return;
                try {
                  await fetchJson(`/api/notifications/emails/${item.id}`, { method: 'DELETE' });
                  if (selectedEmail && selectedEmail.id === item.id) {
                    selectedEmail = null;
                    localStorage.removeItem('dolphi_active_email_id');
                    localStorage.removeItem('dolphi_active_email_name');
                    disableConfigPanel();
                  }
                  await loadEmails();
                  showFeedback("Destinataire supprimé avec succès.");
                } catch (err) {
                  showFeedback(err.message, true);
                }
              });
              
              tdAction.appendChild(delBtn);
              tr.appendChild(tdEmail);
              tr.appendChild(tdAction);
              emailsListTbody.appendChild(tr);
            });
          }
          
          function disableConfigPanel() {
            emailConfigSection.style.opacity = '0.5';
            emailConfigSection.style.pointerEvents = 'none';
            configTitle.textContent = "Sélectionnez une adresse pour la configurer";
            assignedDevicesTbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 30px;">Sélectionnez une adresse pour afficher les équipements.</td></tr>`;
            if (notifEnabled) notifEnabled.checked = false;
            
            const layout = extensionMain.querySelector('.dolphi-notif-layout');
            if (layout) layout.classList.remove('global-mode');
            
            const assocBox = extensionMain.querySelector('#device-association-box');
            if (assocBox) {
              assocBox.style.opacity = '0.5';
              assocBox.style.pointerEvents = 'none';
              const deviceSelect = extensionMain.querySelector('#notif-device-select');
              if (deviceSelect) deviceSelect.innerHTML = '<option value="">-- Sélectionner un appareil à associer --</option>';
            }
          }
          
          function updateConfigControlsState() {
            if (!notifEnabled || !configSubSettings) return;
            const isEnabled = notifEnabled.checked;
            configSubSettings.style.opacity = isEnabled ? '1' : '0.5';
            configSubSettings.style.pointerEvents = isEnabled ? 'auto' : 'none';
            
            // Check right panel state
            const rightPanel = extensionMain.querySelector('.dolphi-notif-column:nth-child(2) > .dolphi-dashboard-table-panel');
            if (rightPanel) {
              rightPanel.style.opacity = isEnabled ? '1' : '0.5';
              rightPanel.style.pointerEvents = isEnabled ? 'auto' : 'none';
            }
          }
          
          function selectEmail(item) {
            selectedEmail = item;
            localStorage.setItem('dolphi_active_email_id', item.id);
            localStorage.setItem('dolphi_active_email_name', item.email);
            
            // Enable config panel
            emailConfigSection.style.opacity = '1';
            emailConfigSection.style.pointerEvents = 'auto';
            configTitle.textContent = `Configuration - ${item.email}`;
            
            // Load values
            notifEnabled.checked = !!item.enabled;
            emailNotifMode.value = item.global_enabled ? 'global' : 'devices';
            notifJMinus1.checked = !!item.notify_j_minus_1;
            notifJ.checked = !!item.notify_j;
            
            // Toggle panel sub-settings state
            updateConfigControlsState();
            
            // Toggle criteria visibility
            updateCriteriaVisibility();
            
            // Redraw emails list to highlight selection
            renderEmailsList();
            
            // Load assigned devices
            loadAssignedDevices();
          }
          
          function updateCriteriaVisibility() {
            const layout = extensionMain.querySelector('.dolphi-notif-layout');
            if (emailNotifMode.value === 'global') {
              globalCriteriaBox.style.display = 'flex';
              if (layout) layout.classList.add('global-mode');
            } else {
              globalCriteriaBox.style.display = 'none';
              if (layout) layout.classList.remove('global-mode');
            }
          }
          
          async function loadAssignedDevices() {
            if (!selectedEmail) return;
            assignedDevicesTbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 30px;">Chargement des appareils liés...</td></tr>`;
            
            try {
              const devices = await fetchJson(`/api/notifications/emails/${selectedEmail.id}/devices`);
              renderAssignedDevices(devices);
              
              const assocBox = extensionMain.querySelector('#device-association-box');
              const deviceSelect = extensionMain.querySelector('#notif-device-select');
              if (assocBox && deviceSelect) {
                assocBox.style.opacity = '1';
                assocBox.style.pointerEvents = 'auto';
                
                const allActive = await fetchJson('/api/notifications/active-devices');
                const associatedIds = new Set(devices.map(d => d.id));
                const availableDevices = allActive.filter(d => !associatedIds.has(d.id));
                
                deviceSelect.innerHTML = '<option value="">-- Sélectionner un appareil à associer --</option>';
                availableDevices.forEach(d => {
                  const opt = document.createElement('option');
                  opt.value = d.id;
                  opt.textContent = `${d.modele || 'N/A'} - ${d.num_serie} (${d.cis || 'N/A'})`;
                  deviceSelect.appendChild(opt);
                });
              }
            } catch (err) {
              assignedDevicesTbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: #ef4444; padding: 30px;">Erreur de chargement : ${err.message}</td></tr>`;
            }
          }
          
          function renderAssignedDevices(devices) {
            if (!devices.length) {
              assignedDevicesTbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-muted); padding: 30px;">Aucun appareil lié à cette adresse.<br><br><small>Allez dans le menu Parc matériel et cliquez sur la cloche (🔔) pour en associer.</small></td></tr>`;
              return;
            }
            
            assignedDevicesTbody.innerHTML = '';
            devices.forEach(dev => {
              const tr = document.createElement('tr');
              
              const tdDevice = document.createElement('td');
              tdDevice.innerHTML = `<strong>${dev.modele || 'N/A'}</strong><br><small style="font-family:monospace; color:var(--text-muted);">${dev.num_serie}</small>`;
              
              const tdCis = document.createElement('td');
              tdCis.textContent = dev.cis || 'N/A';
              
              const tdDate = document.createElement('td');
              tdDate.textContent = dev.date_cle_a_faire || 'N/A';
              
              const tdAction = document.createElement('td');
              tdAction.style.textAlign = 'right';
              
              const delBtn = document.createElement('button');
              delBtn.type = 'button';
              delBtn.className = 'btn btn-outline btn-xs';
              delBtn.style.color = 'var(--primary)';
              delBtn.innerHTML = '🗑️';
              delBtn.title = 'Supprimer l\'association';
              delBtn.addEventListener('click', async () => {
                if (!confirm(`Supprimer l'association de cet appareil avec ${selectedEmail.email} ?`)) return;
                try {
                  await fetchJson(`/api/notifications/emails/${selectedEmail.id}/devices/${dev.id}`, { method: 'DELETE' });
                  await loadAssignedDevices();
                  showFeedback("Association supprimée avec succès.");
                } catch (err) {
                  showFeedback(err.message, true);
                }
              });
              
              tdAction.appendChild(delBtn);
              tr.appendChild(tdDevice);
              tr.appendChild(tdCis);
              tr.appendChild(tdDate);
              tr.appendChild(tdAction);
              assignedDevicesTbody.appendChild(tr);
            });
          }
          
          // Event listener: Associate device
          extensionMain.querySelector('#notif-associate-btn').addEventListener('click', async () => {
            if (!selectedEmail) return;
            const deviceSelect = extensionMain.querySelector('#notif-device-select');
            const deviceId = deviceSelect.value;
            if (!deviceId) {
              alert("Veuillez sélectionner un appareil dans la liste.");
              return;
            }
            
            try {
              await fetchJson('/api/notifications/assign-device', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  device_id: parseInt(deviceId, 10),
                  email_id: selectedEmail.id
                })
              });
              showFeedback("Équipement associé avec succès.");
              await loadAssignedDevices();
            } catch (err) {
              showFeedback("Erreur lors de l'association : " + err.message, true);
            }
          });

          // Event listener: Add email
          extensionMain.querySelector('#add-email-btn').addEventListener('click', async () => {
            const input = extensionMain.querySelector('#new-email-input');
            const email = input.value.trim();
            if (!email) return;
            try {
              await fetchJson('/api/notifications/emails', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
              });
              input.value = '';
              await loadEmails();
              showFeedback("E-mail enregistré avec succès.");
            } catch (err) {
              showFeedback(err.message, true);
            }
          });
          
          // Event listener: Mode change
          emailNotifMode.addEventListener('change', updateCriteriaVisibility);
          
          // Event listener: Enabled status change
          notifEnabled.addEventListener('change', updateConfigControlsState);
          
          // Event listener: Save configuration
          extensionMain.querySelector('#save-config-btn').addEventListener('click', async () => {
            if (!selectedEmail) return;
            const isEnabled = notifEnabled.checked;
            const mode = emailNotifMode.value;
            const payload = {
              enabled: isEnabled,
              global_enabled: mode === 'global',
              notify_j_minus_1: notifJMinus1.checked,
              notify_j: notifJ.checked
            };
            
            try {
              await fetchJson(`/api/notifications/emails/${selectedEmail.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              // Refresh state
              selectedEmail.enabled = payload.enabled;
              selectedEmail.global_enabled = payload.global_enabled;
              selectedEmail.notify_j_minus_1 = payload.notify_j_minus_1;
              selectedEmail.notify_j = payload.notify_j;
              
              await loadEmails();
              showFeedback("Configuration enregistrée.");
            } catch (err) {
              showFeedback(err.message, true);
            }
          });
          
          // Event listener: Test email
          extensionMain.querySelector('#test-email-btn').addEventListener('click', async () => {
            if (!selectedEmail) return;
            showFeedback("Envoi de l'email de test...");
            try {
              await fetchJson('/api/notifications/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: selectedEmail.email })
              });
              showFeedback(`Email de test envoyé avec succès à ${selectedEmail.email} !`);
            } catch (err) {
              showFeedback(err.message, true);
            }
          });
          
          // Initial loads
          await loadEmails();
          
          // Reselect active email if present in localStorage
          const savedActiveId = localStorage.getItem('dolphi_active_email_id');
          if (savedActiveId) {
            const found = emails.find(e => String(e.id) === String(savedActiveId));
            if (found) {
              selectEmail(found);
            }
          }
        }

        function updateAdvancedSearchFields() {
          document.querySelectorAll('label').forEach(label => {
            const text = label.textContent.trim();
            const input = label.parentElement && label.parentElement.querySelector('input');
            if (!input) return;
            if (text === 'Version Logiciel') {
              label.textContent = 'POCSAG';
              input.placeholder = 'Rechercher par POCSAG';
            } else if (text === 'Observation') {
              label.textContent = 'RFGI';
              input.placeholder = 'Rechercher par RFGI';
            }
          });
        }

        function hideSiteInfoTab() {
          document.querySelectorAll('button').forEach(button => {
            if (button.textContent.trim() !== 'Infos') return;
            const tabs = button.parentElement;
            const tabText = tabs ? tabs.textContent : '';
            if (tabText.includes('Pylônes') && tabText.includes('Tâches')) {
              button.style.display = 'none';
            }
          });
        }

        function updateBulkToolbar() {
          const toolbar = document.querySelector('[data-dolphi-bulk-toolbar]');
          if (!toolbar) return;
          const count = selectedDeviceIds.size;
          toolbar.querySelector('[data-bulk-count]').textContent = count + ' sélectionné' + (count > 1 ? 's' : '');
          
          // Hide bulk-cryptage button if any selected device or the current standard tab is BIP, INFRA, or ALERTE
          const selectedCheckboxes = Array.from(document.querySelectorAll('[data-device-select]:checked'));
          const selectedTypes = new Set(selectedCheckboxes.map(cb => String(cb.dataset.deviceType || '').toUpperCase().trim()));
          const hasNonCryptable = Array.from(selectedTypes).some(type => ['BIP', 'INFRA', 'ALERTE'].includes(type));
          
          // Detect current standard view tab from headings inside main element
          const headings = Array.from(document.querySelectorAll('main h1, main h2, main h3, main h4, main h5, main h6')).map(h => h.textContent.trim().toUpperCase());
          const isBipTab = headings.some(txt => txt.includes('BIP'));
          const isInfraTab = headings.some(txt => txt.includes('INFRASTRUCT'));
          const isAlerteTab = headings.some(txt => txt.includes('ALERTE'));
          const tabNonCryptable = isBipTab || isInfraTab || isAlerteTab;
          
          const hideCryptage = hasNonCryptable || tabNonCryptable;

          const btnCryptage = toolbar.querySelector('[data-bulk-cryptage]');
          if (btnCryptage) {
            btnCryptage.style.display = hideCryptage ? 'none' : 'inline-block';
            btnCryptage.disabled = count === 0;
          }

          const btnDelete = toolbar.querySelector('[data-bulk-delete]');
          if (btnDelete) {
            btnDelete.disabled = count === 0;
          }

          document.querySelectorAll('[data-device-select]').forEach(input => {
            input.checked = selectedDeviceIds.has(Number(input.dataset.deviceSelect));
          });
        }

        function refreshStandardView() {
          selectedDeviceIds.clear();
          const navButtons = Array.from(document.querySelectorAll('nav button'));
          const searchButton = navButtons.find(button => button.textContent.includes('Recherche Avancée'));
          const standardButton = navButtons.find(button => button.textContent.includes('Vue Standard'));
          if (searchButton && standardButton) {
            searchButton.click();
            setTimeout(() => standardButton.click(), 80);
          }
        }

        function openBulkCryptageModal() {
          const ids = Array.from(selectedDeviceIds);
          if (!ids.length) return;
          const overlay = document.createElement('div');
          overlay.className = 'dolphi-modal-overlay';
          overlay.innerHTML = `
            <form class="dolphi-modal">
              <h2 style="margin:0 0 8px">Mettre à jour le cryptage</h2>
              <p class="dolphi-muted" style="margin-bottom:18px">${ids.length} équipement${ids.length > 1 ? 's' : ''} sélectionné${ids.length > 1 ? 's' : ''}.</p>
              <label class="dolphi-field">Date de mise à jour
                <input name="date_maj_cle" type="date" required>
              </label>
              <div class="dolphi-modal-actions">
                <button type="button" class="btn btn-outline" data-cancel>Annuler</button>
                <button type="submit" class="btn btn-primary">Mettre à jour</button>
              </div>
            </form>`;
          overlay.querySelector('[data-cancel]').addEventListener('click', () => overlay.remove());
          overlay.addEventListener('click', event => {
            if (event.target === overlay) overlay.remove();
          });
          overlay.querySelector('form').addEventListener('submit', async event => {
            event.preventDefault();
            const submit = event.currentTarget.querySelector('[type="submit"]');
            submit.disabled = true;
            try {
              await fetchJson('/api/devices/bulk-update-cryptage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids, date_maj_cle: event.currentTarget.elements.date_maj_cle.value })
              });
              overlay.remove();
              refreshStandardView();
            } catch (error) {
              submit.disabled = false;
              alert(error.message);
            }
          });
          document.body.appendChild(overlay);
        }

        async function bulkDeleteDevices() {
          const ids = Array.from(selectedDeviceIds);
          if (!ids.length) return;
          if (!window.confirm('Supprimer définitivement ' + ids.length + ' équipement' + (ids.length > 1 ? 's' : '') + ' ?')) return;
          try {
            await fetchJson('/api/devices/bulk-delete', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ ids })
            });
            refreshStandardView();
          } catch (error) {
            alert(error.message);
          }
        }

        function installBulkSelection() {
          const devices = Array.isArray(window.DolphiSICLastDevices) ? window.DolphiSICLastDevices : [];
          if (!devices.length) return;
          const devicesBySerial = new Map(devices.map(device => [normalizedText(device.num_serie), device]));
          const validIds = new Set(devices.map(device => Number(device.id)));
          Array.from(selectedDeviceIds).forEach(id => {
            if (!validIds.has(id)) selectedDeviceIds.delete(id);
          });

          const eligibleTables = Array.from(document.querySelectorAll('main table')).filter(table => {
            const headers = Array.from(table.querySelectorAll('thead th'));
            return (headers[0] && headers[0].textContent.trim() === 'N° Série') ||
              (headers[0] && headers[0].querySelector('[data-select-all]') && headers[1] && headers[1].textContent.trim() === 'N° Série');
          });
          if (!eligibleTables.length) return;

          eligibleTables.forEach(table => {
            const headerRow = table.querySelector('thead tr');
            if (headerRow && !headerRow.querySelector('[data-select-all]')) {
              const header = document.createElement('th');
              header.className = 'dolphi-select-cell';
              const selectAll = document.createElement('input');
              selectAll.type = 'checkbox';
              selectAll.dataset.selectAll = '1';
              selectAll.title = 'Tout sélectionner dans ce tableau';
              selectAll.addEventListener('change', () => {
                table.querySelectorAll('[data-device-select]').forEach(input => {
                  const id = Number(input.dataset.deviceSelect);
                  if (selectAll.checked) selectedDeviceIds.add(id);
                  else selectedDeviceIds.delete(id);
                });
                updateBulkToolbar();
              });
              header.appendChild(selectAll);
              headerRow.insertBefore(header, headerRow.firstChild);
            }

            table.querySelectorAll('tbody tr').forEach(row => {
              let cell = row.querySelector('[data-dolphi-select-cell]');
              if (!cell) {
                cell = document.createElement('td');
                cell.className = 'dolphi-select-cell';
                cell.dataset.dolphiSelectCell = '1';
                row.insertBefore(cell, row.firstChild);
              }
              const serialCell = row.querySelector('td:not([data-dolphi-select-cell])');
              const device = serialCell && devicesBySerial.get(normalizedText(serialCell.textContent));
              if (device) {
                const lastCell = row.lastElementChild;
                if (lastCell) {
                  const nativeBellBtn = Array.from(lastCell.querySelectorAll('button')).find(btn => 
                    btn.querySelector('svg.lucide-bell, svg.lucide-bell-off') ||
                    btn.querySelector('svg[class*="lucide-bell"]')
                  );
                  if (nativeBellBtn && !nativeBellBtn.dataset.dolphiBellIntercepted) {
                    nativeBellBtn.dataset.dolphiBellIntercepted = '1';
                    nativeBellBtn.addEventListener('click', async (e) => {
                      e.stopPropagation();
                      e.preventDefault();
                      
                      const isCurrentlyActive = device.notification_active === 1 || device.notification_active === true || String(device.notification_active) === '1';
                      const newActive = !isCurrentlyActive;
                      
                      try {
                        const res = await fetchJson(`/api/devices/${device.id}/toggle-notification`, {
                          method: 'POST',
                          headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify({
                            notification_active: newActive,
                            email_notif: newActive ? 'dummy@sdis04.fr' : null
                          })
                        });
                        
                        if (res.success) {
                          device.notification_active = newActive ? 1 : 0;
                          refreshStandardView();
                        }
                      } catch (err) {
                        alert("Erreur lors de la modification de la notification : " + err.message);
                      }
                    }, true);
                  }
                }
              }
              if (cell.querySelector('[data-device-select]')) return;
              if (!device) return;
              const checkbox = document.createElement('input');
              checkbox.type = 'checkbox';
              checkbox.dataset.deviceSelect = String(device.id);
              checkbox.dataset.deviceType = String(device.type || '');
              checkbox.checked = selectedDeviceIds.has(Number(device.id));
              checkbox.title = 'Sélectionner ' + (device.num_serie || 'cet équipement');
              checkbox.addEventListener('change', () => {
                if (checkbox.checked) selectedDeviceIds.add(Number(device.id));
                else selectedDeviceIds.delete(Number(device.id));
                updateBulkToolbar();
              });
              cell.appendChild(checkbox);
            });
          });

          if (!document.querySelector('[data-dolphi-bulk-toolbar]')) {
            const firstContainer = eligibleTables[0].closest('.table-container');
            if (firstContainer) {
              const toolbar = document.createElement('div');
              toolbar.className = 'dolphi-bulk-toolbar';
              toolbar.dataset.dolphiBulkToolbar = '1';
              toolbar.innerHTML = `
                <strong data-bulk-count>0 sélectionné</strong>
                <div class="dolphi-bulk-actions">
                  <button type="button" class="btn btn-outline" data-bulk-cryptage disabled>Mettre à jour le cryptage</button>
                  <button type="button" class="btn btn-outline" data-bulk-delete disabled style="color:var(--primary)">Supprimer</button>
                </div>`;
              toolbar.querySelector('[data-bulk-cryptage]').addEventListener('click', openBulkCryptageModal);
              toolbar.querySelector('[data-bulk-delete]').addEventListener('click', bulkDeleteDevices);
              firstContainer.parentElement.insertBefore(toolbar, firstContainer);
            }
          }
          updateBulkToolbar();
        }

        function installEnhancements() {
          const app = document.querySelector('#root > div');
          if (!app) return;
          const sidebar = app.querySelector(':scope > div.glass');
          const nav = sidebar && sidebar.querySelector('nav');
          const footer = sidebar && nav && nav.nextElementSibling;
          const main = app.querySelector(':scope > main');
          if (!sidebar || !nav || !footer || !main) return;
          reactMain = main;

          if (!extensionMain || !extensionMain.isConnected) {
            extensionMain = document.createElement('main');
            extensionMain.className = 'dolphi-extension-main';
            extensionMain.style.display = 'none';
            app.appendChild(extensionMain);
          }

          nav.querySelectorAll('button:not([data-dolphi-dashboard])').forEach(button => {
            if (button.dataset.dolphiExtensionBound) return;
            button.dataset.dolphiExtensionBound = '1';
            button.addEventListener('click', () => {
              closeExtension();
              nav.querySelectorAll('button:not([data-dolphi-dashboard])').forEach(other => {
                other.style.backgroundColor = 'transparent';
                other.style.color = 'var(--text-main)';
              });
              button.style.backgroundColor = 'var(--primary)';
              button.style.color = '#ffffff';
            });
          });

          dashboardButton = nav.querySelector('[data-dolphi-dashboard]');
          if (!dashboardButton) {
            const source = Array.from(nav.querySelectorAll('button')).find(button => button.textContent.includes('Statistiques')) || nav.querySelector('button');
            dashboardButton = source.cloneNode(true);
            dashboardButton.dataset.dolphiDashboard = '1';
            const label = dashboardButton.querySelector('span');
            if (label) label.textContent = 'Tableau de bord';
            dashboardButton.title = 'Tableau de bord';
            dashboardButton.addEventListener('click', () => openExtension('dashboard'));

            const svg = dashboardButton.querySelector('svg');
            if (svg) {
              svg.innerHTML = `<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline>`;
              svg.setAttribute('class', 'lucide lucide-home');
              svg.setAttribute('stroke', 'currentColor');
              svg.setAttribute('stroke-width', '2');
              svg.setAttribute('stroke-linecap', 'round');
              svg.setAttribute('stroke-linejoin', 'round');
              svg.setAttribute('fill', 'none');
            }

            nav.insertBefore(dashboardButton, nav.firstChild);
          }

          notifNavBtn = nav.querySelector('[data-dolphi-nav-notifications]');
          if (!notifNavBtn) {
            const stockButton = Array.from(nav.querySelectorAll('button')).find(button => button.textContent.includes('Stock') || (button.title && button.title.includes('Stock')));
            if (stockButton) {
              const svg = stockButton.querySelector('svg');
              if (svg) {
                svg.innerHTML = `<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line>`;
                svg.setAttribute('class', 'lucide lucide-box');
                svg.setAttribute('stroke', 'currentColor');
                svg.setAttribute('stroke-width', '2');
                svg.setAttribute('stroke-linecap', 'round');
                svg.setAttribute('stroke-linejoin', 'round');
                svg.setAttribute('fill', 'none');
              }
            }
            if (stockButton) {
              notifNavBtn = stockButton.cloneNode(true);
              notifNavBtn.dataset.dolphiNavNotifications = '1';
              notifNavBtn.style.backgroundColor = 'transparent';
              notifNavBtn.style.color = 'var(--text-main)';
              const label = notifNavBtn.querySelector('span');
              if (label) label.textContent = 'Notifications';
              notifNavBtn.title = 'Notifications';
              
              const svg = notifNavBtn.querySelector('svg');
              if (svg) {
                svg.innerHTML = `<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9m1.73 13a3 3 0 0 0 5.54 0"></path>`;
                svg.setAttribute('class', 'lucide lucide-bell');
                svg.setAttribute('stroke', 'currentColor');
                svg.setAttribute('stroke-width', '2');
                svg.setAttribute('stroke-linecap', 'round');
                svg.setAttribute('stroke-linejoin', 'round');
                svg.setAttribute('fill', 'none');
              }
              
              notifNavBtn.addEventListener('click', () => openExtension('notifications'));
              stockButton.parentNode.insertBefore(notifNavBtn, stockButton.nextSibling);
            }
          }

          settingsButton = footer.querySelector('[data-dolphi-settings]');
          if (!settingsButton) {
            const themeButton = footer.querySelector('button[title="Changer le thème"]');
            const logoutButton = footer.querySelector('button[title="Se déconnecter"]');
            if (themeButton) {
              settingsButton = themeButton.cloneNode(true);
              settingsButton.dataset.dolphiSettings = '1';
              settingsButton.title = 'Paramètres';
              const label = settingsButton.querySelector('span');
              if (label) label.textContent = 'Paramètres';
              settingsButton.addEventListener('click', () => openExtension('settings'));
              footer.insertBefore(settingsButton, logoutButton || null);
            }
          }

          let collapseButton = footer.querySelector('[data-dolphi-collapse]');
          if (!collapseButton) {
            collapseButton = document.createElement('button');
            collapseButton.type = 'button';
            collapseButton.className = 'dolphi-collapse-toggle';
            collapseButton.dataset.dolphiCollapse = '1';
            collapseButton.addEventListener('click', () => {
              const collapsed = !sidebar.classList.contains('dolphi-sidebar-collapsed');
              sidebar.classList.toggle('dolphi-sidebar-collapsed', collapsed);
              localStorage.setItem(COLLAPSE_KEY, collapsed ? '1' : '0');
              collapseButton.textContent = collapsed ? '›' : '‹';
              collapseButton.title = collapsed ? 'Déployer le menu' : 'Rétracter le menu';
            });
            footer.appendChild(collapseButton);
          }

          const collapsed = localStorage.getItem(COLLAPSE_KEY) === '1';
          sidebar.classList.toggle('dolphi-sidebar-collapsed', collapsed);
          const collapseSymbol = collapsed ? '›' : '‹';
          if (collapseButton.textContent !== collapseSymbol) {
            collapseButton.textContent = collapseSymbol;
          }
          collapseButton.title = collapsed ? 'Déployer le menu' : 'Rétracter le menu';
          updateAdvancedSearchFields();
          hideSiteInfoTab();
          removeLegacyNotificationConfig();

          if (!app.dataset.dolphiDefaultDashboard) {
            app.dataset.dolphiDefaultDashboard = '1';
            openExtension('dashboard');
          }
          replaceTextInNode(document.getElementById('root'));
        }

        function replaceTextInNode(node) {
          if (!node) return;
          let child = node.firstChild;
          while (child) {
            if (child.nodeType === 3) {
              const val = child.nodeValue;
              if (val.includes('Bips Pager')) {
                child.nodeValue = val.replace(/Bips Pager/g, 'BIPs');
              } else if (val.includes('Bips pager')) {
                child.nodeValue = val.replace(/Bips pager/g, 'BIPs');
              }
            } else if (child.nodeType === 1) {
              replaceTextInNode(child);
            }
            child = child.nextSibling;
          }
        }

                window.changeLegacyView = function(viewId) {
          if (activeView === viewId) return;
          if (viewId === 'dashboard') {
            openExtension('dashboard');
          } else if (viewId === 'settings') {
            openExtension('settings');
          } else if (viewId === 'notifications') {
            openExtension('notifications');
          } else {
            closeExtension();
            if (typeof window.setLegacyPage === 'function') {
              window.setLegacyPage(viewId);
            }
          }
        };

        function removeLegacyNotificationConfig() {
          const headings = Array.from(document.querySelectorAll('h3, h2, h4'));
          const targetHeading = headings.find(h => 
            h.textContent.includes('Configuration des Alertes')
          );
          if (targetHeading) {
            const card = targetHeading.closest('.glass') || targetHeading.parentElement;
            if (card) card.style.display = 'none';
          }
        }

        const observer = new MutationObserver(installEnhancements);
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
        window.addEventListener('dolphisic-devices-loaded', installBulkSelection);
        installEnhancements();
      })();
    </script>
  </body>
</html>
